[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autooptim"
version = "0.1.0"
description = "LLM-driven iterative optimization framework"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "litellm>=1.7.7",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dashboard = [
    "textual>=0.50",
    "textual-plotext>=0.2",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1",
    "black>=23.0",
    "mypy>=1.0",
]

[project.scripts]
autooptim = "autooptim.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/autooptim"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
