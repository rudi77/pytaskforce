name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install build dependencies
        run: uv sync --locked --extra build

      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version: $TAG"
          sed -i "s/^version = \".*\"/version = \"$TAG\"/" pyproject.toml
          sed -i "s/^__version__ = \".*\"/__version__ = \"$TAG\"/" src/taskforce/__init__.py

      - name: Build package
        run: uv run python -m build

      - name: Verify package
        run: |
          uv run twine check dist/*
          echo "Built artifacts:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) — configure at:
        # https://pypi.org/manage/project/taskforce/settings/publishing/
