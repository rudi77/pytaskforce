name: release

# Tag a release (e.g. `git tag v0.2.1 && git push --tags`) to build and
# publish the Taskforce Community distribution artifacts:
#   * ghcr.io/<owner>/taskforce-community Docker image
#   * PyInstaller bundles for Linux / macOS / Windows (attached to the Release)
#   * Python wheels on PyPI (opt-in via the PUBLISH_TO_PYPI repo variable)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/taskforce-community
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bundle:
    name: Build PyInstaller bundle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: uv sync --frozen
      - name: Build bundle + release archive
        run: uv run python scripts/build_exe.py --archive
      - uses: actions/upload-artifact@v4
        with:
          name: taskforce-community-${{ matrix.os }}
          path: dist/taskforce-community-*.*
      - name: Attach bundle to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/taskforce-community-*.*

  pypi:
    name: Publish wheels to PyPI
    # Opt-in: set repository variable PUBLISH_TO_PYPI = true and add the
    # PYPI_TOKEN secret to enable. Skipped otherwise so releases never fail
    # on a missing token.
    if: vars.PUBLISH_TO_PYPI == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack (pnpm)
        run: corepack enable
      - name: Build the web UI into the package
        run: |
          cd ui
          pnpm install --frozen-lockfile
          pnpm run build
          cd ..
          rm -rf src/taskforce/api/_ui
          cp -r ui/dist src/taskforce/api/_ui
      - name: Build wheels
        run: uv build
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
