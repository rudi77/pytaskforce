# Butler Agent Profile
# Personal AI assistant that runs 24/7 as the central coordinator
# See docs/adr/adr-010-event-driven-butler-agent.md

profile: butler
specialist: butler

# Optional: Butler role specialization.
# When set, loads a role YAML from configs/butler_roles/{role}.yaml
# that overrides persona prompt, sub-agents, and tools.
# Examples: personal_assistant, accountant
# role: personal_assistant

persistence:
  type: file
  work_dir: .taskforce

runtime:
  enabled: true
  store: file
  work_dir: .taskforce

agent:
  planning_strategy: native_react
  planning_strategy_params:
    max_step_iterations: 2  # AutoOptim: reduced from 3 to discourage extra turns after delegation
    max_plan_steps: 12
    reflect_every_step: false  # AutoOptim: disabled reflection overhead
  max_steps: 30
  llm_fallback: false

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

memory:
  store_dir: .taskforce/memory
  auto_extract: true
  compaction_interval_hours: 24

consolidation:
  auto_consolidate: true
  strategy: batch
  max_sessions: 50
  model_alias: fast
  throttle:
    interval_minutes: 60        # Min minutes between LLM consolidation runs
    interval_requests: 50       # Min requests between LLM consolidation runs
    association_interval_requests: 25  # Min requests between lightweight association runs

# Generative dreaming — creates new knowledge by recombining memories.
# Runs after consolidation or on schedule. See docs/adr/adr-014-generative-dreaming.md
dreaming:
  enabled: false
  max_memories_per_phase: 20
  max_llm_calls: 4
  replay_variations: 3
  recombination_pairs: 4
  emotional_decay_factor: 0.15
  novelty_threshold: 0.4
  model_alias: fast
  schedule_expression: "0 3 * * *"
  trigger_after_consolidation: true

logging:
  level: INFO
  format: console

# AutoOptim: reverted to defaults (tighter values broke sub-agent result visibility)
context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 15000

context_management:
  summary_threshold: 40
  compression_trigger: 40000

request_queue:
  max_size: 100
  drain_timeout: 30.0

security:
  auto_approve_risk_levels: [low, medium]
  require_confirmation: [high, critical]
  autonomous_mode: false

notifications:
  default_channel: telegram
  default_recipient_id: "5865840420"

scheduler:
  enabled: true
  store: file

event_sources: []

rules: []

sub_agents:
  - specialist: pc-agent
    description: "Lokaler PC & Dokumente — System-/Umgebungsaktionen, Dateiverwaltung, Dokumentverarbeitung (PDF, Office, Extraktion, Klassifikation, Reports), Screenshots."
  - specialist: research_agent
    description: "Wissen & Web — Recherche, Faktenprüfung, Quellenvergleich, News, Datensammlung, Briefings und Reports."
  - specialist: coding_agent
    description: "Entwicklung — Code erstellen, ändern, testen, reviewen, debuggen, refactoren."
  - specialist: accountant
    description: "Buchhaltung — Rechnungsverarbeitung, Kontierung, §14 UStG Pruefung, GoBD-Audit."

tools:
  - file_read
  - memory
  - send_notification
  - gmail
  - google_drive
  - calendar
  - schedule
  - reminder
  - rule_manager
  - ask_user
  - activate_skill
  - type: parallel_agent
    profile: butler
    max_concurrency: 4
