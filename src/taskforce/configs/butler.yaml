profile: butler
specialist: butler
persistence:
  type: file
  work_dir: .taskforce
runtime:
  enabled: true
  store: file
  work_dir: .taskforce
agent:
  planning_strategy: native_react
  planning_strategy_params:
    max_step_iterations: 3
    max_plan_steps: 12
    reflect_every_step: true
  max_steps: 12
  llm_fallback: false
llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main
memory:
  store_dir: .taskforce/memory
  auto_extract: true
  compaction_interval_hours: 24
consolidation:
  auto_consolidate: true
  strategy: batch
  max_sessions: 50
  model_alias: fast
logging:
  level: INFO
  format: console
context_policy:
  max_items: 6
  max_chars_per_item: 1800
  max_total_chars: 8000
context_management:
  summary_threshold: 40
  compression_trigger: 40000
request_queue:
  max_size: 100
  drain_timeout: 30.0
security:
  auto_approve_risk_levels:
  - low
  - medium
  require_confirmation:
  - high
  - critical
  autonomous_mode: false
notifications:
  default_channel: telegram
  default_recipient_id: '5865840420'
scheduler:
  enabled: true
  store: file
event_sources: []
rules: []
sub_agents:
- specialist: pc-agent
  description: "Lokaler PC \xE2\u20AC\u201D System- und Umgebungsaktionen: Dateien\
    \ verschieben/kopieren/organisieren, Systeminformationen, Prozesse, App-Steuerung,\
    \ Screenshots."
- specialist: research_agent
  description: "Wissen & Web \xE2\u20AC\u201D Recherche, Faktenpr\xC3\xBCfung, Quellenvergleich,\
    \ News, Datensammlung, Briefings und Reports."
- specialist: doc-agent
  description: "Dokumente & Inhalte \xE2\u20AC\u201D PDFs/Office extrahieren, konvertieren,\
    \ zusammenfassen, klassifizieren, strukturieren, Reports erstellen."
- specialist: coding_agent
  description: "Entwicklung \xE2\u20AC\u201D Code erstellen, \xC3\xA4ndern, testen,\
    \ reviewen, debuggen, refactoren."
tools:
- memory
- send_notification
- gmail
- google_drive
- calendar
- schedule
- reminder
- rule_manager
- ask_user
- activate_skill
- type: parallel_agent
  profile: butler
  max_concurrency: 4
