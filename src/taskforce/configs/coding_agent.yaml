# Coding Agent Development Configuration
# Specialized agent for software development tasks

profile: coding_agent
specialist: coding  # Determines system prompt (Kernel + Coding Specialist)

# Custom system prompt for multi-agent orchestration
system_prompt: |
  You are a coding orchestrator that delegates work to specialist sub-agents.

  MODE SELECTION (MANDATORY):
  - If the user asks for analysis only (e.g. analyze, explain, investigate, review, compare, root-cause),
    run ANALYSIS MODE:
    1. Do direct repository exploration with file_read/grep/glob/shell.
    2. Optionally use coding_planner for structure.
    3. Do NOT call coding_worker.
    4. Do NOT claim implementation was done.
  - If the user asks for implementation/refactor/fix, run IMPLEMENTATION MODE:
    1. Ask coding_planner to break the mission into concrete tasks and priorities.
    2. Dispatch coding_worker to implement each task (parallelize if independent).
    3. Dispatch coding_reviewer to review changes, tests, and quality.
    4. Consolidate results and deliver a final answer to the user.

  Keep orchestration focused:
  - Provide each sub-agent with clear mission scope and expected outputs.
  - Include relevant file paths, existing patterns, and architectural context in sub-agent missions.
  - Summarize and reconcile findings from all sub-agents.
  - If review finds issues, send fixes back to coding_worker.

  SCRATCHPAD PROTOCOL (MANDATORY for analysis with >5 files):
  You WILL lose earlier file contents due to message compression. The scratchpad is your persistent memory.
  1. FIRST: Read `.taskforce_coding/scratchpad.md` with file_read. If it exists, it contains your earlier findings — do NOT repeat work already recorded there.
  2. APPEND: After each batch of file reads, use file_write with mode="append" to add findings to the scratchpad.
     Format per file: `## path/to/file.py\n- Key finding 1\n- Key finding 2\n`
  3. TRACK PROGRESS: Start the scratchpad with a `# Files Read` section listing every file path you have analyzed. Before reading a file, check this list — skip files already recorded.
  4. FINAL ANSWER: Read the scratchpad and synthesize your answer from it.

  NOTIFICATIONS (best-effort):
  When a task completes or produces significant results, try to notify via
  send_notification with channel="telegram" and recipient_id="5865840420".
  If notification fails, skip it and continue — do NOT debug notification infrastructure.

  PLAN ADAPTATION (CRITICAL):
  You can and should modify your plan during execution using the planner tool with update_plan.
  - If a non-critical step (like notifications) fails after 1 retry, remove it from the plan and move on.
  - If a critical step fails repeatedly, use ask_user to clarify before continuing.
  - Never spend more than 2 attempts on any single failing tool call.

  EFFICIENCY RULES (CRITICAL):
  - Use ask_user when stuck after 1-2 retries on a failing tool, or when requirements are unclear.
  - Do NOT use ask_user for things you can discover yourself with grep/glob/file_read.
  - NEVER use the llm tool to generate or summarize text - you ARE the LLM.
  - Prefer shell commands over specialized tools when a single command suffices.
  - Before delegating to sub-agents, do a quick codebase scan yourself (grep/glob) to give them precise context about where to work and what patterns to follow.

# Persistence configuration
persistence:
  type: file
  work_dir: .taskforce_coding

# Agent configuration
agent:
  enable_fast_path: true  # Enable fast-path for follow-up queries
  planning_strategy: spar  # Sense-Plan-Act-Reflect for orchestration
  planning_strategy_params:
    max_step_iterations: 3
    max_plan_steps: 12
    reflect_every_step: true
    max_reflection_iterations: 2
  max_steps: 150  # High limit to allow thorough analysis and multi-agent workflows
  max_parallel_tools: 3
  router:
    use_llm_classification: true  # Use LLM for better accuracy in prod
    max_follow_up_length: 100  # Max query length for follow-up classification


# LLM configuration
llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

# Logging configuration
logging:
  level: DEBUG
  format: console

# Context Management - compression thresholds
# Prevents the infinite re-read loop where compression wipes file contents
# and the agent reads the same files again (default summary_threshold=20 is too low)
context_management:
  summary_threshold: 60          # Message count before triggering compression (default: 20)
  compression_trigger: 80000     # Token count before triggering compression (default: 40000)
  max_input_tokens: 120000       # Max input tokens allowed (default: 100000)

# Context Policy configuration (Story 9.2)
# Controls budgeting for context pack injection before LLM calls
context_policy:
  max_items: 15                      # Higher for orchestrator - needs broad context for delegation
  max_chars_per_item: 3500           # Generous - orchestrator makes delegation decisions
  max_total_chars: 8000              # More budget for orchestration context
  include_latest_tool_previews_n: 5  # Number of latest tool previews to include
  allow_tools: null                  # null = all tools allowed, or list of tool names
  allow_selectors:                   # Selector types to use (MVP: first_chars)
    - first_chars

consolidation:
  enabled: true
  auto_capture: true        # Experience-Tracking bei jeder Ausführung
  auto_consolidate: false   # true = nach jeder Session konsolidieren
  strategy: batch            # "batch" oder "immediate"
  max_sessions: 50
  model_alias: main
  work_dir: .taskforce/experiences


# Tool configuration for coding agent
# Minimal tool set - orchestrator delegates heavy work to sub-agents
# Fewer tools = fewer tokens for tool schemas in system prompt
tools:
  # Codebase discovery and editing
  - file_read      # Read file contents
  - file_write     # Write/append to files (scratchpad, notes)
  - edit           # Targeted file editing
  - grep           # Search file contents with regex patterns
  - glob           # Find files by name patterns

  # Shell (consolidate operations into shell commands where possible)
  - shell          # Execute shell commands (tests, builds, git, file ops)

  # Version control, memory, and notifications
  - git            # Git operations
  - memory         # Unified memory tool
  - send_notification  # Push notifications (Telegram, etc.)

  # Sub-agent tools (explicitly defined)
  - type: sub_agent
    name: coding_planner
    summarize_results: true
    summary_max_length: 2600
  - type: sub_agent
    name: coding_worker
    auto_approve: true       # Enable parallel execution without per-call approval
    summarize_results: true
    summary_max_length: 3200
  - type: sub_agent
    name: coding_reviewer
    summarize_results: true
    summary_max_length: 2600
  # Parallel sub-agent dispatch (batch multiple workers in one call)
  - type: parallel_agent
    max_concurrency: 3

# Notification defaults
notifications:
  default_channel: telegram
  default_recipient_id: "5865840420"

# Unified Memory Configuration
memory:
  type: file
  store_dir: ".taskforce_coding/memory"
