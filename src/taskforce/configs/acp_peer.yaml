profile: acp_peer
specialist: butler

persistence:
  type: file
  work_dir: .taskforce

runtime:
  enabled: true
  store: file
  work_dir: .taskforce

agent:
  planning_strategy: native_react
  max_steps: 30

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

logging:
  level: INFO
  format: console

context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 15000

tools:
  - web_search
  - web_fetch
  - file_read
  - file_write
  - python
  - ask_user
  - call_acp_agent

acp:
  server:
    enabled: true
    host: 0.0.0.0
    port: 8800
    agent_name: taskforce_peer
    expose_profile: true
    expose_bus_topics: []
  peers:
    # Example peer - remove or replace with your own deployment.
    - name: sample_coder
      base_url: http://localhost:8801
      agent: coder
      description: Example peer; override in deployment
      auth:
        type: none
  message_bus:
    transport: in_memory
    publish_peers: []
    subscribe_topics: []
