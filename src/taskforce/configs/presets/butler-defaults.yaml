# Butler Defaults Preset
# ======================
# Technical tuning shared by the butler profile and its sub-agents/roles.
# Opt in from an .agent.md via:
#
#   ---
#   extends: butler-defaults
#   ---
#
# Values here layer on top of the framework defaults.yaml and can still be
# overridden by a per-agent ``technical:`` block.

runtime:
  enabled: true
  store: file
  work_dir: .taskforce

agent:
  planning_strategy: native_react
  planning_strategy_params:
    max_step_iterations: 2
    max_plan_steps: 12
    reflect_every_step: false
  max_steps: 30
  llm_fallback: false

memory:
  store_dir: .taskforce/memory

# Post-mission learning: after each successful mission, a fast LLM
# extracts reusable knowledge (working sources, recurring entities,
# workflow rules) and writes it to the wiki at .taskforce/memory/wiki/.
# Transient answers (today's prices, the next train) are not stored.
learning:
  enabled: true
  model_alias: fast

logging:
  level: INFO
  format: console

context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 15000

context_management:
  summary_threshold: 40
  compression_trigger: 40000

request_queue:
  max_size: 100
  drain_timeout: 30.0

security:
  auto_approve_risk_levels: [low, medium]
  require_confirmation: [high, critical]
  autonomous_mode: false

scheduler:
  enabled: true
  store: file
