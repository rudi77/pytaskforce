# Default Agent Profile
# A general-purpose agent with essential tools for common tasks.
#
# REQUIRED: This file is the framework-wide fallback profile used by
# AgentFactory and AgentExecutor when no explicit profile is given
# (e.g. for inline `create_agent(system_prompt=..., tools=[...])` calls
# and as the default for `executor.execute_mission(profile=...)`).
# Do not rename or delete without also updating the hardcoded
# `"default"` defaults in `application/factory.py` and
# `application/executor.py`. Post-mission learning loads this profile
# to read its `learning.*` config.

profile: default

persistence:
  type: file
  work_dir: .taskforce

agent:
  planning_strategy: native_react
  planning_strategy_params:
    max_step_iterations: 3
    max_plan_steps: 30
    reflect_every_step: false
  max_steps: 120

# Post-mission learning: after each successful mission, a fast LLM
# extracts reusable knowledge (working sources, recurring entities,
# workflow rules) and writes it to the wiki at .taskforce/memory/wiki/.
# Transient answers (today's prices, the next train) are not stored.
learning:
  enabled: true
  model_alias: fast  

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

wiki:
  store_dir: .taskforce/memory/wiki
  # Wiki auto-injection into the system prompt is OFF by default — see
  # issue #275 and wiki_context_loader.py module docstring. The agent
  # finds and reads pages on demand via wiki(action=search) /
  # wiki(action=read_page) instead. Explicitly setting the values here
  # documents the intent for anyone reading the profile.
  context_injection:
    top_k_relevant: 0
    include_index: false

logging:
  level: INFO
  format: console

context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 15000

tools:
  - web_search
  - web_fetch
  - browser
  - file_read
  - fetch_result
  - file_write
  - edit
  - multimedia
  - python
  - powershell
  - grep
  - glob
  - git
  - ask_user
  - wiki
