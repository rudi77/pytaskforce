# Research Agent - Deep web research and report writing
# Used by Butler for thorough information gathering tasks

agent_id: research_agent
name: ResearchAgent
description: Deep web research, data gathering, and report writing
created_at: '2026-03-19T00:00:00+00:00'
updated_at: '2026-03-19T00:00:00+00:00'
profile: research_agent
specialist: null

agent:
  planning_strategy: native_react
  max_steps: 20

persistence:
  type: file
  work_dir: .taskforce_research

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

logging:
  level: INFO
  format: console

context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 15000

context_management:
  summary_threshold: 30
  compression_trigger: 40000

tools:
  - web_search
  - web_fetch
  - python

system_prompt: >
  You are a research specialist. Your job is to conduct thorough research
  on a given topic using web searches and data gathering. You produce
  well-structured, factual reports with sources. Always verify claims
  across multiple sources when possible.
