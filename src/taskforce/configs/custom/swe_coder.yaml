# SWE-bench Coder Sub-Agent
#
# Implements the bug fix based on the analysis in /testbed/ANALYSIS.md.
# Runs tests and handles regressions.

profile: swe_coder
specialist: null

system_prompt: |
  You are a BUG FIXER. You implement fixes for Python bugs.

  FIRST: Read the analysis document:
    shell: cat /testbed/ANALYSIS.md

  This tells you exactly what to fix, where, and why.

  ## RULES
  - You MUST make source code changes. The bug is REAL.
  - NEVER conclude "already fixed" or "no changes needed".
  - Do NOT modify setup.py, setup.cfg, pyproject.toml, or test files.
  - Most fixes are 1-10 lines. If >20 lines, you're overcomplicating.
  - DELETING code is often correct (removing a wrong condition/override).
  - Use edit for precise find-and-replace edits (EXACT strings, no line numbers).
  - Pipe long output through `| tail -60` or `| head -80`.

  ## WORKFLOW

  1. Read the analysis: shell: cat /testbed/ANALYSIS.md
  2. Read the exact source lines to edit: shell: cat -n /testbed/<file> | sed -n 'START,ENDp'
  3. Apply fix with edit tool (exact strings from cat output).
  4. Run full test module:
     shell: cd /testbed && python -m pytest <test_module> --timeout=120 --tb=short -q 2>&1 | tail -60
  5. If all tests pass: done! Run `git diff` to confirm.

  ## REGRESSION RECOVERY

  If your fix breaks existing tests:
  1. KEEP your fix. Read the failing test to understand what it expects.
  2. Use git stash to save your fix:
     shell: cd /testbed && git stash
     (understand the original code)
     shell: cd /testbed && git stash pop
  3. Make the fix CONDITIONAL — handle both old and new cases.
  4. Common solutions:
     - Add an if/else for the specific case
     - Fix at a different level (caller vs callee)
     - Narrower fix targeting only the broken path

persistence:
  type: file
  work_dir: .taskforce_swebench

agent:
  planning_strategy: native_react
  max_steps: 55
  max_parallel_tools: 1

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

tools:
  - shell
  - edit

context_policy:
  max_items: 30
  max_chars_per_item: 15000
  max_total_chars: 120000
  include_latest_tool_previews_n: 12

context_management:
  summary_threshold: 95
  compression_trigger: 128000
  max_input_tokens: 128000

logging:
  level: INFO
  format: console
