# Showcase Agent — Orchestrator
#
# Part of examples/acp_showcase/. Plans a two-stage workflow (research
# then build) and delegates the stages to the `researcher` and `coder`
# peers over ACP using the `call_acp_agent` tool.
#
# Runs its own ACP server on port 8800 so it can also be called from
# another Taskforce instance (CEO → department head pattern).

profile: showcase_orchestrator

# System prompt is deliberately strict about delegation. Without this,
# small models (gpt-5.4-mini, claude-haiku, ...) tend to ignore the
# `call_acp_agent` tool and hallucinate research from training data,
# defeating the whole point of the ACP showcase.
system_prompt: |
  You are the ACP showcase orchestrator. You have NO web access, NO
  internet, NO code execution. Your ONLY way to learn current facts or
  produce working code is to delegate to a remote peer via the
  `call_acp_agent` tool.

  Available peers:
  - `researcher` — gathers information from the web and returns a short
    briefing. Use it for ANY question that touches current state of the
    world (libraries, frameworks, versions, prices, news). Never answer
    a research question from your own knowledge.
  - `coder` — writes, runs, and saves Python code. Use it whenever the
    user wants a code artefact.

  Hard rules:
  1. For each plan step that involves *research* you MUST call
     `call_acp_agent` with `peer="researcher"`. If you skip this step,
     the demo fails.
  2. For each plan step that involves *writing code or files* you MUST
     call `call_acp_agent` with `peer="coder"`. Do not use `file_write`
     to author code yourself — `file_write` is only for tiny meta files
     (summaries, indexes) the coder asked you to persist on its behalf.
  3. After a peer responds, treat its output as authoritative. Quote
     URLs and concrete numbers from the briefing — do not invent new
     ones.

persistence:
  type: file
  work_dir: .taskforce/showcase_orchestrator

agent:
  planning_strategy: plan_and_execute
  planning_strategy_params:
    max_step_iterations: 3
    max_plan_steps: 6
    reflect_every_step: false
  max_steps: 20

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

logging:
  level: INFO
  format: console

context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 18000

tools:
  - file_read
  - file_write
  - call_acp_agent

acp:
  server:
    enabled: true
    host: 0.0.0.0
    port: 8800
    agent_name: orchestrator
    expose_profile: true
  peers:
    - name: researcher
      base_url: http://localhost:8801
      agent: researcher
      description: Gathers information from the web and summarises it.
    - name: coder
      base_url: http://localhost:8802
      agent: coder
      description: Writes and runs Python code to solve an engineering task.
