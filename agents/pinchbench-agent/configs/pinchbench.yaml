# PinchBench evaluation profile.
#
# Consumed by evals/pinchbench/solver.py — the pinchbench Inspect AI
# solver instantiates Taskforce with this profile, then ``cd``\\s the
# agent into a per-task workspace directory before delegating to
# AgentExecutor.execute_mission_streaming.
#
# Mirrors the swe_bench profile shape (minimal tool surface, generous
# context budget, native ReAct planner) but adds file_read / file_write
# / grep / glob / python because pinchbench tasks routinely operate on
# CSV / log / markdown fixtures placed in the workspace.

profile: pinchbench
specialist: null

# #410 / QW6: research/writer separation. Delegate "read big document,
# extract structured fields" to transcript_extractor (defined under
# configs/custom/). The master renders the JSON it gets back into the
# deliverable file. Without this, the master burns 30-50 python calls
# re-greppng the same transcript and loses sight of the deliverable
# during context compression — the dominant pattern in the May-2026
# baseline meeting_* failures (n=28, mean 0.153).
sub_agents:
  - specialist: transcript_extractor
    description: >
      Read a large document (meeting transcript, log file, CSV, prose
      report) and return ONLY a structured JSON payload (attendees,
      decisions, acronyms, action_items, …). The raw bytes stay
      inside the sub-agent's context. Use this BEFORE writing any
      report whose input is > 5 KB.

persistence:
  type: file
  work_dir: .taskforce_pinchbench

system_prompt: |
  You are an autonomous agent solving a single benchmark task. Always:

  1. Read the user's mission carefully — every named output file is a
     hard deliverable. Write the file before declaring complete.
  2. For ANY task whose input is a long document (meeting transcript,
     log file, prose report > 5 KB), delegate the read+extract phase
     to the `transcript_extractor` sub-agent and synthesise its JSON
     output into the requested deliverable. Do NOT re-grep / re-python
     a 200-line transcript yourself — you will lose track of the
     deliverable. Pick the sub-agent FIRST when the input is large.
  3. For external research (web search needed), use `web_search` /
     `web_fetch`. Never substitute `urllib`/`requests` python for
     research — those calls will be blocked or fail.
  4. Write incrementally. A partial deliverable beats a missing one.

agent:
  # Trial: SPAR (Sense -> Plan -> Act -> Reflect) instead of native_react
  # to test whether the explicit Reflect phase fixes the "agent forgets
  # to write deliverable" pattern more cleanly than the heuristic
  # pivot-nudges built on top of native_react.
  planning_strategy: spar
  planning_strategy_params:
    max_step_iterations: 3
    max_plan_steps: 12
    reflect_every_step: true
  max_steps: 180
  max_parallel_tools: 4
  # Anti-compression: keep tool results inline (up to 3 KB) so the
  # agent does not lose sight of read data when the message history
  # compresses. Default is ~2 KB which pushed almost every meaningful
  # tool output into the result store and forced the agent to fetch_result
  # repeatedly. 6000 regressed research (web_fetch HTML landed inline
  # and triggered content filters); 3000 is the compromise — still
  # bigger than default, small enough that whole HTML pages stay in
  # the result store.
  tool_result_store_threshold: 3000

llm:
  config_path: src/taskforce/configs/llm_config.yaml
  default_model: main

context_policy:
  max_items: 30
  max_chars_per_item: 15000
  max_total_chars: 120000
  include_latest_tool_previews_n: 12

context_management:
  # Compress when the message-count exceeds this — was 95 (very lenient),
  # 80 keeps it bounded for the long meeting / log tasks that now run to
  # max_steps=180 without dropping the head-of-conversation deliverable.
  summary_threshold: 80
  compression_trigger: 128000
  max_input_tokens: 128000

logging:
  level: INFO
  format: console

tools:
  - shell
  - edit
  - file_read
  - file_write
  - grep
  - glob
  - python
  # #409 / QW5: PinchBench includes ~8 web-research tasks
  # (competitive_research, oss_alternative_research, it_procurement,
  # deep_research, events, polymarket_briefing, earnings_analysis,
  # openclaw_landscape). Without these tools the agent falls back to
  # writing urllib/requests scripts in python and scores 0.
  - web_search
  - web_fetch
  # #410 / QW6: surface the transcript_extractor sub-agent as a
  # callable tool. Without this the sub_agents: block above is just
  # prompt-rendering metadata — the master cannot actually dispatch.
  - type: parallel_agent
    profile: pinchbench
    max_concurrency: 4
