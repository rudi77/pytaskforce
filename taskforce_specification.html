# REST API — Transport, Errors, Streaming, Lifespan

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
The meta-spec for the FastAPI surface that fronts every feature. This spec
covers the cross-cutting transport concerns — error envelope, SSE streaming
infrastructure, request/response middleware, OpenAPI generation, CORS,
lifespan startup/shutdown, health probes, mission-queue introspection, and
the auth seam — and intentionally does NOT enumerate per-feature routes.
Each feature owns its own route surface in its own spec
(`gateway.md`, `conversations.md`, `cowork.md`, `settings-store.md`, ...).

## Capabilities (what the user can do)

- reach a single FastAPI process at `/api/v1/...` for every Taskforce feature
- get a liveness signal at `/health` (no dependencies probed)
- get a readiness signal at `/health/ready` (probes tool registry, configs, LLM key presence)
- read OpenAPI JSON at `/openapi.json` and browse Swagger UI at `/docs` / ReDoc at `/redoc`
- stream long-running agent work via Server-Sent Events (`text/event-stream`)
- cancel a streaming mission cooperatively via `POST /execute/{session_id}/cancel`
- list and cancel queued or in-flight missions when a `PersistentAgentService` is registered
- receive standardized error payloads with a machine-readable `code` for every Taskforce-thrown error
- mount the bundled web UI from the same process (SPA catch-all yields to `/api/*`, `/docs`, `/health`)

## Invariants (what must always be true)

- Every Taskforce-originated HTTP error response carries the same envelope: `{code, message, details?, detail?}`. The `X-Taskforce-Error: 1` response header marks payloads emitted via `taskforce.api.errors.http_exception` so middleware can distinguish them from FastAPI defaults.
- FastAPI validation errors (422) and untagged HTTPExceptions fall through to FastAPI's default handler unchanged — the Taskforce handler only rewrites tagged exceptions.
- Routes raise via `taskforce.api.errors.http_exception(...)` rather than constructing `HTTPException` directly so the envelope and tag header are always consistent.
- SSE streams use `media_type="text/event-stream"`, frame each `ProgressUpdate` as `data: <json>\n\n`, and never buffer the entire response.
- A streaming endpoint that fails mid-stream still emits a final `data:` frame with an `event_type="error"` payload built by `_make_sse_error` — the client never sees a silently truncated stream.
- The lifespan startup runs in a deterministic order: tracing init → settings hydration → agent-package config-dir bootstrap → gateway prebuild → scheduler start → Telegram bot pollers start. Shutdown reverses this order so in-flight work sees still-live components.
- Settings hydration runs before the first LLM call and re-runs after every `PUT/DELETE /api/v1/settings/...` write, so UI-managed provider credentials apply without a restart.
- CORS middleware is added LAST so it wraps every other middleware (including plugin auth) and attaches `Access-Control-*` headers to error responses as well as successful ones.
- `allow_credentials=True` is only set when `CORS_ORIGINS` is an explicit list — the wildcard `*` default forces `allow_credentials=False` so browsers cannot send cookies cross-origin against an unscoped backend.
- The SPA catch-all served by `_mount_ui` never shadows `/api/`, `/health`, `/docs`, `/redoc`, or `/openapi.json` — those paths return 404 from the SPA fallback rather than the SPA's `index.html`.
- Plugin routers and middleware are registered before CORS and before the SPA mount, so plugin auth runs on every API request and plugin routes can override SPA paths.
- `require_permission(perm)` is a no-op when no auth middleware has attached `request.state.user` — single-user / framework-only builds remain unauthenticated by design.
- `get_settings_store`, `get_conversation_manager`, `get_project_store`, and `get_workflow_runtime_service` are intentionally NOT `lru_cache`-decorated so tenant-scoping overrides resolve per request.

## API surface (the contract clients depend on)

Cross-cutting routes owned by THIS spec (per-feature routes belong to their
respective specs):

- GET  /health → 200 with `{status, version, default_profile}`
- GET  /health/ready → 200 with `{status, version, checks}` when dependencies reachable
- GET  /health/ready → 503 on tool-registry build failure (envelope `code="not_ready"`)
- GET  /openapi.json → 200 (OpenAPI 3.x schema)
- GET  /docs → 200 (Swagger UI)
- GET  /redoc → 200 (ReDoc)
- GET  /api/v1/missions → 200 with `{missions: [...]}` listing queued/in-flight requests
- GET  /api/v1/missions → 503 when no `PersistentAgentService` is registered
- POST /api/v1/missions/{request_id}/cancel → 202 with `{request_id, session_id, status}` (`cancelled` for queued, `interrupt_requested` for in-flight)
- POST /api/v1/missions/{request_id}/cancel → 404 when the request_id is unknown
- POST /api/v1/missions/{request_id}/cancel → 503 when no `PersistentAgentService` is registered
- POST /api/v1/execute/{session_id}/cancel → 202 with `{session_id, status="interrupt_requested"}`
- POST /api/v1/execute/{session_id}/cancel → 404 (envelope `code="session_not_running"`) when no active execution

The standardized error envelope used by every Taskforce-thrown error:

```
{ "code": "<machine-readable>", "message": "<human-readable>",
  "details": { /* optional structured */ }, "detail": "<message echo>" }
```

## Configuration surface

- `CORS_ORIGINS` — comma-separated allow list (default `*`; explicit list enables `allow_credentials`)
- `TASKFORCE_UI_DIR` — explicit path to a built web UI; otherwise resolved from `<package>/api/_ui` or `<repo>/ui/dist`
- `TASKFORCE_LOG_DIR` — log destination (default `.taskforce/logs`)
- `TASKFORCE_LOG_FILE` — log file name (default `api.log`)
- `LOGLEVEL` / `TASKFORCE_LOG_DEBUG` — enable DEBUG logging
- `TASKFORCE_WORK_DIR` — base work directory threaded into every infrastructure builder (default `.taskforce`)
- `TASKFORCE_PLUGIN_CONFIG` — optional YAML path read on startup to seed plugin configuration

## Extension points

- `taskforce.plugins` entry-point group — plugins contribute middleware and routers; routers are mounted at `/api/v1` after the core routers and before the SPA catch-all.
- `set_persistent_agent_service(service)` in `taskforce.api.dependencies` — embedding hosts (butler daemon, custom REST processes) publish their queue so `/api/v1/missions/*` becomes reachable.
- `register_active_event_source(name, source)` / `unregister_active_event_source(name)` — webhook-capable event sources publish themselves so `POST /api/v1/events/{source_name}` can dispatch payloads.
- `set_standing_goal_store(store)` / `set_goal_evaluator(evaluator)` — daemon publishes its instances so the standing-goals routes share state across processes.
- `taskforce.application.infrastructure_overrides` — overrides for settings store, conversation store, project store, gateway components, recipient resolver, etc. Resolved per request (not cached) so tenant context is honored.

## Tests (must exist and pass)

- spec("api.error_envelope_has_code_and_message")
- spec("api.error_envelope_marked_with_x_taskforce_error_header")
- spec("api.untagged_http_exception_falls_through_to_fastapi_default")
- spec("api.health_returns_200_with_version_and_default_profile")
- spec("api.health_ready_returns_503_when_tool_registry_unavailable")
- spec("api.openapi_schema_served_at_openapi_json")
- spec("api.sse_stream_emits_terminal_error_frame_on_producer_exception")
- spec("api.missions_list_returns_503_when_no_persistent_agent_service")
- spec("api.missions_cancel_unknown_request_id_returns_404")
- spec("api.execute_cancel_unknown_session_returns_404")
- spec("api.cors_wildcard_disables_allow_credentials")
- spec("api.spa_catchall_does_not_shadow_api_routes")
- spec("api.settings_hydration_runs_before_first_request")

## Known gaps

- **`HTTPException` raised in routes via `HTTPException(...detail=...)` (instead of the `http_exception` helper) leaks raw `detail` strings without the standardized envelope.** Tracked in #289.
- **CORS defaults to `*` allow-origin.** Production deployments must set `CORS_ORIGINS` explicitly or any browser context can issue requests against the API. Tracked in #290.
- **No top-level mission timeout.** A wedged LLM call or runaway tool loop can keep `/execute` and `/execute/stream` hanging indefinitely; only cooperative `cancel` ends them. Tracked in #338.
- **SSE streaming backpressure is hardcoded to a 64-slot internal queue inside the executor's progress channel** — slow consumers cause silent slot pressure rather than explicit `429`/disconnect. Tracked in #364.
- **Webhook signature verification has no replay protection.** A captured legitimate payload can be replayed indefinitely against any channel. Tracked in #285 (owned by `gateway.md` but listed here because the surface is REST).
- **SSE error frames leak exception type and message** — applies to every streaming endpoint; conversations.md owns the detail (#287/#288).
- **No global request-id middleware.** Errors and structured logs don't share a correlation id across the request lifecycle, so multi-service debugging requires manual stitching.
- **OpenAPI `responses` declarations are inconsistent across routes** — some routes declare full error schemas (e.g. `execution.py`), others rely on FastAPI defaults. Client SDKs generated from the spec see only partial error contracts.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state.

# Unified CLI — `taskforce` Command Surface

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **ADR:** `ADR-026` · **Owner:** `rudi77`
The `taskforce` executable is the single entry point operators and developers
use to drive every framework feature locally — running missions, interactive
chat, managing tools and skills, booting the REST API + web UI, and starting
the agent daemon. The unified CLI (`taskforce_cli`) auto-discovers agent
packages (Butler, coding-agent, RAG) and their subcommands via the
`taskforce.cli_apps` / `taskforce.tools` / `taskforce.config_dirs` entry-point
groups, so installing an agent package makes new commands and profiles appear
without any framework code change. If `taskforce_cli` is not installed, the
framework ships a fallback CLI with the core commands only.

## Capabilities (what the user can do)

- run `taskforce --help` after `uv pip install taskforce` (or `pip install taskforce-cli`) and see every available subcommand
- execute a one-shot mission via `taskforce run mission "..."` (streaming or batch) or enter chat via `taskforce chat`
- boot the REST API + bundled web UI via `taskforce up` (auto-opens the browser when `/health` answers; `--no-browser` for headless)
- boot just the REST API via `taskforce serve` (uvicorn wrapper with `--reload`, `--workers`, `--log-level`)
- start the generic agent daemon via `taskforce daemon start --profile <name> [--role <overlay>]`
- list / inspect tools, skills, profiles, conversations, missions, runtimes, standing goals via the respective subcommand groups
- pick a profile per invocation via `--profile <name>` / `-p <name>` (or persistently via `TASKFORCE_PROFILE`)
- get agent-package subcommands automatically (`taskforce epic`, `taskforce rag`, ...) once the matching package is installed
- get agent-package tools merged into `taskforce tools list` and profiles resolvable via `--profile <name>` with zero CLI code changes
- see which optional agent packages are installed via `taskforce version`

## Invariants (what must always be true)

- The `taskforce` script is contributed by exactly one of two packages: `taskforce-cli` (preferred — the unified CLI) or `taskforce` (fallback when `taskforce_cli` is not importable). Both expose the same top-level command name.
- `--profile <name>` and `-p <name>` flags are accepted at the top level on every subcommand. Per-subcommand `--profile` flags (e.g. `taskforce run mission --profile X`) override the global value.
- Default profile resolution: unified CLI returns `butler` when a `taskforce.config_dirs` entry-point named `butler` is present (i.e. `taskforce-butler` is installed), otherwise `dev`. The framework-only fallback CLI always defaults to `dev`.
- Agent-package CLI subcommands are discovered via the `taskforce.cli_apps` entry-point group at CLI startup. A subcommand declared by an entry-point overrides the hardcoded Phase-1 fallback of the same name.
- A malformed or import-failing `taskforce.cli_apps` / `taskforce.tools` / `taskforce.config_dirs` entry-point logs a structlog warning and is skipped — one broken package never breaks the rest of the CLI.
- A hardcoded Phase-1 fallback (`epic`, `rag`) is only registered if no entry-point of the same name was loaded, and every fallback hit logs `event="hardcoded_agent_fallback"` so the noise points at deletion candidates.
- `register_agent_config_dirs()` runs once during the CLI top-level callback and registers each discovered package's `configs/`, `configs/custom/`, and `configs/roles/` directories with the profile loader, so sub-agent profiles (Butler roles, coding sub-agents) appear in `GET /api/v1/agents` and resolve via `--profile`.
- `.env` files in the current working directory are auto-loaded via `load_dotenv_if_present()` before any subcommand callback executes — both in the unified and the fallback CLI.
- The fallback CLI exposes exactly the always-on framework subcommands (`run`, `chat`, `tools`, `skills`, `config`, `memory`, `missions`, `goals`, `acp`, `runtimes`) but does NOT register `daemon`, `serve`, or `up` — those live in the unified CLI package.
- `taskforce up` polls the `/health` endpoint before opening the browser and only opens it on a 200 response within a 60-second window; failed health checks leave the server running headless rather than killing it.
- `taskforce up` and `taskforce serve` bind to `127.0.0.1` by default; binding to `0.0.0.0` is explicit (`--host 0.0.0.0`) and documented as "put a reverse proxy in front".

## Configuration surface (the command surface operators rely on)

The CLI command surface IS the user's API to the framework. Commands are
grouped by purpose; the per-command flag set lives in `docs/cli.md`.

**Top-level flags (every subcommand):**

- `--profile <name>` / `-p <name>` — select a configuration profile
- `--debug` / `-d` — enable debug output
- `TASKFORCE_PROFILE=<name>` — env-var equivalent of `--profile`

**Always-available framework subcommand groups** (registered by both unified and fallback CLI):

- `taskforce run` — execute missions (`mission`, `skill`, `agent`)
- `taskforce chat` — interactive chat session
- `taskforce tools` — list / inspect / test tools
- `taskforce skills` — list / show / install skills
- `taskforce config` — show resolved config, list profiles
- `taskforce memory` — inspect memory store and wiki
- `taskforce missions` — list templates, list running missions, cancel by request_id
- `taskforce goals` — standing-goal CRUD + `run-now`
- `taskforce acp` — Agent Communication Protocol diagnostics
- `taskforce runtimes` — agent runtime adapter management

**Unified-CLI-only subcommands** (require `taskforce-cli` installed):

- `taskforce up` — boot REST API + web UI + open browser
- `taskforce serve` — boot REST API only (uvicorn wrapper)
- `taskforce daemon` — generic agent daemon (`start`, `stop`, `status`, `logs`)
- `taskforce version` — print framework version + list installed agent packages

**Agent-package-contributed subcommands** (auto-registered via `taskforce.cli_apps` entry-points or Phase-1 hardcoded fallback):

- `taskforce epic` — multi-agent epic orchestration (from `taskforce-coding-agent`)
- `taskforce rag` — RAG agent operations (from `taskforce-rag-agent`)

## Extension points

- `taskforce.cli_apps` entry-point group — agent packages declare `name = "module:typer_app"` to add the `taskforce <name>` subcommand. Loaded eagerly at CLI startup by `taskforce.application.agent_plugin_registry.load_cli_apps()`.
- `taskforce.config_dirs` entry-point group — packages declare `name = "package_module:relpath"` and the unified CLI registers the resolved directory (and its `custom/` + `roles/` children) with the profile loader.
- `taskforce.tools` entry-point group — packages declare `name = "module:ClassName"` and the descriptor is merged into the framework tool registry, surfaced via `taskforce tools list`.
- `taskforce_cli.agent_discovery.register_agent_config_dirs()` — host applications embedding the unified CLI call this once at startup to mirror its profile-loader bootstrap.
- `taskforce_cli.agent_discovery.get_agent_tool_registrations()` — returns the merged (entry-points + Phase-1 fallback) tool descriptor map, intended for consumers that build their own `ToolRegistry`.

## Tests (must exist and pass)

- spec("cli.taskforce_script_works_after_install")
- spec("cli.default_profile_is_butler_when_taskforce_butler_installed")
- spec("cli.default_profile_is_dev_when_taskforce_butler_missing")
- spec("cli.framework_only_fallback_always_defaults_to_dev")
- spec("cli.global_profile_flag_accepted_on_every_subcommand")
- spec("cli.subcommand_profile_flag_overrides_global")
- spec("cli.env_taskforce_profile_used_when_no_flag")
- spec("cli.cli_apps_entry_point_adds_subcommand")
- spec("cli.cli_apps_entry_point_overrides_hardcoded_fallback")
- spec("cli.broken_cli_apps_entry_point_is_skipped_with_warning")
- spec("cli.hardcoded_agent_fallback_logged_when_used")
- spec("cli.config_dirs_registered_during_top_level_callback")
- spec("cli.custom_and_roles_subdirs_registered_for_each_agent_package")
- spec("cli.dotenv_loaded_before_any_subcommand_runs")
- spec("cli.up_polls_health_before_opening_browser")
- spec("cli.up_binds_127_0_0_1_by_default")
- spec("cli.serve_binds_127_0_0_1_by_default")

## Known gaps

- **CLI exit codes are inconsistent across subcommands** — most error paths raise `typer.Exit(1)` regardless of cause (config-not-found, network failure, validation error, user cancel). Shell consumers cannot distinguish recoverable from fatal failures. Tracked in #363.
- **Phase-1 hardcoded fallback in `taskforce_cli.agent_discovery`** is still active for `taskforce_coding_agent` (config dir + `call_agents_parallel` tool) and `taskforce_rag_agent` (config dir + four `rag_*` tools). Each fallback hit logs `event="hardcoded_agent_fallback"`. Will be deleted once both pyprojects ship the matching entry-points. Tracked in #364.
- **`taskforce up` opens the browser even on SSH sessions** unless `--no-browser` is passed — no TTY/`$DISPLAY` heuristic.
- **The fallback CLI silently lacks `daemon`, `serve`, `up`, and agent-package subcommands** — a `taskforce`-only install yields "no such command" rather than a hint to install the unified CLI.
- **No `@pytest.mark.spec` markers exist yet** — Tests section asserts the target, not current state.

## Cross-references

- related_spec: plugins.md (the three entry-point groups the CLI consumes)
- related_spec: profiles.md (the `--profile` flag and default-profile resolution)
- related_spec: api.md (`taskforce up` / `taskforce serve` boot the FastAPI app this spec covers)
- related_spec: agent-daemon.md (`taskforce daemon` is the entry point for the generic daemon)
- adr: ADR-026 (entry-point plugin discovery — primary design)
- adr: ADR-028 (Butler-as-YAML data package, drove default-profile detection via `taskforce.config_dirs`)
- docs: docs/cli.md (user-facing CLI reference with full flag lists)
- commit: 756592b (entry-point-based agent discovery, ADR-026 Phase 1)

# Web UI — Bundled Single-Page App

> **Status:** `shipped` · **Since:** `2026-04-29` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
A React SPA bundled with the framework that gives operators a graphical
front-end for everything the REST API exposes: chat with streaming
agents, project-bound conversations, agent CRUD + wizard, runtime
settings, monitoring, workflow definitions, and federation. It is
served from the same FastAPI process that fronts `/api/v1/*` (see
[api.md](#rest-api-transport-errors-streaming-lifespan)) under a SPA catch-all, and consumes only the
documented REST surface — there is no privileged backdoor.

## Capabilities (what the user can do)

- chat with any visible agent, streaming tokens over SSE, in a single conversation or many parallel ones
- attach files (`@mention` picker) and follow tool-call output inline
- create, list, open, archive, and remove conversations from a sidebar
- create projects (from scratch or by importing a directory), list them, open per-project conversation detail pages
- bind a new conversation to a project so the agent runs in that project's working directory
- list every agent allowed by the deployment manifest, open the editor, compare two agents side-by-side
- create a brand-new agent via a 5-step wizard (without editing YAML)
- browse the unified Capabilities catalogue (tools + skills) with parameter schemas, approval badges, and source
- list, create, edit, and trigger workflow definitions (schedule / webhook / event / chat / manual triggers)
- monitor runs, token usage, and costs; drill into a single session's trace from the runs list
- view ACP peers and remote agents available over federation
- configure runtime settings via five tabs: General, LLM Providers, Channels, Agents (visibility), Integrations (OAuth)
- probe an LLM provider credential or send a real test message via a channel without restarting the backend
- log in / out (when an auth plugin is installed); single-user installs skip the login screen entirely

## Invariants (what must always be true)

- The SPA only talks to the documented REST surface — there is no privileged or hidden endpoint reserved for the UI.
- The bundled UI is served from the same FastAPI process as the API; the SPA catch-all never shadows `/api/`, `/health`, `/docs`, `/redoc`, or `/openapi.json` (enforced by `api.md`).
- The agent list shown in the UI is the deployment-manifest-filtered list returned by `GET /api/v1/agents` — agents hidden by the manifest are not reachable through any UI affordance.
- Settings tabs read and write only via `GET/PUT/DELETE /api/v1/settings/...`; secret fields are masked client-side on display, but the UI never persists them outside the backend's encrypted store.
- A 401 response from any API call clears the locally-stored API token and redirects to `/login`, except when the user is already on a public route (`/login`, `/signup`, plugin-flagged public routes).
- Plugin routes are registered before the React-Router is built; `registry.register()` calls after `buildRouter()` do NOT add new routes to the running router until a full page reload.
- Plugin routes flagged `public: true` mount at top level (next to `/login`) and skip `RequireAuth`, capability guards, and the plugin's `wrap()`.
- A dynamic-import failure (Vite chunk-hash mismatch after a backend upgrade) triggers exactly one automatic page reload per page-load — if it still fails after reload, the user sees a "Page update required" boundary, not an infinite reload loop.
- Conversations without a `project_id` remain fully usable from the chat sidebar; project binding is opt-in (see [cowork.md](#cowork-per-project-workspaces)).
- The SSE stream consumed by the chat page handles the documented terminal `error` frame and the `stream_restart` event (content-filter recovery) without losing the user-visible message thread.

## API surface (the contract clients depend on)

The UI has no REST surface of its own — it is a pure client of the
documented API. The cross-cutting transport guarantees it depends on
are owned by [api.md](#rest-api-transport-errors-streaming-lifespan). Per-feature contracts the UI consumes:

- conversations + streaming chat → [conversations.md](#conversation-persistence-persistent-dialogue-units)
- projects + per-project routing → [cowork.md](#cowork-per-project-workspaces)
- runtime settings (5 tabs) → [settings-store.md](#settings-store-ui-managed-runtime-config)
- OAuth connections (Integrations tab) → [auth.md](#oauth2-auth-manager-centralised-authentication)
- channel credentials + bot management → [gateway.md](#communication-gateway-unified-channel-layer), [settings-store.md](#settings-store-ui-managed-runtime-config)
- workflow definitions → [workflows.md](#workflow-runtime-multi-step-orchestration-with-hitl-checkpoints)
- agent listing + editor → [profiles.md](#profile-system-agent-configuration-visibility)
- capabilities catalogue → [tools.md](#tool-system-registry-resolution-approval-mcp-parallel-exec-result-store), [skills.md](#skills-system-modular-agent-capabilities)
- ACP federation → [acp.md](#agent-communication-protocol-acp)

## Configuration surface (what operators set)

- `TASKFORCE_UI_DIR` — explicit path to a built UI bundle; otherwise resolved from `<package>/api/_ui` (production wheel) or `<repo>/ui/dist` (dev install)
- `CORS_ORIGINS` — when the UI is served from a separate origin, must explicitly list it (see [api.md](#rest-api-transport-errors-streaming-lifespan))
- General-tab settings (API base URL, theme) live in browser-local zustand state (`useSettings`), not on the server

## Extension points (for plugins / enterprise / external use)

- `bootstrapPlugins()` + `registry.register(plugin)` (in `ui/src/plugins/`) — UI plugins contribute routes, sidebar nav items, capability guards, and route wrappers. Routes can be `public: true` to mount pre-auth.
- `CapabilityGuard` / `RequireRole` — plugin routes opt into capability and role gates honored at render time.
- `plugin.wrap(node)` — plugin authors mount providers (e.g. `UserRolesProvider`) around their routes; the wrap sits outside guards but inside `RequireAuth` for non-public routes.
- `@taskforce/enterprise-ui` (optional package) — pulled in as an optional dependency of the host UI; when present its routes (`/admin/llm-providers`, `/admin/channels`, `/admin/deployment`, ...) extend the same Settings surfaces with per-tenant scoping.

## Tests (must exist and pass)

The UI ships frontend tests under `ui/src/pages/*.test.tsx` and
`ui/src/app/router.test.tsx`. Backend `spec()` markers are NOT used
for UI tests — coverage is asserted by file presence + Vitest runs.

- `ChatPage.test.tsx` — chat page renders + handles streaming events
- `ProjectDetailPage.test.tsx` — project detail page renders bound conversations
- `WorkflowsPage.test.tsx` — workflow list + trigger
- `AgentsListPage.test.tsx`, `AgentEditorPage.test.tsx` — agent CRUD UI
- `router.test.tsx` — router wiring, dynamic-import-reload guard, plugin route mounting

## Known gaps

- **Test coverage on the UI is minimal** — only a handful of page-level smoke tests exist (`ChatPage`, `ProjectDetailPage`, `WorkflowsPage`, `AgentsListPage`, `AgentEditorPage`, `router`). Most pages have no test at all, and there are no E2E specs beyond the Playwright scaffolding in `package.json`.
- **Stale-chunk fallback is a workaround, not a fix** — after a backend or dev-server upgrade, browsers cached on old chunk hashes hit a "Page update required" boundary and require a manual reload. `dev.ps1` fingerprints `enterprise-ui/dist/index.js` and wipes `node_modules/.vite` to mitigate this in dev; production has no equivalent guard. See `CLAUDE.md` → *Local Dev Launcher* and `router.tsx` → `tryScheduleAutoReload`.
- **Settings GETs return secret fields unredacted** — UI masks them client-side, but the contract leaks them ([settings-store.md](#settings-store-ui-managed-runtime-config) #281).
- **The Capabilities page collapses tools + skills into a single catalogue**, replacing earlier `/tools` and `/skills` pages (both now redirect to `/capabilities`). Power users who memorised the old paths are silently redirected; there is no inline notice.
- **No conversation-archive UI** — the chat sidebar lists active conversations only; archived conversations are reachable only via REST.
- **No project-archive UI** — project removal in the UI calls `DELETE /api/v1/projects/{id}`, which only unregisters; on-disk files are preserved per [cowork.md](#cowork-per-project-workspaces) but the UI does not surface that distinction clearly.
- **Plugin route registration is build-time only** — a plugin loaded after `buildRouter()` returned will not be reachable until a full page reload. Acceptable today because `bootstrapPlugins()` runs once at startup.
- **No global request-id surfaced in the UI** for debugging errors back to backend logs — operators must match by timestamp.
- **The General-tab settings (API base URL, theme) are browser-local**, not synced to the backend, so they don't follow the user across devices.

- related_spec: api.md (transport, error envelope, SSE infrastructure, SPA mount)
- related_spec: conversations.md (chat streaming contract)
- related_spec: cowork.md (projects + per-project conversation routing)

- related_spec: gateway.md (Channels tab — bot CRUD, test send)

- related_spec: acp.md (ACP page)

# Taskforce Spec — Authoring Guide

This directory holds **system contracts** written from the user's perspective.
For each feature, a markdown file states what the user can do, what must
always be true, and what the API surface looks like. The `spec-check` skill
verifies each claim against the live codebase and reports drift, regressions,
and silent deletions.

This guide is for **humans writing or maintaining specs**. The spec is your
product contract, not a code map.

---

## Core principle: behavior first, mechanism never

A spec describes **what the feature does for the user**, not how it's
implemented. Refactors that rename a class or move a file should leave the
spec untouched. Real regressions — a missing route, a broken invariant, a
removed capability — should make the spec fail.

So:

- ✅ "Two projects cannot point at the same directory; conflicts return 409"
- ❌ "Class `FileProjectStore` has a method `create` that raises `ValueError`"

The first survives any refactor and still catches the real bug. The second
breaks every time you touch the code, useful or not.

---

## What a spec is — and is not

| A spec **is** | A spec **is not** |
|---|---|
| The user-/client-facing contract | A code map |
| Updated in the same PR as a feature change | A design doc or rationale (that's an ADR) |
| One file per subsystem | One file per class or function |
| Behavior + API + invariants | A re-statement of the source code |
| Short — usually 50-100 lines | A 300-line catalogue of internals |

---

## File anatomy

Every spec uses the same skeleton (see `_template.md`):

```markdown
---
feature: <slug>
status: <shipped|partial|wip|legacy|deprecated|enterprise>
since: 2026-MM-DD
last_verified: 2026-MM-DD
owner: <github-handle>
adr: ADR-NNN              # optional
---

# Feature Name

One-paragraph overview.

## Capabilities                  # always
## Invariants                    # always
## API surface                   # for REST-exposed features
## Configuration surface         # for config-driven features (engines, daemons)
## Event stream contract         # for features that emit StreamEvents
## Extension points              # for features with documented seams
## Tests                         # always
## Known gaps                    # always (use "(none)" if truly empty)
## Cross-references              # always
```

Drop sections that don't apply. Most features use a subset:

- A REST-driven CRUD feature (e.g. CoWork): `API surface`, no `Configuration` / `Event stream`
- A config-driven engine (e.g. ReAct loop): `Configuration surface` + `Event stream contract`, no `API surface`
- A protocol-only contract (e.g. Skills system): `Configuration` + `Extension points`, no `API surface`

---

## How the skill verifies each section

| Section | How it's checked | Cost |
|---|---|---|
| Capabilities | LLM sub-agent reads the relevant code and confirms each capability is achievable through the documented API | medium |
| Invariants | LLM sub-agent reads the implementation files (it finds them itself) and answers PASS / FAIL / UNCERTAIN per invariant | medium-high |
| API surface | Parser walks FastAPI decorators; for each documented endpoint, confirms it's registered and (where stated) returns the documented status codes | cheap |
| Configuration surface | Parser checks profile YAML / env var defaults match what the spec claims | cheap |
| Event stream contract | Parser checks every documented event name is a member of the relevant Enum (e.g. `EventType` in `core/domain/enums.py`); LLM verifies the documented payload is what callers actually receive | cheap + LLM |
| Extension points | Grep for the named symbol in the package(s) that should expose it | cheap |
| Tests | `pytest -m 'spec("...")' --collect-only` per marker; then runs if collected | cheap |
| Known gaps | Reported as info, not failure — the user has acknowledged them | free |
| Cross-references | Not verified; navigational only | free |

The pattern: **deterministic checks first** (API surface, extension points,
tests). If those pass, **LLM checks next** (capabilities, invariants). If
the LLM says FAIL, **spot-check is mandatory** before filing a regression
issue — the verifier should never create false-positive issues.

---

## Writing capabilities

Phrase from the user's POV. Drop jargon. Keep each bullet to one line.

✅ Good:
```markdown
- create a project from scratch OR by importing an existing directory
- list all projects, newest first
- remove a project without losing the on-disk files
```

❌ Avoid:
```markdown
- The `ProjectStoreProtocol.create()` method accepts a name and path string
- The `list()` method returns `list[Project]` sorted by `created_at` desc
- `delete()` is a side-effect-free registry operation
```

The first set survives any refactor. The second breaks if `Project` is renamed.

---

## Writing invariants

State the property, not the mechanism. Make each one independently testable —
imagine a tester reading just that one line and writing a test.

✅ Good:
```markdown
- Removing a project never deletes the user's on-disk files
- Concurrent attempts to create the same project cannot both succeed
- Conversations without a project_id remain fully usable
```

❌ Avoid:
```markdown
- The `delete()` method does not call `shutil.rmtree`
- A module-level `asyncio.Lock` keyed by file path serialises `create()`
- The `project_id` field in `Conversation` is `Optional[str]`
```

If you find yourself naming variables or describing locks, you're describing
how, not what. Rephrase.

---

## Writing API surface entries

Each entry should be parseable by a simple regex. Format:

```
<METHOD> <path> → <status> [on <condition>]
```

Examples:
```markdown
- POST /api/v1/projects → 201 created
- POST /api/v1/projects → 409 on duplicate path
- GET  /api/v1/projects/{id} → 404 if missing
- DELETE /api/v1/projects/{id} → 204
```

For routes the feature extends rather than owns:

```markdown
- POST /api/v1/conversations accepts optional `project_id` in body
- GET  /api/v1/conversations accepts `project_id` query filter
```

Don't enumerate every possible 4xx. Document the ones a client must handle.

---

## Writing extension points

Only list seams that other packages (plugins, enterprise overlay,
host-app integrations) are documented to use. Skip private helpers.

```markdown
- `set_project_store_override` — enterprise plugins use this to tenant-scope
  projects. Resolved per-request, not cached.
- `taskforce.tools` entry-point group — plugins register tools by short name.
```

Skip the section entirely if the feature has no documented extension points.

---

## Writing tests

Each line is a `pytest` marker string. Names should describe the assertion,
not the test function.

```markdown
- spec("cowork.create_duplicate_path_returns_409")
- spec("cowork.delete_keeps_directory")
- spec("cowork.conversation_without_project_id_uses_global_workdir")
```

Convention: `<feature-slug>.<assertion_in_snake_case>`. Keep them short
enough to fit on the screen without wrapping.

The test code itself uses the matching decorator:

```python
@pytest.mark.spec("cowork.delete_keeps_directory")
async def test_delete_project_does_not_remove_directory(tmp_path): ...
```

Listing a marker for a test that doesn't exist is fine — the skill reports
"asserted but no test" as a P1 finding so the gap is visible. That's better
than silently passing because there's no test to fail.

---

## Writing known gaps

State exactly what's broken or missing. The skill reports these as info,
so the user sees "yes, you knew about this" rather than panicking at red.

✅ Good:
```markdown
- Project deletion does not cascade to conversations. A conversation
  pointing at a deleted project will fail to resolve its working_dir
  on next execution.
- No backend tests have `@pytest.mark.spec` markers yet — Tests section
  asserts the target, not current state.
```

❌ Avoid:
```markdown
- Needs more tests
- Some edge cases unhandled
- TODO
```

Vague gaps are useless — they don't help future-you decide if the gap still
applies. If you don't know enough to be specific, leave the gap out and add
it when you do.

Optional metadata per gap:
```markdown
- Foo is missing
  - tracked_in: issue #NNN
  - eta: 2026-MM
```

---

## Severity mapping (when spec-check finds drift)

| Finding type | Severity | Why |
|---|---|---|
| Documented API route not registered | **P0** | API contract broken |
| API route returns wrong status code | **P1** | client may handle wrong |
| Invariant LLM-check returns FAIL | **P0** or **P1** | judged by impact (data loss = P0, UX = P1) |
| Invariant LLM-check returns UNCERTAIN | **P2** | spec is ambiguous, rewrite |
| Capability not achievable via API | **P0** | feature gone or broken |
| Extension point symbol not found | **P1** | plugin contract broken |
| `spec(...)` test missing | **P1** | spec asserts coverage but no test |
| `spec(...)` test fails | **P0** | direct regression |
| Code introduces a feature not in any spec | **P2** | spec gap — new feature undocumented |
| Known gap from `## Known gaps` | **info** | acknowledged |

---

## Status field semantics

| Value | Meaning |
|---|---|
| `shipped` | Production-ready. Spec is the contract. Drift fails CI. |
| `partial` | Code exists, not feature-complete. Spec lists what's missing under Known gaps. |
| `wip` | Active development in last 2 weeks. Findings are warnings, not CI-fail. |
| `legacy` | Older feature, may be replaced. Treated like `shipped` until removed. |
| `deprecated` | Explicitly retired. Spec stays until the code is gone, then deleted. |
| `enterprise` | Only available with `taskforce-enterprise` plugin installed. Spec-check skips unless plugin detected. |

---

## Update process

When you change code that affects a feature's contract:

1. **In the same PR**, edit `docs/spec/<feature>.md` to reflect the new contract
2. Adding a capability → add a bullet
3. Removing one → delete the bullet (and the code in the same PR)
4. Bump `last_verified:` to the merge date
5. If the change is breaking, also bump `since:` or move to a new feature spec

CI will (eventually) enforce: any PR touching `src/taskforce/api/routes/` or
core agent code without touching a spec gets a comment asking why.

---

## Writing a new spec — checklist

1. Copy `_template.md` to `<feature>.md`
2. Fill the frontmatter (slug, status, since, owner)
3. Write the 1-paragraph overview from the user's POV
4. Walk through each section, deleting the ones that don't apply
5. **Read the actual code** — every claim must reflect what's true today, not
   what you remember or what the PRD said
6. Add the row to `index.md` (or remove the `_TODO_` marker)
7. (Later, once the skill exists:) run spec-check against the draft, correct
   spec or code based on what fails

A good spec for a medium feature is 50-90 lines. If you're over 150, you're
probably enumerating implementation details — pull back.

---

## Anti-patterns (don't do these)

- **Enumerating files, classes, or fields.** That's `git ls-files`, not a spec.
- **Restating test bodies.** A spec marker is enough.
- **Vague invariants** like "must work correctly". Be testable.
- **Specs for things you might build** — that's a PRD or epic, not a spec.
- **Cross-spec duplication.** If two specs talk about the same route, one owns
  it and the other says `related_spec:`.
- **Implementation jargon in capabilities.** Phrase from the user's POV.
- **Hidden TODOs.** Either write the spec or don't list the feature in
  `index.md`. `_TODO_` rows are visible; vague half-specs aren't.

</script>

<script>
(function () {
  'use strict';

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  // 1. Read & clean markdown
  const rawMd = document.getElementById('md-source').textContent
    .replace(/^\s*<!--__MARKDOWN_PLACEHOLDER__-->\s*$/m, '')
    .trim();

  // 2. Configure marked
  marked.use({ gfm: true, breaks: false, headerIds: false, mangle: false });

  const slugCounts = {};
  function slugify(text) {
    let s = text.toLowerCase()
      .replace(/[–—]/g, '-')
      .replace(/[^\w\säöüß.-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
    if (slugCounts[s] !== undefined) { slugCounts[s]++; s = s + '-' + slugCounts[s]; }
    else { slugCounts[s] = 0; }
    return s;
  }

  const renderer = new marked.Renderer();
  const mermaidBlocks = [];
  const headings = [];
  let codeBlockCount = 0;

  // marked v8+ passes a single token object to renderer methods. Older versions use positional args.
  // Normalize both so this template works regardless of marked version.
  renderer.heading = function (textOrToken, levelArg) {
    let text, level;
    if (textOrToken && typeof textOrToken === 'object') {
      level = textOrToken.depth;
      text = textOrToken.tokens && this.parser
        ? this.parser.parseInline(textOrToken.tokens)
        : (textOrToken.text || '');
    } else {
      text = textOrToken;
      level = levelArg;
    }
    const plain = String(text).replace(/<[^>]+>/g, '');
    const slug = slugify(plain);
    headings.push({ text: plain, level, slug });
    return `<h${level} id="${slug}">${text} <a class="anchor" href="#${slug}" aria-label="permalink">¶</a></h${level}>`;
  };

  renderer.code = function (codeOrToken, langArg) {
    let code, lang;
    if (codeOrToken && typeof codeOrToken === 'object') {
      code = codeOrToken.text != null ? codeOrToken.text : '';
      lang = (codeOrToken.lang || '').toString().match(/\S*/)[0];
    } else {
      code = codeOrToken;
      lang = langArg;
    }
    code = String(code);
    codeBlockCount++;
    if (lang === 'mermaid') {
      const id = 'mermaid-' + mermaidBlocks.length;
      mermaidBlocks.push({ id, code });
      return `<div class="mermaid-container"><div class="mermaid" id="${id}">${code.replace(/</g, '&lt;')}</div></div>`;
    }
    const langClass = lang ? `language-${lang}` : '';
    const langLabel = lang ? `<span class="code-lang">${lang}</span>` : '';
    const hasLangClass = lang ? ' has-lang' : '';
    return `<pre class="${hasLangClass}">${langLabel}<button class="copy-btn" title="Copy">copy</button><code class="${langClass}">${escapeHtml(code)}</code></pre>`;
  };

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // 3. Render markdown
  const html = marked.parse(rawMd, { renderer });
  $('#article').innerHTML = html;

  // 4. Highlight code
  $$('#article pre code').forEach(block => {
    try { hljs.highlightElement(block); } catch (e) {}
  });

  // Highlight HTTP methods
  $$('#article pre code.language-http, #article pre code.language-bash, #article pre code.language-shell').forEach(block => {
    const methodColors = {
      GET: '#4ade80', POST: '#fbbf24', PUT: '#3b82f6',
      PATCH: '#a78bfa', DELETE: '#f87171', HEAD: '#94a3b8', OPTIONS: '#94a3b8'
    };
    block.innerHTML = block.innerHTML.replace(
      /^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)\b/gm,
      m => `<span style="color:${methodColors[m]};font-weight:700">${m}</span>`
    );
  });

  // 5. Copy buttons
  $$('#article .copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = btn.parentElement.querySelector('code').innerText;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
      });
    });
  });

  // 6. Build TOC
  function buildToc() {
    const toc = $('#toc');
    const frag = document.createDocumentFragment();
    let sectionDiv = null;
    let h1Count = 0;

    headings.forEach(h => {
      if (h.level === 1) {
        h1Count++;
        sectionDiv = document.createElement('div');
        sectionDiv.className = 'toc-section';
        const title = document.createElement('div');
        title.className = 'toc-section-title';
        title.textContent = h.text;
        sectionDiv.appendChild(title);
        const a = document.createElement('a');
        a.href = '#' + h.slug;
        a.className = 'toc-link level-2';
        a.textContent = 'Overview';
        a.dataset.slug = h.slug;
        sectionDiv.appendChild(a);
        frag.appendChild(sectionDiv);
      } else if (h.level >= 2 && h.level <= 4) {
        if (!sectionDiv) {
          sectionDiv = document.createElement('div');
          sectionDiv.className = 'toc-section';
          frag.appendChild(sectionDiv);
        }
        const a = document.createElement('a');
        a.href = '#' + h.slug;
        a.className = 'toc-link level-' + h.level;
        a.textContent = h.text;
        a.dataset.slug = h.slug;
        sectionDiv.appendChild(a);
      }
    });
    toc.appendChild(frag);
    return { h1Count, total: headings.length };
  }
  const tocStats = buildToc();

  // 7. Auto stats banner
  const endpointMatches = rawMd.match(/^(GET|POST|PUT|PATCH|DELETE)\s+\/\S+/gm) || [];
  const uniqueEndpoints = new Set(endpointMatches.map(m => m.trim()));
  const wordCount = rawMd.split(/\s+/).filter(Boolean).length;
  const readingMin = Math.max(1, Math.round(wordCount / 220));

  const bannerItems = [
    { label: 'Sections', value: `${tocStats.h1Count || '—'} parts · ${headings.filter(h => h.level === 2).length} chapters` },
    { label: 'Code blocks', value: codeBlockCount },
    { label: 'Diagrams', value: mermaidBlocks.length },
    { label: 'Reading time', value: `~${readingMin} min` }
  ];
  if (uniqueEndpoints.size > 0) {
    bannerItems.push({ label: 'HTTP endpoints', value: uniqueEndpoints.size });
  }
  $('#doc-banner').innerHTML = bannerItems.map(item =>
    `<div class="item"><div class="label">${item.label}</div><div class="value">${item.value}</div></div>`
  ).join('');

  // 8. Mermaid
  const baseDark = {
    primaryColor: '#134e4a', primaryTextColor: '#e5ecf3', primaryBorderColor: '#5eead4',
    lineColor: '#5eead4', secondaryColor: '#1d242e', tertiaryColor: '#161c24',
    background: '#0f1419', mainBkg: '#161c24', secondBkg: '#1d242e',
    textColor: '#e5ecf3', fontFamily: 'Inter, sans-serif'
  };
  const baseLight = {
    primaryColor: '#ccfbf1', primaryTextColor: '#1a2330', primaryBorderColor: '#0d9488',
    lineColor: '#0d9488', background: '#ffffff', mainBkg: '#ffffff',
    textColor: '#1a2330', fontFamily: 'Inter, sans-serif'
  };
  function initMermaid(theme) {
    mermaid.initialize({
      startOnLoad: false,
      theme: theme === 'light' ? 'default' : 'dark',
      themeVariables: theme === 'light' ? baseLight : baseDark,
      flowchart: { useMaxWidth: true, htmlLabels: true },
      sequence: { useMaxWidth: true },
      er: { useMaxWidth: true }
    });
  }
  initMermaid('dark');

  async function renderMermaid() {
    for (const m of mermaidBlocks) {
      const el = document.getElementById(m.id);
      if (!el) continue;
      try {
        const { svg } = await mermaid.render(m.id + '-svg', m.code);
        el.innerHTML = svg;
      } catch (e) {
        el.innerHTML = `<div style="color:var(--danger);padding:12px">Mermaid render error: ${escapeHtml(e.message || String(e))}</div>`;
      }
    }
  }
  renderMermaid();

  // 9. Scroll spy
  const tocLinks = $$('.toc-link');
  const tocBySlug = Object.fromEntries(tocLinks.map(a => [a.dataset.slug, a]));
  let ticking = false;
  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const scrollTop = window.scrollY;
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      $('#progress').style.width = Math.min(100, (scrollTop / docH) * 100) + '%';

      let active = null;
      for (const h of headings) {
        const el = document.getElementById(h.slug);
        if (!el) continue;
        if (el.getBoundingClientRect().top - 100 <= 0) active = h.slug;
      }
      tocLinks.forEach(a => a.classList.toggle('active', a.dataset.slug === active));
      if (active && tocBySlug[active]) {
        const a = tocBySlug[active];
        const rect = a.getBoundingClientRect();
        const sb = $('#sidebar').getBoundingClientRect();
        if (rect.top < sb.top + 40 || rect.bottom > sb.bottom - 40) {
          a.scrollIntoView({ block: 'center', behavior: 'instant' });
        }
      }
      ticking = false;
    });
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  // 10. Search
  const search = $('#search');
  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    if (!q) {
      tocLinks.forEach(a => a.classList.remove('dimmed', 'match'));
      return;
    }
    tocLinks.forEach(a => {
      const hit = a.textContent.toLowerCase().includes(q);
      a.classList.toggle('match', hit);
      a.classList.toggle('dimmed', !hit);
    });
  });
  search.addEventListener('keydown', e => {
    if (e.key === 'Escape') { search.value = ''; search.dispatchEvent(new Event('input')); search.blur(); }
  });
  window.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      search.focus();
      search.select();
    }
  });

  // 11. Theme
  const themeBtn = $('#theme-btn');
  const hljsTheme = $('#hljs-theme');
  function setTheme(t) {
    document.body.setAttribute('data-theme', t);
    hljsTheme.href = t === 'light'
      ? 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css'
      : 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css';
    try { localStorage.setItem('dt-theme', t); } catch (e) {}
    initMermaid(t);
    renderMermaid();
  }
  themeBtn.addEventListener('click', () => {
    setTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
  try {
    const saved = localStorage.getItem('dt-theme');
    if (saved) setTheme(saved);
  } catch (e) {}

  // 12. Mobile menu
  $('#menu-btn').addEventListener('click', () => $('#sidebar').classList.toggle('open'));
  tocLinks.forEach(a => a.addEventListener('click', () => {
    if (window.innerWidth <= 900) $('#sidebar').classList.remove('open');
  }));

  // 13. Hide loader
  setTimeout(() => $('#loader').classList.add('hidden'), 150);

  // 14. Smooth scroll
  document.addEventListener('click', e => {
    const a = e.target.closest('a[href^="#"]');
    if (!a) return;
    const id = a.getAttribute('href').slice(1);
    const tgt = document.getElementById(id);
    if (tgt) {
      e.preventDefault();
      tgt.scrollIntoView({ behavior: 'smooth', block: 'start' });
      history.replaceState(null, '', '#' + id);
    }
  });

  // 15. Figure zoom — click any mermaid SVG or article image to open a pan/zoom modal
  (function initFigureZoom() {
    const modal     = $('#figure-zoom-modal');
    const stage     = $('#figure-zoom-stage');
    const content   = $('#figure-zoom-content');
    const scaleBadge= $('#figure-zoom-scale');
    if (!modal || !stage || !content) return;

    let scale = 1, panX = 0, panY = 0;
    let isDragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
    const MIN_SCALE = 0.3, MAX_SCALE = 8;

    function applyTransform() {
      content.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      scaleBadge.textContent = Math.round(scale * 100) + '%';
    }
    function resetView() { scale = 1; panX = 0; panY = 0; applyTransform(); }
    function setScale(next, originX, originY) {
      next = Math.min(MAX_SCALE, Math.max(MIN_SCALE, next));
      if (originX != null && originY != null) {
        const rect = stage.getBoundingClientRect();
        const cx = rect.width  / 2, cy = rect.height / 2;
        const dx = originX - rect.left - cx - panX;
        const dy = originY - rect.top  - cy - panY;
        const ratio = next / scale;
        panX -= dx * (ratio - 1);
        panY -= dy * (ratio - 1);
      }
      scale = next;
      applyTransform();
    }
    function openWith(node) {
      content.innerHTML = '';
      const clone = node.cloneNode(true);
      // Strip inline width/height constraints on the clone so it can grow
      if (clone.tagName && clone.tagName.toLowerCase() === 'svg') {
        clone.removeAttribute('width');
        clone.removeAttribute('height');
        clone.style.width  = '92vw';
        clone.style.height = '88vh';
        clone.style.maxWidth  = 'none';
        clone.style.maxHeight = 'none';
      }
      content.appendChild(clone);
      resetView();
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }
    function close() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
      content.innerHTML = '';
    }

    // Bind clicks on diagrams + images (event delegation survives tab switches)
    document.addEventListener('click', e => {
      if (modal.classList.contains('open')) return;
      const mermaid = e.target.closest('.mermaid-container');
      if (mermaid) {
        const svg = mermaid.querySelector('svg');
        if (svg) { e.preventDefault(); openWith(svg); return; }
      }
      const img = e.target.closest('.article img:not(.no-zoom)');
      if (img && img.complete) { e.preventDefault(); openWith(img); }
    });

    // Toolbar
    $('#figure-zoom-in').addEventListener('click',  () => setScale(scale * 1.25));
    $('#figure-zoom-out').addEventListener('click', () => setScale(scale / 1.25));
    $('#figure-zoom-reset').addEventListener('click', resetView);
    $('#figure-zoom-close').addEventListener('click', close);

    // Click on stage background (not on the content) closes
    stage.addEventListener('click', e => { if (e.target === stage) close(); });

    // Wheel = zoom centered on cursor
    stage.addEventListener('wheel', e => {
      if (!modal.classList.contains('open')) return;
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      setScale(scale * factor, e.clientX, e.clientY);
    }, { passive: false });

    // Drag = pan
    stage.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      isDragging = true;
      stage.classList.add('dragging');
      dragStartX = e.clientX; dragStartY = e.clientY;
      panStartX = panX; panStartY = panY;
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      panX = panStartX + (e.clientX - dragStartX);
      panY = panStartY + (e.clientY - dragStartY);
      applyTransform();
    });
    window.addEventListener('mouseup', () => { isDragging = false; stage.classList.remove('dragging'); });

    // Keyboard
    window.addEventListener('keydown', e => {
      if (!modal.classList.contains('open')) return;
      if (e.key === 'Escape')          close();
      else if (e.key === '0')          resetView();
      else if (e.key === '+' || e.key === '=') setScale(scale * 1.25);
      else if (e.key === '-')          setScale(scale / 1.25);
    });

    // Basic touch pinch + pan
    let touchState = null;
    stage.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        touchState = { mode: 'pan', x: e.touches[0].clientX, y: e.touches[0].clientY, panStartX: panX, panStartY: panY };
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchState = { mode: 'pinch', startDist: Math.hypot(dx, dy), startScale: scale };
      }
    }, { passive: true });
    stage.addEventListener('touchmove', e => {
      if (!touchState) return;
      if (touchState.mode === 'pan' && e.touches.length === 1) {
        panX = touchState.panStartX + (e.touches[0].clientX - touchState.x);
        panY = touchState.panStartY + (e.touches[0].clientY - touchState.y);
        applyTransform();
      } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        setScale(touchState.startScale * (dist / touchState.startDist));
      }
    }, { passive: true });
    stage.addEventListener('touchend', () => { touchState = null; });
  })();

})();
</script>
</body>
</html>
