# LiteLLM Service

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
The provider-agnostic LLM service powering every model call in the framework.
Operators configure short aliases (`main`, `fast`, `powerful`, …) in
`llm_config.yaml` and the service routes them to OpenAI, Anthropic, Azure
OpenAI, Google Gemini, Ollama, or any LiteLLM-supported provider based on the
mapped model string's prefix. Both blocking (`complete`) and streaming
(`complete_stream`) calls are first-class; both apply default + per-model
parameters, both report token usage, and both classify provider exceptions as
retryable or terminal so transient failures don't leak to the agent.

## Capabilities (what the operator / agent can do)

- map short aliases (`main`, `fast`, `powerful`, …) to concrete provider model strings via `llm_config.yaml`
- switch provider per alias by changing the model-string prefix (`anthropic/`, `azure/`, `gemini/`, `ollama/`, `openai/`) — no code change
- set per-model defaults (`temperature`, `max_tokens`, `reasoning_effort`, …) under `model_params` and have them merged with caller kwargs
- call the LLM blocking via `complete()` and get one normalized result dict, or streaming via `complete_stream()` and get a typed event stream
- pass OpenAI-format `tools` + `tool_choice` to either call style and receive structured tool-call output (assembled progressively when streaming)
- request JSON-formatted output via `complete_json()`, which parses the response and returns `{success, data}` or a structured parse-error dict
- consume native Microsoft `AZURE_OPENAI_*` env vars transparently (auto-mapped to LiteLLM's `AZURE_API_*` names at import time)
- get automatic retry with exponential backoff for transient errors (rate limits, timeouts, 5xx) without writing retry code at the call site

## Invariants (what must always be true)

- Provider exceptions are never raised to the caller of `complete()`: they are returned as `{success: false, error, error_type, model}`. Streaming surfaces them as `{type: "error", message, ...}` events instead of raising.
- Every successful `complete()` result carries `success`, `content` (or `null`), `tool_calls` (or `null`), `usage`, `model`, `actual_model`, and `latency_ms`.
- Every `complete_stream()` consumer sees exactly one terminal event per attempt — either `done` (success) or `error` (failure). Tool calls arrive as a `tool_call_start` followed by zero or more `tool_call_delta` events and one `tool_call_end`.
- `tool_call_start` is emitted as soon as either an `id` or `name` is known for that index, even if the provider front-loads arguments before metadata — otherwise the consumer would drop every subsequent delta and the tool would silently never run.
- HTTP 401, 402, 403, 404, 410 and the auth/quota phrase set (`invalid api key`, `authentication`, `unauthorized`, `permission denied`, `insufficient_quota`, `quota exceeded`, `invalid model`, `invalid request`) are classified non-retryable and fail immediately — they never burn the retry budget.
- Retry backoff is `backoff_multiplier ** attempt` (deterministic; see Known gaps re: jitter).
- The retry loop runs at most `retry_policy.max_attempts` attempts per call; once exhausted the call fails terminally even if the error was retryable.
- The streaming path enforces a per-chunk timeout equal to `retry_policy.timeout`; a mid-stream stall yields an `error` event with a "Stream timed out … between chunks" message instead of hanging indefinitely.
- Model alias resolution falls through: an unknown alias is passed straight to LiteLLM as a literal model string (so `complete(model="anthropic/claude-haiku-4-5")` works without an entry in `models:`).
- A successful call logs the provider-reported `actual_model` alongside the requested model; a mismatch (after stripping provider prefix and version suffix) emits an `llm_response.model_mismatch` warning but does not fail the call.
- `complete_stream()` yields a `done` event whose `usage` dict reflects what the provider sent — empty `{}` if the provider didn't include usage on the final chunk.

## Configuration surface (the YAML keys + env vars operators rely on)

`llm_config.yaml` (path configurable via the service constructor; framework default `src/taskforce/configs/llm_config.yaml`):

- `default_model: <alias>` — alias used when a caller passes `model=None`
- `models: { alias: "<litellm-model-string>" }` — required, must contain at least one entry; provider determined by the model string prefix
- `model_params: { key: { … } }` — per-model parameter overrides. Key match order: exact alias → exact resolved model → bare model name (prefix stripped) → longest-prefix match on resolved → longest-prefix match on bare
- `default_params: { … }` — parameters applied to every call before model-specific overrides and caller kwargs
- `retry: { max_attempts: int=3, backoff_multiplier: float=2.0, timeout: int=60 }` — also accepted under legacy key `retry_policy`
- `logging.log_token_usage: bool` (default `true`) — emit per-call token/latency log lines
- `tracing.enabled: bool` (default `false`), `tracing.mode: file|phoenix|both`, `tracing.file_config.path` — JSONL trace destination

Environment variables (read natively by LiteLLM per provider; the service does not parse them itself):

- `OPENAI_API_KEY` — OpenAI (no model prefix)
- `ANTHROPIC_API_KEY` — `anthropic/…` models
- `GEMINI_API_KEY` — `gemini/…` models
- `AZURE_API_KEY`, `AZURE_API_BASE`, `AZURE_API_VERSION` — `azure/…` models (LiteLLM convention)
- `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_API_VERSION` — auto-mapped at module import to the `AZURE_*` names above (Microsoft convention)

## Event stream contract (`complete_stream`)

Events are members of `LLMStreamEventType` in `core/domain/enums.py`:

- `TOKEN` — `{type: "token", content: str}` — a chunk of assistant text
- `TOOL_CALL_START` — `{type, id, name, index}` — fired exactly once per tool-call index as soon as id or name is known
- `TOOL_CALL_DELTA` — `{type, id, arguments_delta, index}` — one or more per tool call, carrying argument-string fragments
- `TOOL_CALL_END` — `{type, id, name, arguments, index}` — emitted once per tool call when the provider signals `finish_reason`
- `DONE` — `{type, usage}` — always the last event on success; `usage` may be `{}` if the provider didn't report it
- `STREAM_RESTART` — `{type, reason, stage}` — emitted before a content-filter recovery retry; consumers must drop tokens accumulated since the previous `STREAM_RESTART` (or stream start). See `content-filter-recovery.md` for the recovery cascade.

An `error` event terminates the stream and carries `{type, message}` plus, when classifiable, `error_kind` and `non_retryable=True`.

## Tests (must exist and pass)

- spec("llm-service.complete_returns_error_dict_on_provider_exception")
- spec("llm-service.complete_stream_yields_error_event_not_exception")
- spec("llm-service.retry_exponential_backoff_until_max_attempts")
- spec("llm-service.auth_errors_are_non_retryable")
- spec("llm-service.transient_5xx_with_4xx_in_body_stays_retryable")
- spec("llm-service.model_alias_resolves_via_models_map")
- spec("llm-service.unknown_alias_passes_through_as_literal_model")
- spec("llm-service.model_params_merge_order_default_then_model_then_kwargs")
- spec("llm-service.azure_openai_env_vars_are_auto_mapped")
- spec("llm-service.stream_tool_call_start_emits_after_id_or_name_known")
- spec("llm-service.stream_chunk_timeout_yields_error_event")
- spec("llm-service.complete_json_returns_parsed_data_on_success")
- spec("llm-service.complete_json_returns_parse_error_on_invalid_json")
- spec("llm-service.usage_dict_present_on_successful_complete")

## Known gaps

- **Tiktoken estimator hard-fails on unknown model encodings.** The token estimator does not fall back to `cl100k_base` when LiteLLM returns a model whose encoding tiktoken doesn't know, so token-budget code paths can raise for new models. Tracked in #323.
- **Trace writes are fire-and-forget `asyncio.create_task`.** Streaming success/failure traces are scheduled without being awaited; if the event loop closes before they run, traces are silently lost. Tracked in #324.
- **Retry exception filter still uses a bare `except`-style classification in some legacy paths.** `_should_retry` correctly narrows transient vs. terminal errors, but a few call sites in higher layers swallow unrelated exceptions before reaching the classifier. Tracked in #326.
- **`LLMConfigLoader` is not race-safe on first async load.** Two concurrent `await llm.complete(...)` calls against a freshly constructed service can both enter `load_config_async`. The sync fallback in `__init__` makes this benign in practice (config is already loaded by the time async paths see it), but the async path itself has no lock. Tracked in #354.
- **`RetryPolicy` backoff has no jitter.** `backoff_multiplier ** attempt` is deterministic, so concurrent clients retrying after a shared 429 will all wake up at the same wall-clock time and hammer the provider in lock-step. Tracked in #355.
- **No `@pytest.mark.spec` markers exist yet** — the Tests section asserts the target, not the current state. Spec-check will flag every marker as "asserted but missing test" on first run.

# LLM Router — Dynamic Per-Call Model Selection

> **Status:** `shipped` · **Since:** `2026-02-22` · **Last verified:** `2026-05-16` · **ADR:** `ADR-012` · **Owner:** `rudi77`
A transparent decorator around the LLM provider that picks a different model
for each call based on what the caller is doing. Planning strategies tag every
call with a **phase hint** (`planning`, `reasoning`, `acting`, `reflecting`,
`summarizing`); operators map those hints to model aliases via the `routing:`
block in `llm_config.yaml`. The router implements the same protocol as the
underlying provider, so agents and strategies are unchanged. When no rules are
configured, every hint falls back to the default model — fully backward
compatible.

## Capabilities (what the operator can do)

- map a phase hint to any model alias via `routing.rules` (e.g. send `planning` to a stronger model, `summarizing` to a cheap one)
- route by call context, not just hints: `has_tools`, `no_tools`, `message_count > N`
- order rules deliberately — first match wins, later rules ignored once one matches
- disable routing entirely (`routing.enabled: false`) and have all hints resolve to one default model
- override the default model per-router via `routing.default_model` (independent of `default_model` at the top of `llm_config.yaml`)
- pass an explicit known alias as the `model` parameter and bypass all routing rules

## Invariants (what must always be true)

- When the caller passes a model name that is a known alias in the delegate's `models` dict, the router passes it through unchanged — routing rules are not evaluated.
- Hint strings (`planning`, `reasoning`, `acting`, `reflecting`, `summarizing`) that do not match any alias are never sent to the underlying provider; the router resolves them to an alias first.
- When no routing rule matches and no known alias was supplied, the router uses `default_model`.
- Rule evaluation is deterministic and order-sensitive: the first rule whose condition matches wins, regardless of how many later rules could also match.
- A router with zero rules is a valid configuration: it transparently maps every hint to `default_model` while still passing known aliases through.
- The router implements the same `LLMProviderProtocol` as its delegate — wrapping is invisible to agents and planning strategies.
- A malformed condition (e.g. `message_count > abc`) is logged and skipped, never raised — one bad rule cannot break the router.
- `complete_stream` yields every chunk produced by the delegate in order; the router does not buffer, drop, or transform chunks.
- `generate()` does not evaluate routing rules — it only honors explicit known aliases or falls back to `default_model` (no `messages` / `tools` context to route on).

## Configuration surface (the `llm_config.yaml` keys operators rely on)

The router consumes the `routing:` block of `llm_config.yaml`:

- `routing.enabled: bool` (default `false`) — when false, the router is still built (so hints resolve), but no rules are loaded
- `routing.default_model: <alias>` — fallback alias when no rule matches (overrides the global `default_model` for routing purposes only)
- `routing.rules: list[{condition, model}]` — ordered list, first match wins. Supported conditions:
  - `hint:<name>` — matches when the caller passes `<name>` as the `model` parameter
  - `has_tools` — matches when the `tools` argument is a non-empty list
  - `no_tools` — matches when `tools` is None or an empty list
  - `message_count > N` — matches when the `messages` list has more than N items

Reserved hint names (must not be used as aliases in `models:`):
`planning`, `reasoning`, `acting`, `reflecting`, `summarizing`.

## Extension points

# Content-Filter Recovery

> **Status:** `shipped` · **Since:** `2026-05-10` · **Last verified:** `2026-05-16` · **ADR:** `ADR-025` · **Owner:** `rudi77`
When a provider (Azure / OpenAI) rejects a request with a content-policy
error, the LLM service retries it through progressively more aggressive
recovery stages instead of failing the whole agent run. The trigger
usually sits in accumulated tool-result snippets (web fetches, shell
output) — not in the latest user turn — so the cheapest strip runs
first and the expensive `rephrase` stage is the last resort. Streaming
consumers (UI, ReAct loop) are told to discard partial output from the
failed attempt via a `stream_restart` event, and if every stage fails
the user sees an actionable German error message naming the real
cause, not a generic "etwas ging schief" fallback.

## Capabilities (what the operator / user gets)

- transparently retry a content-filter rejection without losing the conversation
- run recovery on both blocking (`complete()`) and streaming (`complete_stream()`) paths
- progress through four stages, stopping at the first one that succeeds: `tool_results_only` → `aggressive` → `no_tools` → `rephrase`
- opt out of the LLM-cost `rephrase` stage by constructing `LiteLLMService(recover_via_rephrase=False)` (default: on)
- tune how many recent user/assistant turns survive the `aggressive` strip via the `recovery_keep_last_n` constructor knob (default 2)
- receive a `stream_restart` event before each retry so accumulated tokens from the failed attempt can be discarded
- get an actionable German user-facing message (`/compact`, new conversation, Azure shield hint) instead of a blank reply when every stage fails

## Invariants (what must always be true)

- A provider error is classified as content-filter iff its message contains one of `_CONTENT_FILTER_KEYWORDS` (`content_policy`, `contentpolicy`, `content filter`, `content manage`); non-content-filter errors fall through to the generic error path with no stripping.
- Recovery stages run in fixed order: `tool_results_only` first, then `aggressive`, then (when tools were originally supplied) `no_tools`, then (when `recover_via_rephrase=True`) `rephrase`. The first stage that succeeds wins and remaining stages are skipped.
- A stage is only attempted if it actually shrinks the message list (`len(stripped) < len(messages)`) — empty strips are skipped so a fresh conversation that triggers the filter on turn one doesn't loop on identical retries.
- The `tool_results_only` strip drops every `role="tool"` message and every assistant turn whose sole purpose was emitting `tool_calls`, then sanitises orphan tool messages so no tool reply is left without its matching assistant call.
- The `aggressive` strip keeps the system prompt plus the last `recovery_keep_last_n` plain user/assistant turns (no tool messages, no tool-call assistant turns); `recovery_keep_last_n` is floored at 1.
- The `no_tools` stage only runs when tools were supplied to the original call AND at least one strip stage already ran — so an output-side filter trigger (tool-call args containing flagged content) gets a chance, but a malformed-request error is not mis-classified as content-filter.
- The `rephrase` stage issues exactly one extra LLM call (small, no tools, `max_tokens=200`, `temperature=0`) tagged with `metadata={"phase": "filter_recovery_rephrase"}` so observability can distinguish it from normal completions.
- On the streaming path, every recovery retry is preceded by a `stream_restart` event carrying `{type, reason: "content_filter", stage: <stage_name>}` so consumers can drop tokens accumulated since the previous restart marker.
- If every stage fails, the final error event is forced to `error_kind="content_filter"` and `non_retryable=True` even when the proximate exception is something else (e.g. a timeout during the rephrase retry) — so the user-visible root cause stays the real one.
- `build_user_message_for_error("content_filter", ...)` returns the actionable German guidance (recommends `/compact`, new conversation, Azure Foundry shield setting) — never the generic "etwas ging schief" line.
- The recovery cascade is identical in shape on both `complete()` and `complete_stream()`; a streaming caller and a blocking caller faced with the same content-filter error see the same number of stages run.

## Configuration surface

- `LiteLLMService(recover_via_rephrase: bool)` constructor flag (default `True`) — controls whether the final rephrase stage runs. The rephrase stage costs one extra small LLM call only on the failure path; turn it off in cost-sensitive deployments.
- `LiteLLMService(recovery_keep_last_n: int)` constructor flag (default `2`, floored at 1) — number of plain user/assistant turns retained by the `aggressive` strip.
- Per-tool `tool_result_store_threshold` and profile-level `agent.tool_result_store_threshold` (see `react-loop.md` / ADR-025) reduce the amount of freeform tool output written into the message log in the first place, which is the most effective way to keep recovery from ever needing to run.

There are no profile-YAML keys for the recovery cascade itself; it is wired by `InfrastructureBuilder` when the LLM service is constructed.

## Event stream contract

Events members of `LLMStreamEventType` in `core/domain/enums.py` (consumed by `react_loop.py`, where they get re-emitted as `EventType.LLM_STREAM_RESTART` on the agent's `StreamEvent` stream):

- `STREAM_RESTART` — `{type: "stream_restart", reason: "content_filter", stage: "tool_results_only" | "aggressive" | "no_tools" | "rephrase"}`. Emitted at the start of every recovery retry on the streaming path. Consumers MUST discard any tokens received since the previous `STREAM_RESTART` (or since stream start). The ReAct loop translates this into `EventType.LLM_STREAM_RESTART` and resets its `content_acc` / `tc_acc` accumulators; `simple_chat` renders a yellow "Antwort wegen Sicherheitsfilter neu generiert" marker.

On terminal failure, the stream's `error` event carries `error_kind="content_filter"` and `non_retryable=True`; the ReAct loop forwards this on the `ERROR` event, and `build_user_message_for_error` converts the kind into the actionable German message.

## Tests (must exist and pass)

- spec("content-filter-recovery.tool_results_only_runs_first")
- spec("content-filter-recovery.stages_run_in_order_until_success")
- spec("content-filter-recovery.empty_strip_skips_stage")
- spec("content-filter-recovery.no_tools_stage_only_when_tools_supplied")
- spec("content-filter-recovery.rephrase_stage_off_when_disabled")
- spec("content-filter-recovery.stream_restart_emitted_before_each_retry")
- spec("content-filter-recovery.final_error_forced_to_content_filter_kind")
- spec("content-filter-recovery.aggressive_strip_keeps_recovery_keep_last_n_turns")
- spec("content-filter-recovery.tool_results_only_drops_orphan_tool_call_assistants")
- spec("content-filter-recovery.complete_and_complete_stream_run_same_cascade")
- spec("content-filter-recovery.build_user_message_returns_actionable_german_guidance")

## Known gaps

- **Orphan `tool_calls` after `tool_results_only` strip.** The strip drops `role="tool"` messages and assistant turns whose only purpose was emitting tool calls, then sanitises orphans — but a mixed assistant turn that carries both `content` AND `tool_calls` is preserved as-is, which can leave dangling tool-call IDs the provider then rejects on retry. Tracked in #325.
- **Double-stripping when `tool_results_only` reduces the list to the same length as `aggressive`.** The current guard `len(aggressive) < len(stages[-1][1])` skips the aggressive stage when it doesn't shrink further, but on certain message shapes the cascade still queues two stages that send byte-identical requests. Tracked in #343.
- **Rephrase stage uses the same model that just got filtered.** It calls `litellm.acompletion(model=resolved_model, ...)` directly with no router hint, so a deployment with a single Azure model behind every alias will rephrase using the same filter profile that rejected the original. The `metadata={"phase": "filter_recovery_rephrase"}` tag is present so a future router rule can divert to a cheaper / less-filtered model, but no such rule ships today.
- **Recovery on the `complete()` (blocking) path is a two-stage cascade only** — `aggressive` and `rephrase`. The streaming path runs the full four stages (`tool_results_only` → `aggressive` → `no_tools` → `rephrase`). The blocking path predates the staged cascade and was not back-ported.
- **No `@pytest.mark.spec` markers exist yet** — the Tests section asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.

# Wiki Long-Term Memory

> **Status:** `shipped` · **Since:** `2026-04-22` · **Last verified:** `2026-05-16` · **ADR:** `ADR-020` · **Owner:** `rudi77`
The agent's long-term memory is a personal wiki of markdown files that the
agent curates itself: one page per topic, grouped under `entities/`,
`preferences/` and `concepts/`, plus a generated `index.md` catalogue and an
append-only `log.md`. Recall is on-demand — the agent calls the `wiki` tool
when it needs prior context. There is no background consolidation, decay,
or auto-injection of page bodies into the system prompt by default.

## Capabilities (what the user can do)

- give the agent a `wiki` tool that can list, read, search, write, update a single section, delete and log against the wiki
- have the agent search the wiki at the start of a new topic and update the matching page in place instead of asking again
- organise pages by kind (`entities/`, `preferences/`, `concepts/`) via the page name (`<kind>/<slug>`)
- open and edit the wiki directly on disk in any markdown editor — the store is just files under `<work_dir>/memory/wiki/`
- list and render pages from the CLI (`taskforce wiki list`, `taskforce wiki show <name>`)
- run a manual lint pass (`taskforce wiki lint`) that reports orphans, duplicate titles and broken `[[wiki-links]]`
- list and read pages over REST without granting the agent any write surface
- swap the file-backed store for a tenant-scoped implementation via a plugin override (used by `taskforce-enterprise` for per-(tenant, user) wikis)

## Invariants (what must always be true)

- **Wiki content is never auto-injected into the agent's system prompt — recall is on-demand via the `wiki` tool only.** The default `WikiContextConfig` has `top_k_relevant=0` and `include_index=False`; profiles must opt-in explicitly to change this.
- A page name resolves to exactly one file at `<root>/<name>.md`. Reserved names `index` and `log` cannot be used as page names.
- Page-name validation rejects path traversal: absolute paths, segments containing `..`, drive-letter colons, and backslash/forward-slash escapes from the wiki root are all refused before any I/O.
- `index.md` is regenerated by the store after every `write_page`, `update_section` or `delete_page`. Agents must not edit it directly; their edits will be overwritten on the next mutation.
- `log.md` is append-only. The store has no API to truncate or rewrite log history; entries are timestamped at write-time in UTC.
- Deleting a page removes the file and refreshes the index, but never touches other pages or the log.
- `write_page` preserves the original `created_at` when overwriting an existing page; only `updated_at` advances. A correction via `update_page(mode="replace")` on one section never resets the page's `created_at` either.
- Search is keyword-based over title + body + tags + page name. An empty query returns no results; results are scored and ranked, with title hits weighted higher than body hits.
- An MCP / plugin store override (`set_wiki_store_override`) is consulted on every `build_wiki_store` call — the framework does not cache the override, so installs and uninstalls take effect immediately.

## API surface (the contract clients depend on)

- GET /api/v1/memory/list → 200 (list of wiki page summaries)
- GET /api/v1/memory/page/{name} → 200 (full page including body)
- GET /api/v1/memory/page/{name} → 404 if missing

## Configuration surface (the profile keys / env vars operators rely on)

- `tools: [..., wiki]` — registers the `wiki` tool for an agent. Without it, the agent has no long-term memory surface.
- `wiki.store_dir: <path>` — wiki root directory. Defaults to `<persistence.work_dir>/memory/wiki`.
- `wiki.context_injection.include_index: <bool>` (default `false`) — when `true`, injects `index.md` into the system prompt at session start.
- `wiki.context_injection.top_k_relevant: <int>` (default `0`) — when `>0`, injects up to N page summaries matching the mission. `0` means "no relevant-page hooks at all" and is not coerced to 1.
- `wiki.context_injection.max_total_chars: <int>` (default `2000`) — hard cap on the injected block; the loader truncates with an ellipsis when exceeded.
- `TASKFORCE_WORK_DIR` — base directory; the REST routes resolve the wiki root from this when no override is installed.

## Extension points

- `set_wiki_store_override(work_dir → WikiStoreProtocol)` in `taskforce.application.infrastructure_overrides` — replaces the default `FileWikiStore` for REST and tool builds. Used by `taskforce-enterprise` to scope wikis per (tenant, user).
- `WikiStoreProtocol` in `taskforce.core.interfaces.wiki_store` — structural contract. Any implementation with `list_pages` / `get_page` / `search` / `write_page` / `update_section` / `delete_page` / `append_log` / `read_index` satisfies the framework.
- `memory_specialist` sub-agent (`agents/butler/configs/custom/memory_specialist.yaml`) — recommended replacement for prompt-level auto-injection: a master delegates recall queries and receives a structured JSON payload so raw page bodies never enter the master's context.

## Tests (must exist and pass)

- spec("wiki-memory.write_page_creates_file_and_refreshes_index")
- spec("wiki-memory.write_page_preserves_created_at_on_overwrite")
- spec("wiki-memory.update_section_append_keeps_other_sections")
- spec("wiki-memory.update_section_replace_overwrites_only_target")
- spec("wiki-memory.delete_page_removes_file_and_refreshes_index")
- spec("wiki-memory.search_ranks_title_hits_above_body_hits")
- spec("wiki-memory.empty_query_returns_no_results")
- spec("wiki-memory.page_name_rejects_path_traversal")
- spec("wiki-memory.page_name_rejects_reserved_names")
- spec("wiki-memory.log_is_append_only_and_timestamped")
- spec("wiki-memory.default_config_does_not_inject_wiki_into_system_prompt")
- spec("wiki-memory.opt_in_injection_respects_max_total_chars")
- spec("wiki-memory.rest_memory_list_returns_page_summaries")
- spec("wiki-memory.rest_memory_page_missing_returns_404")
- spec("wiki-memory.store_override_is_consulted_per_build")

## Known gaps

- **FileWikiStore is not concurrency-safe.** `write_page` and `update_section` do a read-modify-write without a lock, so two parallel `wiki(action=write_page)` calls on the same page lose one of the updates. Tracked in #307.
- **Opt-in context injection bypasses content-filter recovery.** If a profile sets `wiki.context_injection.top_k_relevant > 0` or `include_index: true`, page bodies enter the system prompt and the recovery pipeline in ADR-025 cannot strip them — Azure / OpenAI content filters then break the session permanently. This is the original reason the default is OFF.
- **`taskforce wiki lint` is manual only.** Orphans, duplicate titles and broken `[[wiki-links]]` accumulate silently until the user runs the command. No scheduler integration ships.
- **Search is purely keyword-based** (substring + 4-char prefix fallback). No embeddings, no BM25 tuning; relevance degrades past a few hundred pages. Future work in ADR-020.
- **No migration from the record-based memory.** Old `memory.md` is renamed to `memory.md.archive-YYYY-MM-DD` and not loaded. Users who want preferences carried forward copy them manually.
- **No backend `@pytest.mark.spec` markers exist yet** — the Tests section above asserts the target, not current state.

- adr: ADR-020 (Wiki-Style Long-Term Memory — supersedes ADR-007 / 013 / 014)
- adr: ADR-025 (Tool result context isolation — context-filter rationale for default-off injection)

- related_spec: multi-tenant.md (per-(tenant, user) wiki scoping via the override hook)

# Conversation Persistence — Persistent Dialogue Units

> **Status:** `shipped` · **Since:** `2026-03-18` · **Last verified:** `2026-05-16` · **ADR:** `ADR-016` · **Owner:** `rudi77`
A conversation is a long-lived, file-backed dialogue between the user and the
agent that survives process restart. Each message the user sends is appended
to the conversation's history and the agent's reply is appended back. Users
can fork a conversation to replay it under a different profile, archive it
when finished, compact it to free context window, or hard-delete it. The
streaming endpoint pushes agent progress (tokens, tool calls, final answer)
to clients via Server-Sent Events.

## Capabilities (what the user can do)

- create a new conversation on a given channel (`rest`, `cli`, `telegram`, ...)
- list active conversations, newest activity first
- list archived conversations (with optional limit)
- get the full message history (or the most recent N messages) for a conversation
- append a message and receive the agent's reply in one round-trip
- stream the agent's reply token-by-token via SSE
- attach previously-uploaded files (`POST /api/v1/files`) to a message
- fork a conversation from message index N into a fresh conversation
- compact a conversation by summarizing earlier turns into a single system message
- archive a conversation (optionally with a user-supplied summary)
- hard-delete a conversation (irreversible — removes index entry and message log)
- bind a new conversation to a project so the agent's working directory becomes the project path (see related_spec: cowork.md)

## Invariants (what must always be true)

- Creating a new conversation for a channel/sender pair archives any previously active conversation for that same channel/sender — there is at most one active conversation per (channel, sender) at any time.
- `get_or_create` is idempotent for a given (channel, sender): repeated calls return the same id until the conversation is archived or deleted.
- Auto-archival fires on `get_or_create` for any active conversation idle beyond the inactivity threshold (default 24 h); stale conversations transition to `archived` before a new id is returned.
- `archive` is reversible by inspection (the data is still there) but the conversation no longer appears in the active list. `delete` is irreversible — both index entry and message log are purged.
- `delete` returns 404 when the id does not exist; the active-list scan is the source of truth for existence.
- Streaming reply persistence is best-effort but never silent: a cancelled or failed stream still appends an assistant message — with a `[partial — interrupted]` marker when tokens were received but no `complete` event arrived, or the structured error text when an `ERROR` event was the only output, or the literal `[no response]` placeholder when nothing at all came back.
- Append (both `POST /messages` and the SSE variant) persists the user message BEFORE the agent runs — a crash mid-execution does not lose user input.
- When a conversation has a `project_id`, the executor runs with `work_dir` set to that project's path; conversations without `project_id` fall back to the profile's configured `persistence.work_dir`.
- A referenced project that has been deleted does NOT block a chat reply — the executor falls back to the default work directory and the message is still answered.
- `compact` is refused (returns `status="skipped"`, `reason="below_threshold"`) when there are not enough messages to be worth summarizing (`len(messages) <= keep_last_n + 1`); it never produces a destructive write in that case.
- `compact` rejects an empty/whitespace summary from the summarizer rather than silently destroying history.
- `fork` strips volatile per-message fields (`message_id`, `timestamp`, `conversation_id`, `sequence`, ...) from the copied payloads so the new conversation's storage layout is internally consistent; tool-call linkage fields (`tool_calls`, `tool_call_id`, `name`) are preserved so the forked transcript still validates against provider APIs.

## API surface (the contract clients depend on)

- POST   /api/v1/conversations → 201 created
- POST   /api/v1/conversations → 400 when `project_id` references an unknown project
- GET    /api/v1/conversations → 200 (list of active, optional `project_id` query filter)
- GET    /api/v1/conversations/archived → 200 (optional `limit` query, default 20, max 100; optional `project_id` filter)
- GET    /api/v1/conversations/{id}/messages → 200 (optional `limit` query)
- POST   /api/v1/conversations/{id}/messages → 200 with agent reply
- POST   /api/v1/conversations/{id}/messages → 400 on empty message or unknown attachment file_id
- POST   /api/v1/conversations/{id}/messages/stream → 200 SSE stream (`message_persisted`, raw progress events, `assistant_persisted`, `error`)
- POST   /api/v1/conversations/{id}/messages/stream → 400 on empty message
- POST   /api/v1/conversations/{id}/archive → 204
- DELETE /api/v1/conversations/{id} → 204
- DELETE /api/v1/conversations/{id} → 404 if missing
- POST   /api/v1/conversations/{id}/fork → 201 with `{conversation_id, source_id, messages_copied}`
- POST   /api/v1/conversations/{id}/compact → 200 with `{status, summarized, kept, summary_preview}` or `{status="skipped", reason, messages}`
- POST   /api/v1/conversations/{id}/compact → 404 when the conversation does not exist

For project binding, see related_spec: cowork.md (`project_id` body field on
create; `project_id` query filter on list).

## Event stream contract (SSE — `/messages/stream`)

The SSE stream forwards the agent's `StreamEvent`s as raw `data:` lines
(JSON-serialised `ProgressUpdate`) and frames the boundaries with named events.

- `message_persisted` — fires once before the agent runs; payload: `{conversation_id}`
- raw `data: {...}` lines — every executor `ProgressUpdate` (LLM tokens, tool calls, plan updates, final answer)
- `: ping` — SSE comment emitted every `TASKFORCE_SSE_PING_INTERVAL` seconds (default 10 s; floor 0.1 s) to keep reverse-proxy connections warm
- `assistant_persisted` — final event; payload: `{conversation_id, completed: bool, content}` — fires from the `finally` block, so cancelled streams still emit it
- `error` — replaces `assistant_persisted` when the producer raises; payload: `{error, error_type}`

## Configuration surface

- `TASKFORCE_SSE_PING_INTERVAL` — float seconds between SSE keepalive pings (default 10.0, min 0.1)
- `TASKFORCE_WORK_DIR` — base directory under which `conversations/{id}/messages.json` is stored when no project is bound (default `.taskforce`)
- `ConversationManager(inactivity_threshold_hours=...)` — auto-archive threshold (default 24 h); set at manager construction in the infrastructure builder

## Tests (must exist and pass)

- spec("conversations.create_archives_previous_active")
- spec("conversations.get_or_create_idempotent_per_channel_sender")
- spec("conversations.auto_archive_stale_on_get_or_create")
- spec("conversations.append_persists_user_message_before_agent_runs")
- spec("conversations.stream_persists_partial_on_cancel")
- spec("conversations.stream_persists_error_message_when_no_tokens")
- spec("conversations.delete_returns_404_when_missing")
- spec("conversations.fork_copies_messages_and_strips_volatile_fields")
- spec("conversations.fork_preserves_tool_call_linkage")
- spec("conversations.compact_below_threshold_is_noop")
- spec("conversations.compact_rejects_empty_summary")
- spec("conversations.compact_returns_404_for_unknown_id")
- spec("conversations.project_bound_conversation_routes_workdir_to_project_path")

## Known gaps

- **No ownership or tenant-scoping on any conversation route.** Any authenticated caller can list, read, append to, fork, compact, archive, or delete any conversation by id. Tracked in #279.
- **`fork` is not atomic.** It creates the target conversation, then appends messages one at a time; a crash mid-loop leaves a partially-populated forked conversation in the index. Tracked in #314.
- **The fork copy loop is naive — large transcripts incur N round-trips to the store and no transactional guarantee that the source is unchanged during the copy.** Tracked in #336.
- **SSE `error` events leak the exception type and message** (`{error, error_type}`) — recon material for attackers probing the agent. Tracked in #287.
- **The SSE stream does not emit a typed `error` event for executor-level failures** mid-stream; downstream errors only surface as the producer exception in the `error` SSE frame, which clients have to parse out of band. Tracked in #288.
- **The streaming endpoint does not detect client disconnects** and keeps the executor running until completion even after the SSE consumer has gone away. Tracked in #310.
- **Archived conversations are not paginated by cursor**, only by `limit` (max 100). Long history lists clip silently.

# Settings Store — UI-Managed Runtime Config

> **Status:** `shipped` · **Since:** `2026-04-02` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
Operators configure runtime secrets (LLM keys, channel bot tokens, OAuth
metadata, default-agent routing, visible-agent overrides, approval
bypass) through the web UI instead of editing profile YAML or shell
env vars. Each kind of config lives in its own opaque JSON "section",
the whole document is Fernet-encrypted at rest, and writes are
hydrated into process state (env vars, override hooks) immediately so
changes take effect without a restart. Enterprise installs swap the
store for a tenant-scoped backend via an override hook.

## Capabilities (what the user can do)

- list every section currently stored, alongside the catalogue of framework-known section names
- read, replace, and delete any section by name (well-known or plugin-defined)
- store LLM provider credentials (openai, anthropic, azure, google, ollama) and have them hydrated into env vars on the next request
- store communication-channel credentials (Telegram bot token, Teams app id/secret) and have the gateway pick them up on the next request without a restart
- declare a list of approval-bypass tools that skip the approval gate even when the tool defaults to "requires approval"
- override the deployment manifest's visible-agent list at runtime
- manage multiple Telegram bots per tenant (add, list, edit, delete) with per-bot owner, pairing mode, default agent
- probe a stored LLM provider's credentials with a minimal completion before relying on them
- send a real test message via a configured channel (by channel name or by specific bot id) to verify credentials work
- list configured OAuth connections (provider, scopes, expiry) and revoke any one of them

## Invariants (what must always be true)

- The on-disk settings document is encrypted at rest with Fernet; without the master key it is unreadable.
- A partial write cannot corrupt the store — writes are atomic (temp file + rename), so power loss mid-write leaves either the old or the new document intact, never a half-written one.
- The master key resolves from `TASKFORCE_SECRETS_KEY` first, then `<work_dir>/.secrets.key`; the key file is auto-generated on first run when neither source is present.
- Every settings mutation (PUT or DELETE) re-runs the hydrator for the affected section before the response is returned, so the next request sees the new values.
- Writing the `channels` section invalidates the cached gateway and gateway-components so the next inbound/outbound call rebuilds with fresh credentials.
- Settings-store values override env vars when both are present — the UI is authoritative.
- Hydration is additive: env vars the operator set externally are never cleared by a missing settings value.
- Every settings, OAuth, and bot endpoint requires the `tenant:manage` permission; an unauthenticated or under-privileged caller cannot read or mutate any section.
- A non-admin caller never sees another user's private bot in the list endpoint, and never sees an unmasked bot_token for a bot they do not own.
- Creating or modifying a tenant-owned bot requires `tenant:manage`; a regular user can only manage user-owned bots whose `owner_user_id` is their own.
- Bot ids are unique within a tenant; creating a duplicate id returns 409.
- A bot CRUD operation triggers the BotPollerManager to reconcile running pollers; a manager failure is logged but never fails the HTTP write.
- The LLM-provider probe and channel test endpoints re-hydrate from the store first, so they always probe with the latest saved credentials, not stale env values.

## API surface (the contract clients depend on)

- GET    /api/v1/settings → 200 (list of section names + known-sections catalogue)
- GET    /api/v1/settings/{section} → 200
- GET    /api/v1/settings/{section} → 404 if the section was never written
- PUT    /api/v1/settings/{section} → 200 (returns the freshly-stored payload)
- DELETE /api/v1/settings/{section} → 204
- POST   /api/v1/settings/llm-providers/{provider}/test → 200 with `{ok, detail}`
- POST   /api/v1/settings/channels/{channel}/test → 200 with `{ok, detail}`
- GET    /api/v1/settings/channels/bots → 200 (caller-visible bot list, tokens masked unless caller is owner or admin)
- POST   /api/v1/settings/channels/bots → 201 created
- POST   /api/v1/settings/channels/bots → 400 on invalid bot id / payload
- POST   /api/v1/settings/channels/bots → 403 when creating a tenant-owned bot without `tenant:manage`, or a cross-user user-owned bot
- POST   /api/v1/settings/channels/bots → 409 on duplicate bot id
- PATCH  /api/v1/settings/channels/bots/{bot_id} → 200
- PATCH  /api/v1/settings/channels/bots/{bot_id} → 400 on path/payload id mismatch
- PATCH  /api/v1/settings/channels/bots/{bot_id} → 403 when caller is neither owner nor admin
- PATCH  /api/v1/settings/channels/bots/{bot_id} → 404 if the bot does not exist
- DELETE /api/v1/settings/channels/bots/{bot_id} → 204 (idempotent: 204 even if bot is unknown)
- DELETE /api/v1/settings/channels/bots/{bot_id} → 403 when caller is neither owner nor admin
- POST   /api/v1/settings/channels/bots/{bot_id}/test → 200 with `{ok, detail}`
- POST   /api/v1/settings/channels/bots/{bot_id}/test → 403 when caller is neither owner nor admin
- POST   /api/v1/settings/channels/bots/{bot_id}/test → 404 if the bot does not exist
- GET    /api/v1/settings/channels/bot-pollers → 200 (list of bot ids whose poller is running)
- GET    /api/v1/oauth/connections → 200 (list of connections + `auth_manager_available` flag)
- DELETE /api/v1/oauth/connections/{provider} → 204
- DELETE /api/v1/oauth/connections/{provider} → 503 when AuthManager is not configured

## Configuration surface (the profile keys / env vars operators rely on)

- `TASKFORCE_SECRETS_KEY` — Fernet master key (base64-encoded 32-byte secret). Strongly preferred for production so the key lives outside `work_dir`.
- `<work_dir>/.secrets.key` — fallback master key, auto-generated on first run. Chmod 0o600 on POSIX; Windows ACL hardening is the operator's responsibility.
- `<work_dir>/settings.json.enc` — the encrypted settings document itself.

## Extension points (for plugins / enterprise / external use)

- `set_settings_store_override` in `taskforce.application.infrastructure_overrides` — replace the file-based store with a tenant-scoped backend (e.g. Postgres). Resolved by `InfrastructureBuilder.build_settings_store`; every settings route, hydrator call, and connection-test probe goes through the override.

## Tests (must exist and pass)

- spec("settings-store.put_then_get_round_trips_payload")
- spec("settings-store.get_unknown_section_returns_404")
- spec("settings-store.delete_unknown_section_is_204")
- spec("settings-store.document_is_fernet_encrypted_at_rest")
- spec("settings-store.write_is_atomic_under_simulated_crash")
- spec("settings-store.env_key_overrides_work_dir_key_file")
- spec("settings-store.put_llm_providers_hydrates_env")
- spec("settings-store.put_channels_clears_gateway_cache")
- spec("settings-store.hydration_does_not_clear_external_env_vars")
- spec("settings-store.all_routes_require_tenant_manage")
- spec("settings-store.bot_list_masks_other_users_tokens_for_non_admin")
- spec("settings-store.bot_create_duplicate_id_returns_409")
- spec("settings-store.bot_create_tenant_owned_without_admin_returns_403")
- spec("settings-store.bot_crud_triggers_poller_reconcile")
- spec("settings-store.oauth_revoke_without_auth_manager_returns_503")

## Known gaps

- **GET on any section returns the payload as-is** — secret fields (api keys, bot tokens, OAuth refresh tokens) are not server-side redacted. Any caller with `tenant:manage` can read every credential in plaintext. UI masks fields client-side, but the contract leaks them. Tracked in #281.
- **`.secrets.key` is not chmod-restricted on Windows.** The 0o600 fallback is POSIX-only; on Windows the auto-generated key file inherits default ACLs and may be world-readable. Tracked in #282.
- **`TASKFORCE_SECRETS_KEY` lives in the process env**, where any subprocess (tool execution, MCP server, native shell calls) inherits it. A compromised tool can exfiltrate the master key trivially. Tracked in #283.
- **No path-traversal protection on `{section}`** — the route accepts any string and forwards it to the store. The file-based store treats sections as JSON-dict keys (no filesystem traversal), but an alternative store backend that maps section → file path would be vulnerable. Tracked in #291.
- **Bot-token masking on list-endpoint is partial** — only the `bot_token` field is masked; future channel types whose secret lives under a different key (e.g. Teams `app_password`) will currently return unmasked. Tracked in #294.
- **The store is not multi-process-safe.** Two backend workers writing concurrently can clobber each other's writes (last-writer-wins). Acceptable today because admin paths are infrequent and single-tenant, but a hosted multi-tenant deployment would need a database-backed store.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state.

# Communication Gateway — Unified Channel Layer

> **Status:** `shipped` · **Since:** `2026-02-06` · **Last verified:** `2026-05-16` · **ADR:** `ADR-009` · **Owner:** `rudi77`
A single entry point that lets the agent talk to users on any external
communication channel (Telegram, MS Teams, Slack, generic webhooks, REST).
The same gateway handles inbound messages, raw provider webhooks (with
signature verification and attachment download), proactive push, broadcasts,
and the `/link <code>` pairing flow that ties a channel sender to a logical
user. Channel-specific behaviour is hidden behind protocol implementations
so the agent code stays channel-agnostic.

## Capabilities (what the user can do)

- send a message from any configured channel and get an agent reply
- have a third-party provider (Telegram bot, Teams webhook) deliver raw webhook payloads that the gateway normalises and dispatches
- receive proactive push notifications from the agent on a single channel
- be one of many recipients of a broadcast on a channel
- mint a one-time pairing code in the web UI and pair their channel account by typing `/link <code>` on that channel
- remove their own channel pairings on demand
- list which channels are currently configured

## Invariants (what must always be true)

- Raw webhook payloads must pass channel-specific signature verification before any agent code runs. A failed signature returns 401 and the payload is discarded.
- A `/link` pairing code is single-use; a second consumption returns null and the link is unchanged.
- Pairing codes expire after their TTL (60–3600 seconds, default 600). An expired or unknown code returns null on consume.
- Two unexpired pairing codes for the same channel cannot collide.
- The `/link` command in chat is intercepted by the gateway BEFORE the recipient resolver runs, so an unpaired user can complete pairing without being known to the identity layer.
- Inbound Telegram attachments (photos, documents) are auto-downloaded server-side and added to the message before agent execution.
- Sender and adapter configurations (bot tokens, credentials) are re-read per outbound call so live updates via the settings store apply immediately.
- A new `/link` from a sender that was already paired overwrites the existing link (operator intent: the newest pairing always wins).
- Conversation history and session mapping survive process restart (file-backed by default).

## API surface (the contract clients depend on)

- POST /api/v1/gateway/{channel}/messages → 200 with agent reply
- POST /api/v1/gateway/{channel}/messages → 400 on empty message
- POST /api/v1/gateway/{channel}/webhook → 200 with agent reply
- POST /api/v1/gateway/{channel}/webhook → 400 on unknown channel or malformed payload
- POST /api/v1/gateway/{channel}/webhook → 401 on signature verification failure
- POST /api/v1/gateway/notify → 200 with per-recipient success/error
- POST /api/v1/gateway/notify → 400 on empty message
- POST /api/v1/gateway/broadcast → 200 with per-recipient breakdown (total/sent/failed)
- POST /api/v1/gateway/broadcast → 400 on empty message
- GET  /api/v1/gateway/channels → 200 with sorted list of channel names
- POST /api/v1/gateway/{channel}/link-codes → 200 with code, channel, expires_at, ttl_seconds
- POST /api/v1/gateway/{channel}/link-codes → 400 on TTL out of range (60–3600)
- DELETE /api/v1/gateway/{channel}/links/me → 200 with count of removed links

## Extension points

All eight protocols below can be replaced by enterprise plugins or host
applications via override functions in `taskforce.application.infrastructure_overrides`.
The framework ships file-based / in-memory defaults for everything except
`AgentLookupProtocol` and `WorkflowLookupProtocol` (no default — without
them, `@name` mentions fall through to plain text).

- `OutboundSenderProtocol` — channel-specific message and file dispatch
- `InboundAdapterProtocol` — channel-specific payload normalisation and signature verification
- `ConversationStoreProtocol` — channel-agnostic session mapping and history persistence
- `RecipientRegistryProtocol` — persistent store for push-notification recipient references
- `RecipientResolverProtocol` — channel identity → logical recipient mapping (pass-through default; enterprise: identity-aware)
- `ChannelLinkRegistryProtocol` — pairing flow registry (file default; enterprise: postgres tenant-scoped)
- `AgentLookupProtocol` — `@agent_name` mention resolution (tenant-scoped by construction; no framework default)
- `WorkflowLookupProtocol` — `@workflow_name` mention resolution (tenant-scoped by construction; no framework default)

## Known gaps

- **No authentication on `POST /notify` and `POST /broadcast`** — anyone with network access can send notifications to any registered recipient. Tracked in #278; once fixed, add `requires permission "notify:send"` claims to the API surface.
- **`POST /messages` accepts client-supplied `user_id`, `org_id`, `scope`** in the body and passes them straight to the executor as user context. An attacker can spoof identity for RAG queries. Tracked in #280.
- **Webhook signature verification has no replay protection.** A captured legitimate payload can be replayed indefinitely. Tracked in #285.
- **Telegram `InboundAdapter.verify_signature()` fail-opens** when no bot token is configured or when the secret-token header is missing. A misconfigured production instance silently accepts any payload. Tracked in #286.
- **SSE stream error events leak stack traces** including exception type and message — recon material. Tracked in #288.
- **`_download_telegram_attachments` reads `TELEGRAM_BOT_TOKEN` from `os.getenv` directly**, bypassing the settings store. Live token rotation via settings does not affect attachment downloads.

# ChannelAskRouter — Per-Channel Question/Answer Routing

> **Status:** `shipped` · **Since:** `2026-03-15` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
When the agent decides it needs more information from a human, it calls the
`ask_user` tool. If the question carries a `channel` + `recipient_id` (e.g.
`telegram`, `teams`) the ChannelAskRouter delivers it via the Communication
Gateway to the paired user on that channel, pauses the agent, and resumes
the execution once the user replies. Plain (non-channel) `ask_user` calls
still go to the originating session (web/REST/CLI). The pairing flow itself
(`/link <code>`) is owned by the gateway — this spec is only about the
question/answer round-trip that runs on top of it.

## Capabilities (what the user can do)

- ask a question from any agent on any channel via `ask_user(channel="…", recipient_id="…", question="…")`
- omit `channel`/`recipient_id` and have the question delivered to the originating session (web chat, REST caller, CLI)
- have the question inherit `channel` + `recipient_id` automatically when the agent omits them but the conversation came in over a channel
- answer on the same channel the question arrived on and have the agent resume from exactly that point
- answer through the web/REST chat path even when the question was sent over a channel (web path uses the standard pause/resume; channel path uses the polling router)
- pair a channel sender to a logical user via `/link <code>` (owned by gateway) so future channel-targeted asks can address them

## Invariants (what must always be true)

- An `ask_user` event with no `channel` AND no `recipient_id` is always treated as a plain pause — it goes through the normal session pause/resume, not the channel router.
- An `ask_user` event with both `channel` and `recipient_id` is always routed through the gateway and never delivered to the originating session.
- An `ask_user` event with only `channel` (no `recipient_id`) is completed from the source conversation's `recipient_id` before routing — the router never sends a question without a recipient.
- A channel question that the gateway fails to send returns no response (router returns `None`); the agent surfaces the failure rather than waiting indefinitely.
- The pending entry for a channel question is cleared once a response is received, so a follow-up message from the same sender starts a fresh inbound flow.
- The pending entry for a channel question is also cleared on poll timeout, so a later unrelated message from the same sender is not silently consumed as the answer to a stale question.
- A response is matched to a pending question by `(channel, sender_id)`; a sender with no pending question goes through the normal inbound flow.
- A pending question is single-resolve: once an answer is stored, a second inbound message from the same sender does not overwrite it.
- A pending question survives process restart (file-backed by default), so an agent that was waiting before restart still resumes correctly afterwards.
- The `/link` pairing intercept runs before the recipient resolver (see gateway spec), so an unpaired sender can complete pairing without a known logical user.

## Configuration surface

- ChannelAskRouter currently hardcodes `poll_interval = 2.0s` and `max_wait = 600s` (10 minutes) for channel-targeted asks. Neither is operator-configurable today — see Known gaps.
- Plain (non-channel) `ask_user` uses the standard pause/resume from the ReAct loop and is bounded by `agent.max_steps`, not by a wall-clock timeout.

## Event stream contract

The router does not introduce new event types. It consumes / completes
existing `ASK_USER` events emitted by the ReAct loop (see `react-loop.md`):

- `ASK_USER` (plain) — `data` has `question` only; handled by the originating session.
- `ASK_USER` (channel-targeted) — `data` carries `channel` + `recipient_id` + `question`; consumed by the router, which sends and polls. The downstream `ProgressUpdate` is annotated with `channel_routed: true` (question sent) or `channel_response_received: true` (answer received).

## Extension points

- `PendingChannelQuestionStoreProtocol` in `taskforce.core.interfaces.channel_ask` — host applications can replace the default file-backed store (e.g. a Postgres-backed store for multi-tenant deployments). The framework default is `FilePendingChannelQuestionStore` writing under `<work_dir>/pending_channel_questions/`.
- The router itself depends only on the gateway's `send_channel_question` / `poll_channel_response` / `clear_channel_question` methods; alternative gateway implementations that honour those three methods are drop-in.

## Tests (must exist and pass)

- spec("channel-ask.plain_ask_uses_session_pause")
- spec("channel-ask.channel_ask_routes_via_gateway")
- spec("channel-ask.missing_recipient_filled_from_source")
- spec("channel-ask.send_failure_returns_none")
- spec("channel-ask.response_clears_pending_entry")
- spec("channel-ask.timeout_clears_pending_entry")
- spec("channel-ask.response_matched_by_channel_and_sender_id")
- spec("channel-ask.pending_entry_single_resolve")
- spec("channel-ask.pending_entry_survives_restart")

## Known gaps

- **No inner timeout on `poll_channel_response`** — each poll iteration awaits the store call without its own deadline; a hung store call blocks the agent indefinitely despite the outer `max_wait` budget. Tracked in #338.
- **`PendingChannelStore` has no TTL** — entries that are never resolved and never time out (e.g. on a crash mid-poll) accumulate on disk. There is no background sweeper. Tracked in #348.
- **Race when the user answers on two channels in parallel** — if the same sender is paired on multiple channels and both reply simultaneously, the resolve order is non-deterministic and the loser's answer is dropped instead of queued. Tracked in #309.
- **`poll_interval` and `max_wait` are hardcoded** (2s / 600s) — operators cannot tune them per profile or per call. Long-form questions on Teams routinely need more than 10 minutes.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.

# Event Sources & Scheduler — External Triggers for the Agent

> **Status:** `shipped` · **Since:** `2026-02-18` · **Last verified:** `2026-05-16` · **ADR:** `ADR-010` · **Owner:** `rudi77`
The framework's mechanism for letting external systems and timers drive the
agent. Event sources translate calendar entries, IMAP mail, file-system
changes, generic webhooks, and GitHub deliveries into `AgentEvent`s. The
scheduler fires cron, interval, and one-shot jobs into the same event stream.
Profile authors declare both via YAML; agent packages (e.g. butler) consume
the resulting events. Webhooks are exposed through a single generic HTTP
endpoint that hands the raw body to the matching source — provider-specific
signature verification stays inside the source.

## Capabilities (what the operator/profile-author can do)

- register a polling event source by short name (`calendar`, `imap_email`, `file_watcher`) from profile YAML
- register a push event source (`webhook`, `github`) and receive its payloads via the generic events endpoint
- schedule cron, interval, or one-shot jobs that publish `schedule.triggered` events
- attach a `ScheduleAction` (execute_mission / send_notification / publish_event / execute_workflow) to each job
- pause, resume, list, and remove jobs at runtime via the `SchedulerProtocol`
- persist scheduled jobs across restarts (file-backed by default)
- choose a per-job IANA timezone for cron expressions and naive one-shot datetimes
- pick a catch-up policy for runs missed during downtime (`coalesce: skip` or `run_once`)
- plug additional sources via the `taskforce.application.event_source_registry` (`register_event_source(name, factory)`)

## Invariants (what must always be true)

- A GitHub webhook with a mismatched HMAC signature is rejected with HTTP 401 before any agent code runs; the payload is dropped.
- A webhook addressed to an unregistered source name returns HTTP 404; a source that exists but cannot accept inbound HTTP (no `handle_inbound`) returns HTTP 400.
- A request body that is not valid JSON returns HTTP 415; the source is never invoked.
- A successful inbound delivery returns HTTP 202 with `{event_id, source, status: "accepted"}`.
- Scheduled jobs survive process restart: persisted state is restored on `SchedulerService.start()`.
- A one-shot job whose `last_fired_at` is already set is dropped at startup and never re-fires (crash-safe).
- `last_fired_at` and `last_run` are persisted **before** the job's action runs, so a crash mid-fire cannot duplicate it on restart.
- Cron expressions are evaluated in the job's IANA timezone; a non-existent local wall clock (DST forward gap) is skipped to the next valid match.
- Ambiguous local times on a DST backward jump resolve to a single UTC instant (`fold=0`), so each cron slot fires exactly once per day.
- Polling event sources never raise out of `_poll_loop`; per-cycle errors are logged and the loop continues at the next interval.
- Registering an event source name a second time without `replace=True` raises `ValueError` instead of silently shadowing the existing factory.

## API surface (the contract clients depend on)

- POST /api/v1/events/{source_name} → 202 with `{event_id, source, status}`
- POST /api/v1/events/{source_name} → 401 on signature verification failure
- POST /api/v1/events/{source_name} → 404 when no active source matches the name
- POST /api/v1/events/{source_name} → 400 when the source has no `handle_inbound` method
- POST /api/v1/events/{source_name} → 415 when the body is not valid JSON

The scheduler has no REST surface in the framework core; it is managed
in-process via `SchedulerProtocol` (and the agent-facing `schedule` tool).

## Configuration surface (the profile keys operators rely on)

Event sources (list under `event_sources:` in the profile YAML; each entry needs a `type` matching a registered factory):

- `type: calendar` — `poll_interval_minutes` (default 5), `lookahead_minutes` (60), `calendar_id` ("primary"), `credentials_file`
- `type: imap_email` — `host`, `port`, `username`, `password_env`, `mailbox` ("INBOX"), `mark_seen` (true), `poll_interval_minutes` (2)
- `type: file_watcher` — `paths: [<path>...]`, `recursive` (true), `change_types` (`created,modified,deleted`)
- `type: webhook` — `source_name` ("webhook"); no auth; intended for trusted-network use
- `type: github` — `secret` or `secret_env`, `require_signature` (true), `source_name` ("github")

Scheduler:

- `default_timezone: <IANA>` (default `"UTC"`) — applied to jobs without an explicit `timezone`
- `work_dir: <path>` (default `.taskforce`) — `scheduler/jobs/*.json` job-store location

Per-job fields on `ScheduleJob`:

- `schedule_type: cron | interval | one_shot`
- `expression: str` — 5-field cron (`"0 8 * * *"`), interval (`"15m"`, `"1h"`, `"30s"`, `"1d"`), or ISO datetime for one_shot
- `timezone: <IANA>` (default `"UTC"`)
- `coalesce: skip | run_once` (default `skip`)
- `enabled: bool`, `tenant_id`, `agent_id`

## Event stream contract (what callers of the event bus must handle)

`AgentEvent.event_type` values published by sources and the scheduler:

- `webhook.received` — generic and GitHub webhook deliveries; GitHub payloads carry normalized `{action, repo, actor, title, ...}` plus full `raw`
- `calendar.upcoming` — a not-yet-seen calendar item is within the lookahead window
- `email.received` — an unseen IMAP message was fetched
- `file.changed` — a watched path was created / modified / deleted
- `schedule.triggered` — a scheduled job fired; payload carries `{job_id, job_name, action, tenant_id, agent_id}`

The corresponding agent-facing stream-event names exposed to UI consumers
are `BUTLER_EVENT_RECEIVED` and `BUTLER_SCHEDULE_TRIGGERED` (in
`core/domain/enums.py::EventType`).

## Extension points

- `register_event_source(name, factory, *, replace=False)` in `taskforce.application.event_source_registry` — agent packages and plugins add new source types here; the daemon and the events route look them up by name.
- `WebhookCapableEventSource` protocol in `core/interfaces/event_source.py` — implement `handle_inbound(payload, headers)` to expose a source through `POST /api/v1/events/{source_name}`. Raise `ValueError` to trigger HTTP 401.
- `SchedulerProtocol` in `core/interfaces/scheduler.py` — alternative scheduler backends (Redis, APScheduler) can replace `SchedulerService` by satisfying this protocol.

## Tests (must exist and pass)

- spec("events-scheduler.webhook_invalid_signature_returns_401")
- spec("events-scheduler.webhook_unknown_source_returns_404")
- spec("events-scheduler.webhook_non_json_returns_415")
- spec("events-scheduler.webhook_non_capable_source_returns_400")
- spec("events-scheduler.scheduler_persisted_jobs_resume_on_start")
- spec("events-scheduler.one_shot_already_fired_skipped_on_restart")
- spec("events-scheduler.cron_respects_job_timezone")
- spec("events-scheduler.cron_skips_dst_forward_gap")
- spec("events-scheduler.coalesce_run_once_fires_single_catchup")
- spec("events-scheduler.coalesce_skip_drops_missed_runs")
- spec("events-scheduler.fire_persists_last_fired_at_before_action")
- spec("events-scheduler.polling_loop_continues_after_poll_error")
- spec("events-scheduler.register_duplicate_source_raises_without_replace")

## Known gaps

- **Polling event sources have no jitter** — every source ticks on a fixed `poll_interval_seconds`, so multiple sources with the same interval (e.g. five `calendar` accounts at 5 min) fire in lockstep and spike outbound API usage. Tracked in #352.
- **Heartbeat / checkpoint directories race on first write** — concurrent `start()` calls can both attempt `mkdir`, and the loser sees the directory missing for one tick. Tracked in #318.
- **Built-in cron parser supports only the 5-field grammar** with `*`, `,`, `-`, `/`. It rejects named months/weekdays (`MON`, `JAN`), `@`-aliases (`@daily`), `?`, and `L`/`#` qualifiers — surprising for operators used to Quartz/Vixie cron. No tracked issue yet.
- **Generic `webhook` source has no signature verification at all.** Anything reachable at `/api/v1/events/webhook` is trusted; the route must be firewalled or proxied behind auth.
- **GitHub HMAC verification has no replay protection.** A captured legitimate delivery can be replayed indefinitely (same gap as gateway, #285).
- **`FileWatcherEventSource` requires the configured paths to exist at start time.** Deleting and recreating the watched directory leaves the source attached to a stale inode on POSIX.
- **No `@pytest.mark.spec` markers exist yet** — the Tests section asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.
- **Scheduler has no REST surface in framework core.** Operators manage jobs only via the `schedule` agent tool or programmatically; there is no HTTP CRUD analogue to `/api/v1/events/{source_name}`.

- related_spec: react-loop.md (agent execution triggered by `schedule.triggered` actions)

# Standing Goals — Proactive Recurring Intentions

> **Status:** `shipped` · **Since:** `2026-05-06` · **Last verified:** `2026-05-16` · **ADR:** `ADR-024` · **Owner:** `rudi77`
A standing goal is a declarative "thing the agent should be working towards
on its own time" — for example *"every Monday 9am, prepare a weekly summary
of last week's work"*. The user adds a goal once (REST, CLI, or butler
profile YAML); a heartbeat task in the running daemon revisits every enabled
goal on its cron schedule, asks the LLM whether to act now, and on a positive
answer submits a mission to the agent. Goals are framework-core and opt-in —
without the `proactive:` block the daemon stays purely reactive.

## Capabilities (what the user can do)

- add a standing goal with description, evaluation prompt, cron frequency, and priority
- list every standing goal (enabled and disabled), with last-evaluated timestamp
- look up a single goal by id
- update any field of a goal in place (description, prompt, frequency, priority, enabled, metadata)
- disable a goal without losing its configuration, and re-enable it later
- permanently remove a goal
- force an immediate LLM evaluation of one goal regardless of cron schedule
- seed initial goals from the agent profile YAML so a fresh install starts proactive

## Invariants (what must always be true)

- A goal is evaluated only when both `enabled` is true AND its cron expression has fired since the last evaluation. Disabled goals are silently skipped.
- The cron pre-filter runs before any LLM call, so heartbeat frequency does not multiply LLM cost; a weekly goal incurs at most one LLM call per week, not one per heartbeat tick.
- On first run (`last_evaluated_at is None`) every enabled goal is considered due so proactive behaviour starts immediately, not on the next cron boundary.
- A malformed cron expression falls back to "always due" so the misconfiguration surfaces in `last_action_taken` rather than silently disabling the goal.
- `mark_evaluated` updates are serialised process-wide; concurrent ticks (heartbeat + forced `evaluate-now`) cannot lose an update.
- Standing-goal store writes are atomic — a crashed write never leaves a corrupted `standing_goals.json`; a corrupted file is logged and treated as empty rather than crashing the daemon.
- A failed LLM decision or failed mission submission never marks the goal as evaluated, so the next tick will retry.
- Submitted missions carry `channel="standing_goal"` and `metadata.standing_goal_id` so downstream consumers can attribute the mission back to its goal.
- The REST CRUD endpoints work without a running daemon (lazy file-backed default store); only `evaluate-now` requires a daemon (returns 503 otherwise).
- Removing the `proactive:` block from the profile reproduces the pre-ADR-024 reactive behaviour bit-for-bit.

## API surface (the contract clients depend on)

- GET    /api/v1/standing-goals → 200 (list, every goal)
- POST   /api/v1/standing-goals → 201 created
- GET    /api/v1/standing-goals/{goal_id} → 200
- GET    /api/v1/standing-goals/{goal_id} → 404 if missing
- PATCH  /api/v1/standing-goals/{goal_id} → 200 (partial update)
- PATCH  /api/v1/standing-goals/{goal_id} → 404 if missing
- DELETE /api/v1/standing-goals/{goal_id} → 204
- DELETE /api/v1/standing-goals/{goal_id} → 404 if missing
- POST   /api/v1/standing-goals/{goal_id}/evaluate-now → 202 (forced evaluation result)
- POST   /api/v1/standing-goals/{goal_id}/evaluate-now → 404 if missing
- POST   /api/v1/standing-goals/{goal_id}/evaluate-now → 503 when no daemon is running

## Configuration surface (the profile keys / env vars operators rely on)

The proactive layer is configured in the agent profile YAML under `proactive:`.
Missing block ⇒ disabled. Standing-goal data persists under `<work_dir>/standing_goals.json`.

- `proactive.enabled: bool` (default `false`) — master switch; when `false` no heartbeat task is started and the REST CRUD still works against the lazy default store
- `proactive.heartbeat_minutes: float` (default `15`) — upper bound on goal-evaluation latency; minimum effective sleep is 1 second
- `proactive.standing_goals: list` (default `[]`) — seed goals loaded on daemon startup; entries that already exist by `goal_id` are skipped (idempotent)
- each seed entry: `description`, `evaluation_prompt` (supports `$NOW` / `$LAST_EVALUATED_AT` substitution), `frequency` (5-field cron), `priority` (int, default 5, lower runs first), `enabled` (default true), optional `goal_id` and `metadata`
- `TASKFORCE_WORK_DIR` — root for the default file store (used by the lazy REST default when no daemon registered a store)
- `TASKFORCE_API_URL` — base URL the `taskforce goals` CLI talks to (default `http://127.0.0.1:8000`)

## Extension points

- `set_standing_goal_store_override(provider)` in `taskforce.application.infrastructure_overrides` — enterprise plugins use this to route the store per `(tenant, user)`. Provider receives the work dir and returns a `StandingGoalStoreProtocol`. Resolved by `InfrastructureBuilder.build_standing_goal_store`, not cached.
- `set_standing_goal_store(store)` / `set_goal_evaluator(evaluator)` in `taskforce.api.dependencies` — daemon-side registration so REST routes find the canonical store and evaluator owned by the running daemon. Both are cleared on daemon shutdown.
- `StandingGoalStoreProtocol` in `taskforce.core.interfaces.standing_goals` — alternative store implementations (e.g. a future `PostgresStandingGoalStore`) implement this and are wired through the override hook.
- `GoalEvaluatorService.decide` callback — adopters wanting a cheap dedicated decision LLM replace the default "always act" callback before `daemon.start()`.

## Tests (must exist and pass)

- spec("standing-goals.cron_prefilter_skips_when_not_due")
- spec("standing-goals.first_run_evaluates_even_without_history")
- spec("standing-goals.disabled_goal_is_skipped")
- spec("standing-goals.bad_cron_falls_back_to_always_due")
- spec("standing-goals.decision_failure_does_not_mark_evaluated")
- spec("standing-goals.submit_failure_does_not_mark_evaluated")
- spec("standing-goals.submitted_mission_carries_goal_id_metadata")
- spec("standing-goals.store_writes_are_atomic")
- spec("standing-goals.store_concurrent_mark_evaluated_serialized")
- spec("standing-goals.rest_crud_roundtrip")
- spec("standing-goals.evaluate_now_returns_503_without_daemon")
- spec("standing-goals.daemon_seeds_yaml_goals_idempotent")

## Known gaps

- **`evaluate-now` returns 202 Accepted but the response body is the synchronous result.** The HTTP semantics suggest queued/async, but the call blocks on the LLM decision and mission submission. Either the status code should change to 200 or the route should genuinely be made async.
- **Per-user override is wired but not yet exercised by enterprise routing.** Issue #196 added `set_standing_goal_store_override`; the enterprise plugin's per-user store factory still needs to call it for true per-user isolation (today goals leak across users of the same daemon).
- **No multi-host consistency.** Two daemons sharing the same `work_dir` will both evaluate every goal — the filesystem lock prevents corruption but not duplicate execution. A `PostgresStandingGoalStore` is the planned multi-host path; not yet implemented.
- **Goal-update REST PATCH does not validate the cron expression** — an invalid `frequency` is accepted and only surfaces at the next evaluation tick (which then falls back to "always due"). Cron validation happens nowhere in the write path.
- **No goal-history endpoint.** Only `last_evaluated_at` + `last_action_taken` are stored; the agent cannot ask "how often did this goal fire this month" without a separate audit log.
- **`taskforce goals` CLI has no `update`/`patch` subcommand** — only `enable` and `disable` are exposed; changing the prompt or cron requires curl or editing the JSON file directly.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section asserts the target, not current state. `tests/unit/application/test_goal_evaluator_service.py` exists but is unmarked.
