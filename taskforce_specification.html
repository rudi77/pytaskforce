# OAuth2 + Auth Manager — Centralised Authentication

> **Status:** `shipped` · **Since:** `2026-03-21` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
A single subsystem that lets agents and tools authenticate against
external providers (Google, Microsoft, GitHub, custom) over OAuth2
without each tool re-inventing token storage, refresh, or the
interactive consent dance. The `AuthManager` orchestrates two flows
(device authorization grant for headless / chat-driven contexts,
authorization code for local CLI with a browser) plus a fallback
username/password "credential" flow, persists tokens Fernet-encrypted
on disk, refreshes them transparently when callers request a token,
and exposes a minimal REST surface for the UI to list and revoke
connections.

## Capabilities (what the user can do)

- authenticate against a configured provider (`google`, `microsoft`, `github`, custom) from chat by invoking the `authenticate` tool
- pick the auth flow per call: OAuth2 device grant (default — headless / Telegram / Teams), OAuth2 authorization code (CLI with browser), or `credential` (username/password)
- receive the verification URL + user code on the same channel the agent is talking on, via the Communication Gateway
- have access tokens refreshed automatically the next time a downstream tool asks for a valid token — no re-prompt while a refresh token is on file
- override the default scopes per call, or fall back to the provider's configured `default_scopes`
- list every provider currently connected, with status, scopes, expiry, and whether a refresh token is on file, via REST
- revoke and delete a provider's tokens via REST so the next call falls back to a fresh flow
- store custom-provider endpoints (`device_auth_url`, `token_url`, `auth_url`) per provider through the auth flow's `metadata` so providers not in the built-in catalogue still work

## Invariants (what must always be true)

- Tokens on disk are Fernet-encrypted; without the master key the store is unreadable.
- Token writes are atomic — a power loss mid-write leaves either the old token or the new one on disk, never a half-written file. Per-provider `asyncio.Lock` serialises concurrent in-process writes.
- The master key resolves from `TASKFORCE_AUTH_KEY` first, then from `<store_dir>/.key` (auto-generated on first use). A warning is logged when the file fallback is used.
- `get_token(provider)` returns a token whose `is_expired` is false: an expired token with a refresh token triggers a transparent refresh before returning.
- A refresh attempt that fails persists `status=failed` on the existing token row so callers can distinguish "never authenticated" from "token revoked / refresh broken".
- `revoke(provider)` always deletes the on-disk token even when the provider is unknown to the local store (idempotent — never raises on missing).
- The OAuth2 auth-code flow generates a fresh CSRF `state` per call (32-byte URL-safe) and rejects callbacks whose `state` does not match.
- The local callback server in the auth-code flow binds only to `127.0.0.1` on an ephemeral port and is torn down after a single callback or a 5-minute timeout.
- The device flow honours the provider's `interval` / `expires_in` from the device-code response and surfaces a timeout instead of polling forever.
- `authenticate` is gated as a high-risk tool — the approval system prompts the user before any OAuth flow runs.
- The REST connections routes require the `tenant:manage` permission; an unauthenticated or under-privileged caller cannot list or revoke connections.
- `GET /oauth/connections` returns `auth_manager_available=false` (with an empty list) instead of 500 when the framework couldn't initialise an `AuthManager` (e.g. missing `cryptography`); the UI uses this to hide OAuth controls.
- A corrupt token row in the store is reported with `status="unreadable"` in the list response, never crashes the listing.

## API surface (the contract clients depend on)

- GET    /api/v1/oauth/connections → 200 with `{connections, auth_manager_available}`
- GET    /api/v1/oauth/connections → 403 without `tenant:manage`
- DELETE /api/v1/oauth/connections/{provider} → 204
- DELETE /api/v1/oauth/connections/{provider} → 403 without `tenant:manage`
- DELETE /api/v1/oauth/connections/{provider} → 503 when `AuthManager` is not configured

Initiating a fresh OAuth flow from REST is intentionally not exposed —
operators run the `authenticate` tool from chat, which handles the
multi-step device polling interactively.

## Configuration surface (the profile keys / env vars operators rely on)

- `TASKFORCE_AUTH_KEY` — Fernet master key (base64 32-byte) for token encryption. Strongly preferred for production so the key lives outside the store directory.
- `<store_dir>/.key` — fallback master key, auto-generated on first run. Default `store_dir` is `~/.taskforce/auth/`.
- Per-provider config dict (`client_id`, `client_secret`, `default_flow`, `default_scopes`, `metadata`) passed into `AuthManager(provider_configs=...)` from the profile loader. `metadata.device_auth_url` / `metadata.token_url` / `metadata.auth_url` override built-in endpoints for custom providers.
- Built-in flow types resolvable by name: `oauth2_device`, `oauth2_auth_code`, `credential`.
- Built-in provider endpoint catalogue: `google`, `microsoft`, `github` (for both device and auth-code flows).

## Tests (must exist and pass)

- spec("auth.token_store_round_trips_payload_encrypted")
- spec("auth.token_store_load_missing_returns_none")
- spec("auth.token_store_delete_missing_is_noop")
- spec("auth.token_store_write_is_atomic")
- spec("auth.master_key_env_overrides_key_file")
- spec("auth.get_token_returns_none_when_unknown")
- spec("auth.get_token_refreshes_expired_token_transparently")
- spec("auth.refresh_failure_persists_failed_status")
- spec("auth.authenticate_short_circuits_when_valid_token_present")
- spec("auth.authenticate_uses_default_flow_from_provider_config")
- spec("auth.revoke_deletes_token_idempotently")
- spec("auth.device_flow_times_out_after_expires_in")
- spec("auth.device_flow_propagates_denied_error")
- spec("auth.auth_code_flow_rejects_mismatched_state")
- spec("auth.auth_code_callback_server_binds_localhost_only")
- spec("auth.oauth_connections_requires_tenant_manage")
- spec("auth.oauth_revoke_without_auth_manager_returns_503")
- spec("auth.oauth_connections_reports_unreadable_token_row")
- spec("auth.authenticate_tool_marked_high_risk_approval")

## Known gaps

- **`.key` master-key file is world-readable on Windows** — the file is written with default ACLs (no chmod 0o600 fallback). Tracked in #282.
- **`TASKFORCE_AUTH_KEY` lives in the process env**, so any subprocess (tool execution, MCP server, native shell calls) inherits it. A compromised tool can exfiltrate the master key trivially. Tracked in #283.
- **`CredentialFlow` logs username and password through structlog when storage fails** — the prompt text is logged at INFO level. Plaintext credentials may end up in log aggregators. Tracked in #284.
- **No master-key rotation path** — there is no documented procedure to re-encrypt the store under a new `TASKFORCE_AUTH_KEY`. Operators who suspect a key compromise must revoke every connection and re-authenticate. Tracked in #302.
- **OAuth2 authorization-code flow does not use PKCE** — the `code_verifier` / `code_challenge` parameters are absent. Public clients on shared machines are vulnerable to code-interception. Tracked in #285.
- **`GET /oauth/connections` returns token metadata as-is** — `scopes`, `expires_at`, and `has_refresh_token` are fine, but a future schema change could leak `client_secret`. The response model masks nothing server-side; callers with `tenant:manage` can see every connection's metadata. Tracked in #299.
- **`EncryptedTokenStore._get_fernet()` lazy-init is not concurrency-safe** — two coroutines hitting it in parallel can both construct a Fernet instance. Benign today (idempotent), but a race window exists. Tracked in #311.
- **`AuthManager.get_token()` refresh race** — two concurrent callers requesting the same expired token both spawn a refresh request, doubling the upstream load and risking a `invalid_grant` on the second one. No per-provider in-flight dedup. Tracked in #310.
- **Device flow ignores `slow_down`'s required backoff increment** — RFC 8628 requires increasing the poll interval on `slow_down`, but the implementation keeps polling at the original interval. Risks IP throttling. Tracked in #332.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state.

- related_spec: settings-store.md (intended provider-config storage seam; AuthManager is not yet wired to read it)
- related_spec: gateway.md (device flow uses the gateway's question/answer flow for user interaction)

# Tool Approval Gating — Per-Tool Gate, Bypass Lists, Lifecycle Hooks

> **Status:** `shipped` · **Since:** `2026-05-07` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
The agent does not run a tool flagged as risky until something — a human
on stdin, an admin clicking a REST grant, an auto-approver — says yes.
Tools self-declare risk via `requires_approval` + `ApprovalRiskLevel`;
the agent calls an installed `ApprovalServiceProtocol` before every such
tool call, with a human-readable preview the tool itself formats. Two
bypass surfaces (per-profile and tenant-wide) let operators waive the
gate for trusted tools; a per-tool trigger-origin allow-list waives it
for scheduler-fired workflows where no human is at the keyboard. The
framework ships a CLI prompt service and a no-op auto-approver; the
enterprise plugin replaces them with a REST-backed queue.

## Capabilities (what the user can do)

- mark a tool as gated by setting `requires_approval = True` on its class (or `tool_requires_approval = True` for `BaseTool` subclasses)
- declare a per-tool risk level (`LOW` / `MEDIUM` / `HIGH`) that the approval UI uses to style the prompt
- write a per-tool `get_approval_preview(**kwargs)` so the human sees what is about to happen — not just the tool name
- be prompted on stdin before each gated tool runs in `taskforce chat` / `taskforce run mission` (default CLI service)
- run gated tools without prompts in unit tests / CI by installing `AutoApproveService`
- park approval requests in an async queue and resolve them via REST in enterprise deployments (out-of-tree `ApprovalServiceProtocol` implementation)
- waive the gate for a curated set of tools at the profile level via `agent.approval_bypass_tools: [python, shell, ...]`
- waive the gate tenant-wide via the settings store `approval` section's `bypass_tools` list, edited from the Settings UI without a restart
- auto-grant for trusted trigger origins per tool via `tool_auto_approve_for_origins = frozenset({"scheduled_workflow"})` (e.g. `send_notification` runs unattended on cron)
- observe mission start / completion with `MissionLifecycleHookProtocol` for audit pipelines, independently of the approval gate

## Invariants (what must always be true)

- A tool whose `requires_approval` is False is never sent through the gate.
- With no `ApprovalServiceProtocol` installed, a gated tool still runs — the gate is opt-in and absence means "single-user CLI defaults".
- A tool short-name listed in **either** the agent's `approval_bypass_tools` set **or** the tenant-level `approval.bypass_tools` list skips the gate; the two sources combine via UNION (not intersection).
- The tenant-level bypass list is re-read on every tool call, not cached at agent construction, so a UI edit to the `approval` section takes effect on the next gated tool call without a restart.
- Parameter validation runs **before** the human prompt. A malformed tool call surfaces a validation error to the LLM immediately instead of asking the user to approve a call that would have failed anyway.
- A denied or timed-out approval returns a tool-result dict with `success: False`, `terminal_failure: True`, and an `error_kind` of `approval_denied` / `approval_timeout` / `approval_error`; the planning loop must treat this as terminal and not retry the same forbidden call.
- An exception inside the approval service surfaces as `approval_status: error` + `terminal_failure: True`, distinct from a deliberate user denial so audit logs and the LLM can tell "pipeline broke" apart from "user said no".
- An exception inside a `get_approval_preview` implementation falls back to the bare tool name as the preview — a buggy preview never aborts the gate.
- Concurrent CLI approval prompts are serialised on a module-level `asyncio.Lock` so two parallel sub-agents do not interleave their stdin questions.
- The CLI prompt writes to stderr, not stdout, so a piped/captured stdout (UI subprocess, eval harness) still surfaces the question to the operator.
- The `auto_approve_for_origins` allow-list only triggers when `get_trigger_origin()` returns a non-`None` value; interactive flows leave the ContextVar unset and always fall through to the gate.
- A `requires_approval=True` tool never runs in parallel with other tools in the same LLM turn — it is forced onto the serial path regardless of `supports_parallelism` (see [tools.md](#tool-system-registry-resolution-approval-mcp-parallel-exec-result-store)).
- Mission lifecycle hook errors are warned but never raised: a broken audit pipeline cannot break a running mission.

## Configuration surface (the profile keys / env vars operators rely on)

- `agent.approval_bypass_tools: [<short_name>, ...]` — profile-level list of tools that skip the approval gate. Stored as a frozenset on the agent.
- Settings store `approval` section, payload `{"bypass_tools": ["python", "shell", ...]}` — tenant-level bypass list. Hydrated into the global override on server startup and after every `PUT`/`DELETE /api/v1/settings/approval`. Empty/missing clears the override.
- Per-tool class attribute `tool_requires_approval: bool` (BaseTool) / `requires_approval` property — opts the tool into the gate.
- Per-tool class attribute `tool_approval_risk_level: ApprovalRiskLevel` (BaseTool) — `LOW` / `MEDIUM` / `HIGH`; used by approval UIs for styling.
- Per-tool class attribute `tool_auto_approve_for_origins: frozenset[str]` — trigger origins (e.g. `"scheduled_workflow"`) that auto-grant for this tool.
- Per-tool method `get_approval_preview(**kwargs) -> str` — human-readable summary shown in prompts and audit logs.

## API surface (the contract clients depend on)

The framework does not ship a REST surface for approval decisions — the enterprise plugin owns
`POST /admin/approvals/{id}/grant|deny`. The framework exposes only the bypass-list section via
the Settings Store (see [settings-store.md](#settings-store-ui-managed-runtime-config) for the full route contract):

- PUT    /api/v1/settings/approval accepts `{bypass_tools: [<short_name>, ...]}` and re-hydrates the global override before responding
- DELETE /api/v1/settings/approval clears the tenant-level bypass override
- GET    /api/v1/tools surfaces each tool's `requires_approval` flag so the UI can build the bypass-tool picker

## Extension points

- `ApprovalServiceProtocol` in `taskforce.core.interfaces.approval` — single-method contract (`request_approval`). Implementations may prompt stdin, block on a REST grant, or auto-approve.
- `set_approval_service` in `taskforce.application.infrastructure_overrides` — registers the process-wide service. Consulted on every gated tool call; absence means "no gate".

# Workflow Runtime — Multi-Step Orchestration with HITL Checkpoints

> **Status:** `shipped` · **Since:** `2026-03-15` · **Last verified:** `2026-05-16` · **ADR:** `ADR-014` · **Owner:** `rudi77`
First-class workflows: YAML/JSON definitions composed of named agent
steps with `depends_on` edges, launched by one of five trigger kinds
(manual, chat, schedule, event, webhook). Independent steps in the
same dependency level run in parallel. Steps can pause for external
input (HITL checkpoint) and resume later, optionally re-entering the
original skill via `activate_skill`. A step may delegate to a remote
ACP peer instead of a local agent. Tenants manage definitions through
a REST + UI CRUD surface; the scheduler integration is automatic.

## Capabilities (what the user can do)

- author a workflow as a graph of agent steps with `depends_on` edges
- pick a trigger kind from `manual | chat | schedule | event | webhook`
- store and edit workflow definitions per tenant via REST or the bundled UI
- run a stored workflow by id and get the per-step results back
- fan out independent steps in parallel within a dependency level, then join before the next level
- pause a step on a checkpoint that declares which inputs are required to resume
- resume a paused workflow with an inbound payload (REST or by re-invoking the originating skill)
- trigger a workflow by HTTP POST to `/api/v1/workflows/webhooks/<path>` with optional HMAC signature verification
- have a `schedule`-triggered workflow auto-register in the scheduler so its cron fires it on time
- delegate any step to a remote ACP peer via `acp_peer` instead of a local agent
- list all definitions, fetch one by id, and delete (which also drops the matching cron job)

## Invariants (what must always be true)

- A workflow with zero steps, duplicate step ids, dangling `depends_on`, or a dependency cycle is rejected at save time with HTTP 400 — invalid definitions never land on disk.
- `schedule`-triggered definitions with a malformed cron expression are rejected at save time before being mirrored to the scheduler.
- Saving a `schedule` workflow registers exactly one scheduler job per `workflow_id`; re-saving with a different cron replaces the prior job atomically (no orphans).
- Deleting a definition also unregisters its scheduled job.
- Changing a definition's trigger away from `schedule` removes any previously registered scheduler job for that workflow.
- Steps within a dependency level run concurrently via `asyncio.gather`; levels are awaited in order so a downstream step always sees every dependency's `final_message` in its mission text.
- A webhook trigger with a configured HMAC secret rejects requests whose signature is missing or wrong with HTTP 401 — the workflow never runs.
- A webhook trigger with no configured secret is an open endpoint by operator choice (`secret` and `secret_env` both absent).
- Webhook path matching is case-insensitive and leading-slash-insensitive on both the definition's `trigger_config.path` and the request URL tail.
- A `resume` on a checkpoint not in status `waiting_external` returns HTTP 400 — re-resuming a completed run cannot mutate it.
- A resume payload that lacks any field listed in `required_inputs.required` is rejected with HTTP 400; the checkpoint stays `waiting_external`.
- Every resume event is appended to the checkpoint's `state.resume_events` history; the latest also lands in `state.latest_resume_event`.
- A step with `acp_peer` set but no ACP runtime wired returns a `failed` step result; it does not fall back to local execution silently.
- A webhook delivery whose path is unknown to the current tenant is re-tried under the owner tenant (via the cross-tenant resolver hook); only a global miss returns 404.

## API surface (the contract clients depend on)

All routes are mounted under `/api/v1/workflows`. The `webhooks/` and
`{run_id}/resume*` subtrees are auth-exempt; the rest require the
documented permission.

- GET    /api/v1/workflows/definitions → 200 with list of definitions (requires `agent:read`)
- POST   /api/v1/workflows/definitions → 200 with `{workflow, scheduled_job_id}` (requires `agent:update`)
- POST   /api/v1/workflows/definitions → 400 on `invalid_workflow` (empty/cyclic/dangling-dep/malformed cron)
- GET    /api/v1/workflows/definitions/{workflow_id} → 200 with definition (requires `agent:read`)
- GET    /api/v1/workflows/definitions/{workflow_id} → 404 if missing
- DELETE /api/v1/workflows/definitions/{workflow_id} → 200 `{deleted: true}` (requires `agent:delete`)
- DELETE /api/v1/workflows/definitions/{workflow_id} → 404 if missing
- POST   /api/v1/workflows/definitions/{workflow_id}/run → 200 with per-step results (requires `agent:execute`)
- POST   /api/v1/workflows/definitions/{workflow_id}/run → 400 on `invalid_workflow`
- POST   /api/v1/workflows/webhooks/{trigger_path:path} → 200 with per-step results
- POST   /api/v1/workflows/webhooks/{trigger_path:path} → 401 on `invalid_webhook_signature`
- POST   /api/v1/workflows/webhooks/{trigger_path:path} → 404 on `webhook_workflow_not_found`
- POST   /api/v1/workflows/wait → 200 with `{run_id, status, node_id, blocking_reason, required_inputs}`
- GET    /api/v1/workflows/{run_id} → 200 with checkpoint
- GET    /api/v1/workflows/{run_id} → 404 if missing
- POST   /api/v1/workflows/{run_id}/resume → 200 with `{run_id, status, node_id, state}`
- POST   /api/v1/workflows/{run_id}/resume → 400 on missing-input or non-waiting checkpoint
- POST   /api/v1/workflows/{run_id}/resume-and-continue → 200 with `{run_id, checkpoint_status, execution}`
- POST   /api/v1/workflows/{run_id}/resume-and-continue → 400 when checkpoint has no `session_id`

## Configuration surface (the trigger_config keys operators rely on)

Trigger kind selectors on the `WorkflowDefinition`:

- `trigger: manual` — no config; ran only via the explicit `/run` endpoint or UI button
- `trigger: chat` — `trigger_config.match: <name>` (defaults to `workflow_id`); the gateway resolves `@name` mentions to this workflow (case-insensitive)
- `trigger: schedule` — `trigger_config.cron: "<5-field>"` (required); mirrored into the scheduler as `ScheduleActionType.EXECUTE_WORKFLOW` job `workflow__<workflow_id>`
- `trigger: webhook` — `trigger_config.path: "<url-tail>"`, optional `secret` or `secret_env` (HMAC secret), optional `signature_header` (default `X-Signature`), optional `signature_algo` in `{sha1, sha256, sha512}` (default `sha256`)
- `trigger: event` — `trigger_config.event_type: <name>`; event-bus dispatch (consumed by event source integrations)

Per-step:

- `step_id` (unique), `agent` (profile name), `task` (mission text)
- `depends_on: [step_id, ...]` — defines the dependency graph
- `acp_peer: <peer_id>` — when set, the runtime calls the named ACP peer instead of executing locally

Storage location: `${work_dir}/workflows/definitions/*.yaml`
(checkpoints under `${work_dir}/workflows/checkpoints/*.json`).
New writes are YAML; legacy JSON files continue to load.

## Extension points

- `WorkflowRuntimeService(acp_runtime=...)` — wiring an ACP runtime enables `acp_peer` steps; without it those steps return a `failed` result.
- `get_webhook_workflow_resolver` / `get_tenant_context_runner` in `taskforce.application.infrastructure_overrides` — enterprise plugins install these to resolve a webhook path's owning tenant when the request arrives with no tenant context.
- `FileWorkflowDefinitionStore` / `FileWorkflowCheckpointStore` — both swappable per tenant via the infrastructure builder; default implementations are file-backed under `work_dir/workflows/`.

## Tests (must exist and pass)

- spec("workflows.save_rejects_empty_steps_400")
- spec("workflows.save_rejects_cyclic_depends_on_400")
- spec("workflows.save_rejects_dangling_depends_on_400")
- spec("workflows.save_rejects_malformed_cron_400")
- spec("workflows.save_schedule_trigger_registers_cron_job")
- spec("workflows.resave_schedule_replaces_prior_job")
- spec("workflows.delete_definition_unregisters_cron_job")
- spec("workflows.change_trigger_away_from_schedule_removes_job")
- spec("workflows.run_executes_levels_in_parallel")
- spec("workflows.run_passes_dependency_final_message_to_downstream")
- spec("workflows.webhook_unknown_path_returns_404")
- spec("workflows.webhook_invalid_signature_returns_401")
- spec("workflows.webhook_no_secret_accepts_open")
- spec("workflows.resume_non_waiting_returns_400")
- spec("workflows.resume_missing_required_input_returns_400")
- spec("workflows.resume_appends_to_state_history")
- spec("workflows.resume_and_continue_requires_session_id")
- spec("workflows.acp_peer_step_without_runtime_returns_failed")
- spec("workflows.webhook_cross_tenant_resolver_runs_under_owner")

## Known gaps

- **`asyncio.gather` runs sibling steps without `return_exceptions=True`** — if one step in a parallel level raises, gather propagates immediately while the other sibling tasks keep running to completion. Checkpoints can land in inconsistent states (some steps `completed`, some never finalised). Tracked in #329.
- **Webhook HMAC verification has no replay protection** — a captured legitimate delivery can be replayed indefinitely (same root cause as gateway #285).
- **Webhook secret is opt-in.** With no `secret` / `secret_env` configured, the route accepts any payload. This is an operator choice but easy to overlook.
- **`event`-triggered workflows have no documented dispatch glue in framework core.** Operators can author the definition, but wiring an event source to actually invoke it is currently a custom integration.
- **No top-level mission timeout per step.** A hung step (LLM stall, tool deadlock) blocks the dependency level indefinitely. Related: #369.
- **Checkpoint store is not version-locked.** Concurrent `resume` calls on the same `run_id` race; the last writer wins.
- **No `@pytest.mark.spec` markers exist yet** — Tests section asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.
- **`resume-and-continue` re-creates a fresh agent** via `factory.create_agent(profile=request.profile)` and looks up `activate_skill` on it; if the original workflow ran under a different profile or used a custom agent, the resume profile must be supplied by the caller (default `butler`).

# Cooperative Agent Interruption

> **Status:** `shipped` · **Since:** `2026-03-15` · **Last verified:** `2026-05-16` · **ADR:** `ADR-019` · **Owner:** `rudi77`
Lets a caller cancel a running mission without killing the process, losing
context, or leaving sub-agents and subprocesses running in the background.
The agent finishes its current in-flight step (LLM call + tool calls),
persists its full state, emits an `INTERRUPTED` event, and exits with
`ExecutionStatus.paused` so the same session can be resumed later. Used by
the web Stop button, CLI `Ctrl+C`, the REST `/missions/{id}/cancel` route,
and any in-process caller that holds an `Agent` reference.

## Capabilities (what the user / operator can do)

- request a cooperative interrupt programmatically via `agent.request_interrupt()`
- cancel a queued or in-flight mission over REST via `POST /api/v1/missions/{request_id}/cancel`
- cancel a mission from the CLI via `taskforce missions cancel <request_id>`
- list everything cancellable via `GET /api/v1/missions` (or `taskforce missions running`)
- interrupt a parent mission and have it propagate automatically to every running sub-agent spawned under it
- resume the interrupted session with a new turn — paused state (messages, step, plan) is restored transparently

## Invariants (what must always be true)

- A successful interrupt produces `ExecutionStatus.paused`, never `failed`, so the session remains resumable.
- The interrupt is observed at the next ReAct loop boundary — the in-flight LLM call and any tool calls already started run to completion; partial work is never abandoned mid-call.
- An `INTERRUPTED` event is emitted exactly once on the stream when a pending interrupt is observed, followed by the standard terminal `COMPLETE`.
- After an `INTERRUPTED` event, the persisted session state contains paused-execution keys (messages, step, plan progress, active skill) that a subsequent `execute_stream` call with the same `session_id` uses to resume transparently.
- The interrupt flag is cleared once handled, so a later resume does not immediately re-trigger the pause.
- Requesting an interrupt on a `session_id` that is not running returns `False` (programmatic) / `404` (REST) — never silently succeeds.
- Cancelling a queued (not-yet-started) mission removes it from the queue with `status="cancelled"`; cancelling an in-flight one returns `status="interrupt_requested"`.
- Interrupting a parent agent fires every registered interrupt callback, signalling every sub-agent currently running under the same parent session.
- The CLI / programmatic / REST entry points all converge on the same `AgentExecutor.interrupt(session_id)` path — there is no second cancellation code path with different semantics.

## API surface (the contract clients depend on)

- GET  /api/v1/missions → 200 with list of queued + in-flight missions
- GET  /api/v1/missions → 503 when no `PersistentAgentService` is registered with the API process
- POST /api/v1/missions/{request_id}/cancel → 202 accepted, body carries `status` ∈ `{"cancelled", "interrupt_requested"}`
- POST /api/v1/missions/{request_id}/cancel → 404 when no queued or in-flight request with that id exists
- POST /api/v1/missions/{request_id}/cancel → 503 when no `PersistentAgentService` is registered

## Event stream contract

- `INTERRUPTED` — emitted on cooperative cancel; payload `{reason, timestamp, step}`. The matching terminal `COMPLETE` event that follows carries `status="paused"`.

See `react-loop.md` for where `INTERRUPTED` sits in the full event lifecycle.

## Extension points

- `Agent.add_interrupt_callback(callback)` / `Agent.remove_interrupt_callback(callback)` — register a no-arg hook fired synchronously when `request_interrupt()` is called. Used by `SubAgentSpawner` to forward a parent's interrupt to its children; any orchestration tool that spawns work outside the ReAct loop should do the same.

## Tests (must exist and pass)

- spec("interruption.programmatic_request_sets_paused_status")
- spec("interruption.rest_cancel_inflight_returns_202_interrupt_requested")
- spec("interruption.rest_cancel_queued_returns_202_cancelled")
- spec("interruption.rest_cancel_unknown_returns_404")
- spec("interruption.interrupt_emits_interrupted_event_then_complete")
- spec("interruption.paused_state_persisted_for_resume")
- spec("interruption.resume_after_interrupt_continues_session")
- spec("interruption.interrupt_propagates_to_sub_agents")
- spec("interruption.interrupt_observed_after_inflight_step_finishes")
- spec("interruption.interrupt_flag_cleared_after_handling")

## Known gaps

- **Sub-agent callbacks fail silently.** `Agent.request_interrupt()` wraps each `_on_interrupt_callbacks` invocation in a bare `except Exception` and only emits a warning log. A buggy callback can therefore leave a sub-agent running while the parent thinks the interrupt propagated, with no visible failure on the stream. Tracked in #335.
- **No `@pytest.mark.spec` markers exist yet** — the Tests section above asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.
- **No interrupt-acknowledgement timeout.** A pathologically slow tool can block the next loop-boundary check indefinitely; there is no upper bound on how long the agent may take to observe an interrupt request.

# Agent Daemon — Long-Running Runtime for Any Profile

> **Status:** `shipped` · **Since:** `2026-05-13` · **Last verified:** `2026-05-16` · **ADR:** `ADR-027` · **Owner:** `rudi77`
The generic, profile-driven daemon that keeps an agent alive between user
requests. It loads any installed profile (butler, coding_agent, rag_agent,
or a third-party plugin), wires together the scheduler, event sources, rule
engine, persistent agent queue, and the standing-goals heartbeat, then writes
periodic status files so operators can inspect liveness. A built-in supervisor
restarts the daemon on crash or stalled main loop, and several daemons may
run side-by-side on the same `work_dir` because every artifact is namespaced
by profile. This was butler-specific until ADR-027 promoted the lifecycle to
the framework; ADR-028 then reduced the butler package to YAML-only configs.

## Capabilities (what the operator/profile-author can do)

- start a long-running daemon for any installed profile via `taskforce daemon start --profile <name>`
- attach a role overlay (`--role <name>`) that replaces tools/sub-agents and sets the persona prompt
- inspect liveness via `taskforce daemon status --profile <name>` (reads `status.json`)
- write daemon logs to `<work_dir>/logs/<profile>.log` (override with `--log-name`)
- run multiple daemons concurrently for different profiles on the same `work_dir`
- get automatic restart on uncaught exceptions with exponential backoff (default cap 60 s)
- get automatic restart when the main-loop heartbeat stalls past the watchdog threshold (default 120 s)
- disable the supervisor for foreground/debug runs via `--no-supervisor`
- shut the daemon down gracefully via SIGINT / SIGTERM (POSIX) or SIGINT / SIGBREAK (Windows)
- seed event sources, scheduled jobs, trigger rules, and standing goals from profile YAML
- run with or without the persistent agent queue (default on; queue serialises mission execution)
- expose the daemon's queued/in-flight missions through `/api/v1/missions` when the API server runs in the same process

## Invariants (what must always be true)

- `status.json` lives at `<work_dir>/<profile>/status.json`, so two daemons with different `--profile` values never overwrite each other's status.
- A daemon stop unregisters every active event source from the API layer, so `POST /api/v1/events/{source_name}` returns 404 instead of dispatching to a halted source.
- A daemon stop drains the persistent agent queue before returning, and clears the API-side registration so `/api/v1/missions` reflects "no daemon".
- A `--role` overlay replaces the profile's `tools` and `sub_agents` wholesale, appends `event_sources`, `rules`, and `mcp_servers`, and sets `system_prompt` from the role's persona; infrastructure keys (`persistence`, `llm`, `scheduler`) stay from the base profile.
- A role lookup that finds no matching `<role>.agent.md` or `<role>.yaml` in any search directory is logged and the base profile keeps running unchanged (non-fatal).
- The proactive layer is started only when `proactive.enabled: true`; without that block the daemon is bit-for-bit reactive (pre-ADR-024 behaviour).
- Gateway, executor, persistent-agent, and proactive setup each fail soft — a single subsystem's import or wiring error is logged but does not abort daemon startup.
- The main loop refreshes `last_heartbeat` every status-write tick (30 s); a heartbeat older than `stall_threshold_seconds` raises `DaemonStalled` from the watchdog and triggers a supervised restart.
- The supervisor builds a fresh `AgentDaemon` instance for every restart cycle, so leaked tasks or half-initialised components from the previous iteration cannot survive into the next one.
- `KeyboardInterrupt`, `SystemExit`, and `CancelledError` from inside the supervised loop always skip the restart path and let the process exit cleanly.
- Backoff resets to its initial value (default 1 s) after a clean restart cycle, so a long-running daemon that later crashes does not inherit stale backoff state.
- Status writes are atomic — the file is written to `status.json.tmp` and renamed, so a concurrent `taskforce daemon status` never reads a half-written JSON document.

## Configuration surface (the profile keys / CLI flags operators rely on)

CLI surface (`taskforce daemon ...`):

- `start --profile <name>` *(required)* — profile to load; resolved through the same search path as `taskforce run mission`
- `start --role <name>` — role overlay; searched in `<agent-package-configs>/roles/` and `<work_dir>/roles/` (legacy `butler_roles/` also accepted)
- `start --work-dir <path>` (default `.taskforce`) — root for `status.json`, logs, rules, scheduler jobs, standing goals
- `start --no-supervisor` — run a single bare daemon, no watchdog / no auto-restart (foreground/debug use)
- `start --log-name <file>` (default `<profile>.log`) — log file under `<work_dir>/logs/`
- `status --profile <name>` — pretty-print `<work_dir>/<profile>/status.json`; exits 1 when the file is missing or malformed

Profile-YAML keys consumed by the daemon (in addition to the standard agent profile):

- `notifications.default_channel: str` (default `"telegram"`) — fallback channel for scheduled `send_notification` actions
- `notifications.default_recipient_id: str` (default `""`) — fallback recipient for the same
- `agent.llm_fallback: bool` (default `false`) — let the event router consult the LLM when no rule matches
- `event_sources: list` — see `events-scheduler.md`
- `rules: list` — trigger rules loaded into the `FileRuleEngine` at startup
- `proactive: { enabled, heartbeat_minutes, standing_goals }` — see `standing-goals.md`
- `request_queue.max_size: int` (default 100) and `request_queue.drain_timeout: float` (default 30 s) — `PersistentAgentService` queue tuning
- `auth.providers: dict` — provider configs handed to the shared `AuthManager`
- `role: <name>` — default role overlay when no `--role` CLI flag is passed

Role files live in `<agent-package-configs>/roles/<name>.agent.md` (preferred)
or `<name>.yaml` (legacy). A role overlay sets `persona_prompt` / `tools` /
`sub_agents` / `event_sources` / `rules` / `mcp_servers`; merge semantics are
spelled out under the invariants above.

Supervisor tuning (currently constructor-only, no profile keys):

- `watchdog_interval_seconds` (default 30) — how often the watchdog wakes
- `stall_threshold_seconds` (default 120) — heartbeat-age threshold for restart
- `initial_backoff_seconds` (default 1) / `max_backoff_seconds` (default 60) / `backoff_factor` (default 2)

## Extension points

- `taskforce.config_dirs` entry-point group — agent packages register their `configs/` directory so `--profile <name>` and `--role <name>` resolve transparently.
- `taskforce.application.event_source_registry.register_event_source` — agent packages add new event-source types the daemon can build from YAML.
- `AgentDaemon.touch_heartbeat()` — long-running internal tasks call this to keep the watchdog happy when they take longer than `stall_threshold_seconds`.
- `AgentDaemonSupervisor(daemon_factory=...)` — embedders pass any zero-arg callable returning a fresh daemon (used for testing and for embedding the daemon inside another long-running process).
- `set_persistent_agent_service`, `set_standing_goal_store`, `set_goal_evaluator`, `register_active_event_source` in `taskforce.api.dependencies` — the daemon publishes these so REST routes find the canonical in-process instances.

## Tests (must exist and pass)

- **No `taskforce daemon stop` subcommand.** Stopping requires Ctrl+C in the foreground session, sending SIGINT/SIGTERM (POSIX) or SIGBREAK (Windows) to the process, or killing it; there is no CLI-managed PID file or supervisor RPC.
- **No `taskforce daemon list` subcommand.** Operators discover running daemons by listing `<work_dir>/*/status.json` themselves; the CLI requires `--profile` for every call.
- **Supervisor tuning is constructor-only.** `watchdog_interval_seconds`, `stall_threshold_seconds`, and the backoff parameters cannot be set from profile YAML or CLI flags — only by embedders constructing `AgentDaemonSupervisor` directly.
- **`SIGTERM` is not handled on Windows.** Operators using Windows Service / NSSM stop semantics must rely on Ctrl+Break; `taskkill /F` bypasses Python signal handlers entirely.
- **Multiple daemons sharing a `work_dir` cooperate on filesystem layout but not on work.** Two daemons with the same `--profile` will both load the same rules, run the same scheduled jobs, and evaluate the same standing goals — there is no inter-process lock.
- **Auto-restart has no global crash cap.** A daemon that crashes on every start retries forever with capped backoff; there is no "give up after N consecutive crashes" circuit breaker.

# Persistent Agent Service — Sessionless Orchestrator

> **Status:** `shipped` · **Since:** `2026-03-18` · **Last verified:** `2026-05-16` · **ADR:** `ADR-016` · **Owner:** `rudi77`
A long-running orchestrator that replaces the legacy "one agent per request"
model: one process, one singleton agent, one global state document, one
serialised request queue. Inbound messages from every channel (Telegram, CLI,
REST, scheduled jobs, internal events) are normalised into `AgentRequest`
objects, enqueued, and processed one-at-a-time so the shared agent state never
races. Callers get an awaitable result back; operators get a live view of
queued/in-flight missions plus the ability to cancel either kind.

## Capabilities (what the operator/embedder can do)

- start the service once at process boot and submit requests from any channel for the rest of the process's life
- await each request's outcome (`RequestResult` with `status`, `reply`, `error`) without managing per-request agent lifecycles
- submit higher-priority requests (lower priority number) and have them jump the queue ahead of normal user messages
- list every queued and in-flight mission with `request_id`, `session_id`, `channel`, `priority`, `conversation_id`, `status`, and a message preview
- cancel a queued mission (Future resolves with `status="cancelled"`, processor skips it) or an in-flight mission (cooperative interrupt forwarded to the running session)
- inspect a live snapshot (`AgentStatus`) with running flag, queue depth, active conversations, start time, last-activity timestamp, and state version
- gracefully stop the service — drains the queue (bounded by `drain_timeout`), cancels the processor, persists state
- tune queue back-pressure via `queue_max_size` and shutdown patience via `drain_timeout`
- run alongside an HTTP server: when an embedder calls `set_persistent_agent_service`, `GET /api/v1/missions` and `POST /api/v1/missions/{id}/cancel` light up automatically

## Invariants (what must always be true)

- Exactly one request is executed at a time — the processor pops sequentially from the queue, so the singleton agent's state cannot be mutated concurrently.
- `submit()` raises `RuntimeError` if the service has not been started (or the processor task has already exited) instead of silently dropping the request.
- `start()` is not re-entrant — a second `start()` on an already-running service raises `RuntimeError` rather than spawning a second processor.
- Cancelling a queued request resolves the caller's Future exactly once with `status="cancelled"`; when the processor later pops it, the executor is never invoked for that request.
- Cancelling an in-flight request never force-kills the agent — it forwards `AgentExecutor.interrupt(session_id)` so the agent pauses at the next ReAct boundary with state persisted.
- `cancel_request` returns `status="not_found"` (translated to 404 at the REST layer) when the `request_id` matches neither a queued nor an in-flight item.
- The queue's priority ordering breaks ties by FIFO insertion order, so two requests with the same `priority` are processed in the order they were submitted.
- The bounded queue applies back-pressure: `enqueue` awaits when `queue_max_size` is reached rather than rejecting.
- An exception inside a single request's execution is caught, reported via `RequestQueue.fail()` (Future resolves with `status="failed"`), and the processor continues with the next request.
- `stop()` is idempotent on a never-started service (returns immediately) and on a drained service (no error).
- `stop()` always attempts to persist agent state after draining, even when the drain itself hit `drain_timeout` — operator gets state continuity over a clean drain.
- Each request reuses its stable `session_id` for executor calls; when `session_id` is `None`, the processor falls back to `request_id` so every execution has a deterministic session key.
- Sub-agents spawned during a request still run with their own ephemeral contexts — the "one at a time" constraint applies only to top-level orchestrator turns, not to nested parallel tools.

## API surface (the contract clients depend on)

These routes are only registered as "live" once an embedder publishes the
service via `set_persistent_agent_service` (the agent daemon does this at
startup; standalone API processes do not).

- GET  /api/v1/missions → 200 with `{missions: [...]}`
- GET  /api/v1/missions → 503 when no service is registered
- POST /api/v1/missions/{request_id}/cancel → 202 with `{request_id, session_id, status}`
- POST /api/v1/missions/{request_id}/cancel → 404 when the request is neither queued nor in-flight
- POST /api/v1/missions/{request_id}/cancel → 503 when no service is registered

## Configuration surface

- `PersistentAgentService(queue_max_size=...)` (default 100) — bounded `asyncio.PriorityQueue` capacity; once full, `enqueue` awaits a free slot
- `PersistentAgentService(drain_timeout=...)` (default 30.0 s) — wall-clock budget `stop()` gives the queue before logging a drain warning and forcing processor cancel
- `request_queue.max_size: int` / `request_queue.drain_timeout: float` in profile YAML — what the agent daemon reads to build the service (see `agent-daemon.md`)
- `AgentRequest.priority: int` (default 10) — lower wins; the conventional levels are 0 (urgent events), 5 (scheduled tasks), 10 (normal user messages)

## Extension points

- `AgentStateProtocol` in `taskforce.core.interfaces.agent_state` — implement to back the singleton state document with something other than the default file store
- `taskforce.api.dependencies.set_persistent_agent_service(service)` — embedders publish their service here so REST routes (and any module calling `get_persistent_agent_service`) find the canonical instance; resolved per-request, not cached
- `RequestProcessor(queue, executor, conversation_manager=...)` — replaceable consumer; the service wires the default one, but an embedder can subclass to add tracing/metrics around `_process_request`

## Tests (must exist and pass)

- spec("persistent-agent.start_rejects_double_start")
- spec("persistent-agent.submit_before_start_raises")
- spec("persistent-agent.requests_processed_sequentially")
- spec("persistent-agent.higher_priority_jumps_queue")
- spec("persistent-agent.same_priority_preserves_fifo")
- spec("persistent-agent.exception_in_one_request_does_not_stop_processor")
- spec("persistent-agent.cancel_queued_resolves_future_and_skips_execution")
- spec("persistent-agent.cancel_in_flight_calls_executor_interrupt")
- spec("persistent-agent.cancel_unknown_returns_not_found")
- spec("persistent-agent.stop_drains_queue_then_saves_state")
- spec("persistent-agent.stop_saves_state_even_when_drain_times_out")
- spec("persistent-agent.session_id_falls_back_to_request_id")
- spec("persistent-agent.list_missions_marks_in_flight_vs_queued")
- spec("persistent-agent.bounded_queue_applies_backpressure")

## Known gaps

- **`RequestQueue.complete` and `RequestQueue.cancel` can race on the same `request_id`** — if a cancel arrives between the processor's `_execute` and `complete`, the cancelled Future is resolved first and `complete` becomes a no-op, but the in-flight executor still runs to completion. Tracked in issue #317.
- **`PersistentAgentService.stop()` has no graceful processor shutdown** — after the (possibly timed-out) drain it unconditionally `cancel()`s the processor task, so a request that started executing during the drain window is aborted via `CancelledError` rather than allowed to finish. Tracked in issue #337.
- **No global crash cap on the processor.** `_run_processor` re-raises on uncaught exceptions; the embedder (typically the agent daemon supervisor) is responsible for restart — the service itself does not self-heal.
- **`AgentStatus.state_version` is a snapshot of what was loaded at `start()`** — it does not increment on every successful request, so two callers can compare versions without ever observing a change.
- **No tenant/ownership check on mission routes.** Any authenticated caller with access to `GET /api/v1/missions` sees every other tenant's queued work; cancel is similarly unscoped.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state.

# Agent Communication Protocol (ACP)

> **Status:** `shipped` · **Since:** `2026-03-14` · **Last verified:** `2026-05-16` · **ADR:** `ADR-018` · **Owner:** `rudi77`
Taskforce speaks the open **Agent Communication Protocol** so two Taskforce
instances — or any ACP-compliant framework such as BeeAI — can interoperate
over REST/JSON. A profile can expose its main agent as an ACP server, register
remote ACP agents as peers, call them through the `call_acp_agent` tool (or
the CLI / runtime), and optionally route the inter-agent message bus over ACP
runs. All ACP code paths are gated behind the optional `--extra acp`
dependency and load lazily: profiles without an `acp:` section work unchanged
on an install without `acp-sdk`.

## Capabilities (what the user can do)

- expose the profile's main agent as an ACP server on a configurable host/port so remote Taskforce peers can call it
- register remote ACP peers (in profile YAML, in `.taskforce/acp_peers.json`, via CLI, or via REST) and reference them by name
- resolve a peer's bearer token from an env var at call time, so secrets never have to be written to the registry file
- call a remote ACP agent from an agent's tool list via `call_acp_agent` (sync or streamed)
- call a remote ACP agent from the operator CLI via `taskforce acp call <peer> <mission>` (sync or streamed)
- list, add, remove, update, and connectivity-probe peers from the CLI and the REST API
- route the in-process message bus over ACP runs so `publish(topic, payload)` fans out to configured peers and `subscribe(topic)` registers a local inbox agent
- receive ACP-delivered missions through the Communication Gateway as the `acp` channel, sharing session/history/push logic with Telegram, Teams, and REST

## Invariants (what must always be true)

- Importing `taskforce` never imports `acp_sdk`; profiles with no `acp:` block remain fully usable on a plain `uv sync` install.
- A call to an unknown peer raises (CLI exits non-zero, `call_acp_agent` returns an error payload with `success=false`) — there is no silent fallback to a default peer.
- A cross-tenant ACP call is rejected unless the peer carries `allow_cross_tenant: true`; when both an `allow_cross_tenant` peer and a `cross_tenant_acp_authorizer` are installed, the authorizer's verdict applies on every call (no caching).
- A peer's tenant scope hides it from other tenants in `peers.list()` / `peers.get(name)`; a hidden peer cannot be removed by an unauthorised tenant.
- Connectivity probe (`POST /peers/{name}/test`, `ping_peer`) reports `ok=false` when an auth-required peer responds with 401/403 — reachability alone is not success.
- The on-disk peer registry file is written with mode `0600` on POSIX so literal bearer tokens are not world-readable.
- Bearer tokens stored via `token_env` are resolved at read time, not at registration; rotating the env var takes effect on the next `peers.get()`.
- `AcpRuntime.start()` and `stop()` are idempotent — repeated calls do not double-start the embedded server or leak client sessions.
- A failing ACP call inside `call_acp_agent` never crashes the parent agent; the failure surfaces as a tool-result payload with `success=false` and a structured `error` field.

## API surface (the contract clients depend on)

The Taskforce REST API exposes peer management for operators and the UI. The
actual ACP protocol endpoints (`/agents`, `/runs`, …) are served by the
embedded `acp_sdk.server.Server` on the port configured under
`acp.server.port`, not by the Taskforce FastAPI app.

- GET    /api/v1/acp/peers → 200 with peer list
- GET    /api/v1/acp/status → 200 with `{configured_peers, peers[]}`
- POST   /api/v1/acp/peers → 201 created
- POST   /api/v1/acp/peers → 409 on duplicate name
- POST   /api/v1/acp/peers → 400 on invalid payload
- PUT    /api/v1/acp/peers/{name} → 200 (creates if missing)
- PUT    /api/v1/acp/peers/{name} → 400 on invalid payload
- DELETE /api/v1/acp/peers/{name} → 204
- DELETE /api/v1/acp/peers/{name} → 404 when missing
- POST   /api/v1/acp/peers/{name}/test → 200 with `{ok, status_code, latency_ms, agent, base_url, error}`
- POST   /api/v1/acp/peers/{name}/test → 404 when peer missing

## Configuration surface (the profile keys operators rely on)

- `acp.server.enabled: bool` (default `false`) — start the embedded ACP server on profile load.
- `acp.server.host: str` (default `0.0.0.0`), `acp.server.port: int` (default `8800`).
- `acp.server.agent_name: str | null` (default `null`, falls back to profile name) — name under which the profile is advertised.
- `acp.server.expose_profile: bool` (default `true`) — register the profile's main agent as an ACP agent.
- `acp.peers: list[{name, base_url, agent, description, tenant_id, allow_cross_tenant, auth}]` — peers usable from this profile.
- `acp.peers[].auth.type: "none"|"bearer"|"mtls"` (default `none`). `bearer` reads `token` or resolves `token_env` at call time; `mtls` carries `cert_path` / `key_path` (schema only — runtime is a known gap).
- `acp.message_bus.transport: "in_memory"|"acp"` (default `in_memory`) — swap the in-process bus for the ACP-backed one.
- `acp.message_bus.publish_peers: list[str]` — peer names that receive `publish(topic, …)` runs (mission agent = `bus_<topic>`).
- `acp.message_bus.subscribe_topics: list[str]` — topics auto-registered as inbox agents on the local ACP server.
- `TASKFORCE_ACP_WORK_DIR` env var — overrides the directory holding `acp_peers.json` (default `.taskforce`); tests and tenant overlays use it.

## Extension points

- `AcpServerProtocol`, `AcpClientProtocol`, `AcpPeerRegistryProtocol`, `AcpRuntimeProtocol` in `taskforce.core.interfaces.acp` — replace any layer of the ACP stack (e.g. swap the SDK, plug in a tenant-aware registry, point at a different transport).
- `InMemoryPeerRegistry`, `FilePeerRegistry`, `EnvPeerRegistry`, `TenantScopedPeerRegistry` in `taskforce.infrastructure.acp.peer_registry` — composable registry wrappers; enterprise overlays stack `TenantScopedPeerRegistry` on top of a postgres-backed inner.
- `set_acp_tenant_id_provider` / `get_acp_tenant_id_provider` in `taskforce.application.infrastructure_overrides` — host applications inject a per-request tenant resolver consumed by `AcpRuntime.call()`.
- `get_cross_tenant_acp_authorizer` in `taskforce.application.infrastructure_overrides` — install a callback that approves or denies each cross-tenant call, evaluated per call (never cached).
- `AcpInboundAdapter(shared_secret=...)` in `taskforce.infrastructure.acp.acp_gateway_adapters` — configure a shared-secret header check when ACP traffic enters via the Communication Gateway.

## Tests (must exist and pass)

- spec("acp.no_acp_section_works_without_sdk")
- spec("acp.unknown_peer_raises_not_falls_back")
- spec("acp.cross_tenant_call_denied_without_flag")
- spec("acp.cross_tenant_authorizer_consulted_per_call")
- spec("acp.tenant_scoped_registry_hides_other_tenants")
- spec("acp.ping_reports_ok_false_on_auth_failure")
- spec("acp.peers_file_chmod_0600_on_posix")
- spec("acp.bearer_token_env_resolved_at_call_time")
- spec("acp.runtime_start_stop_idempotent")
- spec("acp.call_acp_agent_failure_returns_payload_not_raises")
- spec("acp.post_peers_duplicate_returns_409")
- spec("acp.delete_peer_missing_returns_404")
- spec("acp.test_peer_missing_returns_404")
- spec("acp.message_bus_publish_fans_out_to_publish_peers")

- spec("acp.message_bus_publish_crosses_acp_network_to_subscriber")  # integration test, two loopback runtimes

## Known gaps

- **`AcpMessageBus.subscribe` has no lock around inbox-agent registration.** Two concurrent `subscribe(topic)` calls for the same topic on a cold queue can both pass the `existing` check and register the handler twice on the underlying ACP server. Tracked in #313.
- **mTLS is config-only.** `auth.type: mtls` and the `cert_path` / `key_path` fields are accepted by the schema but the client layer still defaults to plain HTTPS / bearer. Documented at `docs/features/acp.md` → "Limitations".
- **No replay protection on the inbound gateway adapter's shared secret.** A captured legitimate ACP request with the correct `X-ACP-Secret` header can be replayed indefinitely. Same root cause as gateway #285 but separate code path.
- **`AcpOutboundSender.send_file` raises `NotImplementedError`.** Proactive file attachments are not yet supported over ACP; the Communication Gateway's file-send path will fail for the `acp` channel.
- **The on-disk peer registry stores literal bearer tokens unencrypted** when callers populate `auth.token` instead of `auth.token_env`. File mode 0600 protects against other-user reads but not root/backup leakage. Prefer `token_env` in production.
- **No `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.

# Observability — Phoenix Tracing + Token Analytics

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
Two cooperating subsystems give the operator visibility into what every agent
just did and how much it cost. **Phoenix tracing** (optional, opt-in via
`--extra tracing`) auto-instruments LiteLLM so every LLM call, tool call and
agent step shows up as an OpenTelemetry span in Arize Phoenix (or any
OTLP-compatible collector). **Token analytics** (core, always on) records
every completion to a SQLite ledger so the dashboard can show per-session,
per-conversation, per-agent and per-model token + cost roll-ups without
depending on the trace backend.

## Capabilities (what the operator can do)

- enable Phoenix tracing by setting `TRACING_ENABLED=true` (default) and
  starting the API server — auto-instrumentation captures every LLM call
  with no code changes
- point traces at a custom Phoenix or OTLP collector via
  `PHOENIX_COLLECTOR_ENDPOINT` / `PHOENIX_GRPC_ENDPOINT` and group them
  under a custom project name via `PHOENIX_PROJECT_NAME`
- create custom spans inside application code via `get_tracer()` (returns
  `None` cleanly when tracing isn't initialised)
- track per-call token usage + USD cost for every completion without
  configuring anything — the LiteLLM callback installs at server import
- query token usage bucketed by `day` / `hour` / `minute` over an
  arbitrary time range via `GET /api/v1/analytics/token-usage`
- get a today / week / month cost roll-up plus breakdowns by agent and by
  model via `GET /api/v1/analytics/cost-summary`
- drill into one conversation's complete call list via
  `GET /api/v1/analytics/conversations/{id}/usage`
- override the ledger location with `TASKFORCE_ANALYTICS_DB` (defaults to
  `.taskforce/analytics.db`)

## Invariants (what must always be true)

- The token-analytics callback never raises into the LLM call path; any
  callback exception is swallowed and logged, the completion still
  returns normally.
- The SQLite write path catches every `sqlite3.Error` and returns `None`
  instead of propagating — a corrupt or locked ledger never breaks an
  agent run.
- Cost is computed from a pricing table at record time and stored as a
  numeric column; later pricing-table changes do not retroactively
  rewrite historical rows.
- Every recorded call carries its model name; rows without resolvable
  agent metadata fall back to `(unknown)` in aggregations rather than
  being dropped.
- `init_tracing()` is a best-effort no-op when `phoenix.otel` or
  `openinference.instrumentation.litellm` is not installed (warning
  logged, server continues to start).
- `init_tracing()` with `TRACING_ENABLED=false` skips all collector setup
  and returns immediately — no spans are exported and no warning fires.
- `shutdown_tracing()` flushes pending spans before clearing the global
  provider; calling it without a prior init is a no-op.
- Run-context metadata (session_id, conversation_id, agent_id, profile)
  set via `run_context(...)` is attached to every ledger row recorded
  inside that context, including rows produced by LiteLLM callbacks fired
  from background tasks the executor spawned.
- The SQLite ledger uses WAL journaling so analytics aggregations don't
  block the writer on the LLM hot path.
- `cost-summary` always returns the three rollups (`today_usd`,
  `week_usd`, `month_usd`) even on an empty database — zeros, not
  missing keys.

## API surface

- GET /api/v1/analytics/token-usage → 200 with buckets (granularity
  `day` | `hour` | `minute`, optional `from` / `to` ISO timestamps,
  optional `agent`)
- GET /api/v1/analytics/cost-summary → 200 with today / week / month
  rollups + per-agent + per-model breakdowns
- GET /api/v1/analytics/conversations/{conversation_id}/usage → 200 with
  per-conversation totals and per-call list

## Configuration surface

Tracing — environment variables read at `init_tracing()` time:

- `TRACING_ENABLED` (default `true`) — opt-out switch; disables all
  Phoenix setup when `false`
- `PHOENIX_PROJECT_NAME` (default `taskforce`) — Phoenix project under
  which spans are grouped
- `PHOENIX_COLLECTOR_ENDPOINT` (default `http://localhost:6006/v1/traces`)
  — HTTP OTLP endpoint
- `PHOENIX_GRPC_ENDPOINT` (default `http://localhost:4317`) — gRPC OTLP
  endpoint (used in preference to HTTP for performance)

Token analytics — environment variable:

- `TASKFORCE_ANALYTICS_DB` — override SQLite ledger path (default
  `.taskforce/analytics.db`)

Install the tracing dependencies via `uv sync --extra tracing`. Token
analytics ships in core and needs no extra.

## Extension points

- `get_tracer()` in `taskforce.application.tracing_facade` — returns the
  active OTEL tracer (or `None`) so application code can create custom
  spans without importing the infrastructure layer
- `run_context(...)` in `taskforce.application.token_ledger` — context
  manager that stamps session / conversation / agent / profile metadata
  on every ledger row recorded inside the block

## Tests (must exist and pass)

- spec("observability.token_callback_never_raises_into_llm_path")
- spec("observability.token_ledger_swallows_sqlite_errors")
- spec("observability.token_ledger_attaches_run_context")
- spec("observability.cost_summary_returns_zeros_on_empty_db")
- spec("observability.token_usage_buckets_by_granularity")
- spec("observability.tracing_disabled_when_env_false")
- spec("observability.tracing_init_noop_without_phoenix_installed")
- spec("observability.tracing_shutdown_flushes_before_clearing")
- spec("observability.analytics_db_path_honours_env_override")

## Known gaps

- **Tracing init/shutdown are not lock-protected.** `init_tracing()` and
  `shutdown_tracing()` mutate module-globals (`_tracer_provider`,
  `_tracer`) without synchronisation. Concurrent init from two startup
  paths, or a shutdown racing a re-init, can leak the provider or null
  the tracer mid-call. Tracked in #315.
- **Trace export is fire-and-forget.** `init_tracing()` swallows export
  failures with a single warning; downstream collector outages are not
  retried and not surfaced beyond the log line.

# Multi-Tenant Runtime — Tenant + User Scoping Seams

> **Status:** `enterprise` · **Since:** `2026-05-02` · **Last verified:** `2026-05-16` · **ADR:** `ADR-022` · **Owner:** `rudi77`
The framework itself is single-tenant: every persistence and runtime
adapter that ships with `taskforce` writes to one flat `${WORK_DIR}/...`
tree. Multi-tenancy is realised by `taskforce-enterprise`, a separate
plugin package, which installs per-request `(tenant_id, user_id)`
resolution and replaces ~25 framework store builders with tenant-scoped
implementations through a single registry of override hooks. This spec
documents the **framework contract** — the seams the plugin plugs into,
the path layout it produces, and the invariants the framework promises
to preserve. The enterprise plugin's own surface (admin UI, RBAC
policy, Postgres adapters) is documented in its own repo.

## Capabilities (what the user can do)

- run `taskforce` standalone with no override installed and observe bit-for-bit single-tenant behaviour (`tenant_id = "default"`, no user filter)
- install the enterprise plugin to get per-tenant + per-user scoping of every persistent store without forking framework code
- ask "what tenant/user is this request for?" from any framework call site via `get_current_tenant_id()` / `get_current_user_id()` without importing anything tenant-aware
- run background jobs (scheduler, webhooks) inside a tenant context via the installed tenant-context runner
- partition ACP peers per tenant and gate cross-tenant calls through an installable authorizer
- be warned at startup when a multi-tenant runtime is active but no sandboxed executor is wired

## Invariants (what must always be true)

- The framework's domain protocols (`StateManagerProtocol`, `ConversationManagerProtocol`, `WikiStoreProtocol`, …) carry no `tenant_id` or `user_id` parameter; tenancy is realised by *which instance* of the adapter is returned, never by parameter on the call.
- With no overrides installed, every store builder returns the framework's flat single-tenant default — installing the plugin must be the *only* thing that changes runtime layout.
- `get_current_tenant_id()` returns `"default"` when no resolver is installed; a resolver that raises is caught and falls back to `"default"` (a buggy plugin must not break the framework).
- `get_current_user_id()` returns `None` when no resolver is installed; framework adapters that see `None` must treat it as "no user filter applies", not as an explicit user.
- Per-user file layout (when the plugin routes paths) is `${WORK_DIR}/tenants/${tid}/users/${uid}/...` for per-user buckets and `${WORK_DIR}/tenants/${tid}/{custom,workflows}/...` for tenant-shared buckets; the framework writes nothing under this layout itself.
- Overrides are resolved on every builder call (not cached), so installs and uninstalls take effect immediately without restarting workers.
- The override slots are module-level globals and not thread-safe; the plugin must install them once at bootstrap before worker threads start.
- `clear_infrastructure_overrides()` resets every slot — test teardown can rely on it to prevent leakage across tests.
- The framework never imports `taskforce_enterprise`, `TenantContext`, or `UserContext`; the only types that cross the boundary are the protocol stubs in `core/interfaces/identity_stubs.py`.
- Running multi-tenant without `set_sandboxed_executor(...)` is unsafe but allowed; the framework emits a one-shot `RuntimeWarning` so the unsafe state is visible in logs.

## Extension points (for plugins / enterprise / external use)

All hooks live in `taskforce.application.infrastructure_overrides`. The
plugin calls each `set_*` once at bootstrap; the framework reads via
the matching `get_*` at builder call time. Returning `None` (or never
installing) keeps the framework default.

### Identity resolvers (the root seam)

- `set_tenant_resolver(() -> str)` — answers "what tenant is this request for?". `get_current_tenant_id()` calls this; default returns `"default"`.
- `set_user_resolver(() -> str | None)` — same shape for user; `get_current_user_id()` returns `None` when unset.
- `set_tenant_context_runner(async (tenant_id, async fn) -> Any)` — lets background callbacks (scheduler events, webhook routes) execute work *inside* a tenant context they didn't enter through HTTP auth.
- `set_acp_tenant_id_provider(() -> str)` — separate slot for the ACP runtime (constructor-stored independently from the framework-wide resolver).

### Per-tenant / per-user store overrides

Each accepts a `Callable[[work_dir], <protocol impl>]` (or zero-arg
where noted) and must return an object satisfying the matching
protocol from `core/interfaces/`. Installed once; consulted every
builder call so the plugin can re-resolve per request.

- `set_agent_registry_override` — custom-agent registry (tenant-shared bucket).
- `set_deployment_manifest_override` — per-tenant visible-agents allowlist; beats both `VISIBLE_AGENTS` settings and `deployment.yaml`.
- `set_settings_store_override` — replace the file-based Fernet-encrypted store with a tenant-scoped backend (see `settings-store.md`).
- `set_project_store_override` — tenant-scope the CoWork project registry (see `cowork.md`).
- `set_state_manager_override` — per-user session state.
- `set_conversation_store_override` — per-user conversation history.
- `set_agent_state_override` — per-user singleton agent state (ADR-016).
- `set_wiki_store_override` — per-user wiki memory (ADR-020).
- `set_token_store_override` — per-user OAuth token store (zero-arg; per-user resolution lives inside the plugin's factory).
- `set_workflow_definition_store_override` / `set_workflow_checkpoint_store_override` — tenant-shared workflow definitions, per-user checkpoints (ADR-014-hitl).
- `set_experience_store_override` — per-user session experience traces (issue #196).
- `set_standing_goal_store_override` — per-user standing goals (ADR-024); sharing across users would fire someone else's weekly summary.
- `set_runtime_checkpoint_store_override` — per-session checkpoint store inside `build_runtime_tracker`.
- `set_pending_channel_question_store_override` — per-user outstanding `ask_user` questions.
- `set_tool_result_store_override` — per-user tool result cache; caching A's `python` output and serving it to B is a privacy leak even if args match.
- `set_butler_state_dir_override` — per-user butler tool state directory (gmail seen ids, calendar last-check); consulted at write time so a process-shared tool can still route per-user.
- `set_sub_agent_result_dir_override` — per-user `ParallelAgentTool` result directory; consulted at write time.
- `set_upload_storage_dir_override` — per-user `FileStorage` root (each scope gets its own SQLite index).

### Gateway hooks (channel layer; see also `gateway.md`)

- `set_gateway_components_override` — replace the whole gateway components bundle.
- `set_recipient_resolver_override` — channel identity → `(tenant_id, user_id)` mapping.
- `set_agent_lookup_override` — `@agent_name` mention resolution inside the resolved tenant.
- `set_workflow_lookup_override` — `@workflow_name` chat trigger.
- `set_channel_link_registry_override` — back the `/link <code>` pairing registry with a tenant-scoped store (issue #162).
- `set_webhook_workflow_resolver(async path → tenant_id)` — for the auth-exempt webhook route, lets it discover which tenant owns a workflow path on a local miss.

### Policy / runtime hooks

- `set_cross_tenant_acp_authorizer((caller_tid, peer_tid, peer) -> bool)` — ADR-022 §6 gate; default allows when `allow_cross_tenant=True` on the peer.
- `set_sandboxed_executor(SandboxedExecutorProtocol)` — container-backed executor for `bash` / `shell` / `python`; absent means in-process (unsafe in multi-tenant; the framework warns via `warn_if_multi_tenant_without_sandbox()`).
- `set_mission_lifecycle_hook(MissionLifecycleHookProtocol)` — observe mission start / complete (typically wired to AuditEvents in the plugin).
- `set_approval_service(ApprovalServiceProtocol)` — gate `requires_approval` tools (see `approval-gating.md`).
- `set_approval_bypass_override(list[str])` — tenant-level approval bypass; UNION-merged with per-agent `agent.approval_bypass_tools`.
- `set_workspace_context_provider(() -> WorkspaceContextProtocol | None)` — per-call workspace root for path-aware tools (`file_read`, `file_write`, `edit`); rejects `..` traversal at the tool layer.

### Identity protocol stubs (`core/interfaces/identity_stubs.py`)

- `TenantContextProtocol`, `UserContextProtocol`, `IdentityProviderProtocol`, `PolicyEngineProtocol`, `TenantResolverProtocol` — runtime-checkable minimal shapes the framework uses for type annotations without importing the enterprise plugin. `AnonymousUser` and `DefaultTenant` are the fallback singletons when no plugin is installed.

## Tests (must exist and pass)

- spec("multi-tenant.no_overrides_returns_default_tenant")
- spec("multi-tenant.no_overrides_returns_none_user")
- spec("multi-tenant.tenant_resolver_exception_falls_back_to_default")
- spec("multi-tenant.user_resolver_exception_falls_back_to_none")
- spec("multi-tenant.clear_infrastructure_overrides_resets_every_slot")
- spec("multi-tenant.override_resolved_per_call_not_cached")
- spec("multi-tenant.multi_tenant_without_sandbox_warns_once")
- spec("multi-tenant.framework_has_no_taskforce_enterprise_import")
- spec("multi-tenant.identity_stubs_are_runtime_checkable")

## Known gaps

- **`HTTPException.detail` is serialised as-is** by `taskforce_http_exception_handler` when `X-Taskforce-Error: 1` is set. In a multi-tenant deployment a route that builds a `detail` dict with stack traces, internal paths, or other tenant data leaks it to the client. Tracked in #289.
- **Slice 5 container sandbox is deferred.** The framework ships only the in-process default + startup warning; running multi-tenant SaaS today requires the operator to either accept host-level tool visibility or wire their own `SandboxedExecutorProtocol`.
- **Override slots are not thread-safe.** Installing a hook after worker threads start is undefined behaviour. The framework documents this but does not enforce it.
- **The framework cannot detect "multi-tenant runtime"** beyond "tenant resolver is installed". An operator who installs a resolver returning `"default"` is treated as single-tenant by the sandbox warning, even if they intend otherwise.
- **Multi-tenant gap reclassification.** A shipped multi-tenant feature that still behaves single-tenant is a *bug* against this spec (e.g. #226 wiki tool ignoring `set_wiki_store_override`, #228 multi-bot per user), not a new feature. The v0.2.0 feature freeze does not cover these gaps.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state.

# CoWork — Per-Project Workspaces

> **Status:** `shipped` · **Since:** `2026-05-15` · **Last verified:** `2026-05-17` · **Owner:** `rudi77`
A user organises work into projects. Each project is a directory the user
owns; taskforce remembers the project in a small registry and, when a
conversation is bound to that project, runs the agent with its working
directory rooted at the project's path. Conversations without a project
keep working with the global work directory — projects are opt-in.

## Capabilities (what the user can do)

- create a project from scratch (taskforce creates the directory) OR by importing an existing directory
- list all projects, newest first
- look up a single project by id
- remove a project from the registry without losing the on-disk files
- bind a new conversation to a project so the agent runs in that project's folder
- filter the conversations list by project

## Invariants (what must always be true)

- Two projects cannot point at the same on-disk directory; conflicting create attempts return a clear error, never silent overwrite.
- Removing a project from the registry never deletes the user's files on disk.
- Every project directory contains at minimum a `CLAUDE.md` and a `skills/` folder — taskforce creates them when missing, but never overwrites them when present.
- Concurrent create attempts for the same path cannot both succeed; conflict detection is process-wide, not per-request.
- Conversations without a `project_id` are fully usable; project binding is strictly opt-in.
- When a conversation has a `project_id`, the agent's working directory IS that project's path (not the global `TASKFORCE_WORK_DIR`).
- The conversations list can be filtered by `project_id`; unfiltered, all conversations remain visible regardless of project membership.

## API surface (the contract clients depend on)

- POST /api/v1/projects → 201 created
- POST /api/v1/projects → 409 on duplicate path
- POST /api/v1/projects → 400 on invalid path (empty, mode=existing with missing dir, or non-directory)
- GET  /api/v1/projects → 200 (list, newest first)
- GET  /api/v1/projects/{project_id} → 200
- GET  /api/v1/projects/{project_id} → 404 if missing
- DELETE /api/v1/projects/{project_id} → 204
- DELETE /api/v1/projects/{project_id} → 404 if missing
- POST /api/v1/conversations accepts optional `project_id` in body
- GET  /api/v1/conversations accepts `project_id` as query filter

## Extension points

- `set_project_store_override` — enterprise plugins replace the default file-backed registry with a tenant-scoped store. Resolved per-request (not cached), so installs and uninstalls take effect immediately.
- `set_workspace_context_provider` (`application/infrastructure_overrides.py`) — per-request workspace-context factory consumed by the agent execution path. Scopes path-aware tools (`file_read`, `file_write`, `edit`, ...) to the agent's writable workspace and rejects `..` traversal. Required in multi-tenant deployments so the agent's working directory and path validation are scoped to the current `(tenant, user)`; without it the framework default (no scoping) applies.

## Tests (must exist and pass)

- spec("cowork.create_scratch_creates_anchors")
- spec("cowork.create_existing_rejects_missing_dir")
- spec("cowork.create_duplicate_path_returns_409")
- spec("cowork.delete_keeps_directory")
- spec("cowork.concurrent_create_serialized")
- spec("cowork.conversation_with_project_id_routes_to_project_path")
- spec("cowork.conversation_without_project_id_uses_global_workdir")
- spec("cowork.list_filtered_by_project_id")

## Known gaps

- No archive endpoint — today the user either deletes (registry-only) or leaves a project alone. The cowork-comparison vision document hints at archive semantics, but they are not in the contract.
- Project deletion does not cascade to conversations. A conversation pointing at a deleted project will fail to resolve its working directory on the next execution.
- No project-level ownership or transfer. Multi-tenant scoping happens at the store level (via the override hook); per-project transfer between users is not modeled.
- No backend `@pytest.mark.spec` markers exist yet — the Tests section above asserts the target, not current state. The UI test (`ProjectDetailPage.test.tsx`) exists but is not yet marked.
