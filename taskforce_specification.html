<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taskforce Specification</title>

<!-- Vendor: marked, mermaid, highlight.js -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<style>
  :root {
    --bg:           #0f1419;
    --bg-elev:      #161c24;
    --bg-elev-2:    #1d242e;
    --bg-code:      #11161c;
    --border:       #2a3340;
    --border-soft:  #1f2731;
    --text:         #e5ecf3;
    --text-soft:    #a6b3c2;
    --text-dim:     #6b7886;
    --accent:       #5eead4;
    --accent-soft:  #134e4a;
    --accent-glow:  rgba(94,234,212,.15);
    --link:         #7dd3fc;
    --warn:         #fbbf24;
    --danger:       #f87171;
    --success:      #4ade80;
    --shadow:       0 2px 8px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.2);
    --radius:       6px;
    --radius-lg:    10px;
    --sidebar-w:    320px;
    --header-h:     64px;
    --fontUI:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --fontMono:     'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, Menlo, monospace;
  }

  [data-theme="light"] {
    --bg:           #f7f9fb;
    --bg-elev:      #ffffff;
    --bg-elev-2:    #f0f3f7;
    --bg-code:      #f4f6f9;
    --border:       #d6dde5;
    --border-soft:  #e6ebf0;
    --text:         #1a2330;
    --text-soft:    #4a5568;
    --text-dim:     #7a8696;
    --accent:       #0d9488;
    --accent-soft:  #ccfbf1;
    --accent-glow:  rgba(13,148,136,.12);
    --link:         #0369a1;
    --shadow:       0 2px 8px rgba(15,30,60,.06), 0 1px 2px rgba(15,30,60,.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--fontUI);
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ====== TOPBAR ====== */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 20px;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .topbar .brand {
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; font-size: 15px;
    color: var(--text);
    white-space: nowrap;
  }
  .topbar .brand .logo {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent) 0%, #06b6d4 100%);
    display: flex; align-items: center; justify-content: center;
    color: #0a1820; font-weight: 800; font-size: 14px;
    box-shadow: 0 1px 4px rgba(94,234,212,.4);
  }
  .topbar .brand .version-pill {
    margin-left: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent-soft);
    color: var(--accent);
    letter-spacing: .03em;
  }
  .topbar .brand .version-pill:empty { display: none; }
  .topbar .meta {
    color: var(--text-dim);
    font-size: 12px;
    flex-shrink: 0;
  }
  .topbar .spacer { flex: 1; }
  .topbar .search-wrap {
    position: relative;
    width: 320px;
    max-width: 35vw;
  }
  .topbar .search {
    width: 100%;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 8px 12px 8px 34px;
    font-family: inherit;
    font-size: 13px;
    transition: border .15s, box-shadow .15s;
  }
  .topbar .search:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .topbar .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
    pointer-events: none;
  }
  .topbar button.icon-btn {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text-soft);
    width: 36px; height: 36px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 16px;
    transition: all .15s;
  }
  .topbar button.icon-btn:hover {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ====== LAYOUT ====== */
  .layout {
    margin-top: var(--header-h);
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: calc(100vh - var(--header-h));
  }

  /* ====== SIDEBAR ====== */
  .sidebar {
    position: fixed;
    top: var(--header-h);
    left: 0;
    bottom: 0;
    width: var(--sidebar-w);
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0 32px;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .toc-section { margin-bottom: 4px; }
  .toc-section-title {
    padding: 12px 20px 6px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 6px;
  }
  .toc a {
    display: block;
    color: var(--text-soft);
    text-decoration: none;
    padding: 4px 20px;
    font-size: 13px;
    line-height: 1.5;
    border-left: 2px solid transparent;
    transition: background .12s, color .12s, border-color .12s;
  }
  .toc a:hover { color: var(--text); background: var(--bg-elev-2); }
  .toc a.level-2 { padding-left: 20px; font-weight: 600; color: var(--text); margin-top: 4px; }
  .toc a.level-3 { padding-left: 32px; }
  .toc a.level-4 { padding-left: 44px; font-size: 12.5px; color: var(--text-dim); }
  .toc a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-glow);
  }
  .toc a.dimmed { opacity: .35; }
  .toc a.match { background: var(--accent-glow); color: var(--text); }

  /* ====== CONTENT ====== */
  .content {
    grid-column: 2;
    padding: 36px 60px 120px;
    max-width: 100%;
    overflow-x: hidden;
  }
  .content-inner { max-width: 880px; margin: 0 auto; }

  .article h1, .article h2, .article h3, .article h4 {
    font-weight: 700;
    color: var(--text);
    line-height: 1.25;
    margin: 2em 0 .5em;
    scroll-margin-top: 84px;
  }
  .article h1 {
    font-size: 32px;
    margin-top: 0;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .article h2 {
    font-size: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border-soft);
    margin-top: 3em;
  }
  .article h2:first-child { border-top: none; margin-top: 0; padding-top: 0; }
  .article h3 { font-size: 19px; color: var(--accent); }
  .article h4 { font-size: 16px; color: var(--text-soft); }

  .article h1 .anchor, .article h2 .anchor, .article h3 .anchor, .article h4 .anchor {
    opacity: 0; margin-left: 8px; color: var(--text-dim);
    text-decoration: none; font-weight: 400;
    transition: opacity .15s;
    -webkit-text-fill-color: var(--text-dim);
  }
  .article h1:hover .anchor, .article h2:hover .anchor, .article h3:hover .anchor, .article h4:hover .anchor { opacity: 1; }

  .article p { margin: 0 0 1em; color: var(--text); }
  .article ul, .article ol { padding-left: 1.5em; margin: 0 0 1em; }
  .article li { margin: .3em 0; }
  .article a { color: var(--link); text-decoration: none; border-bottom: 1px dotted currentColor; }
  .article a:hover { border-bottom-style: solid; }
  .article strong { color: var(--text); font-weight: 700; }
  .article em { color: var(--text-soft); }
  .article hr { border: none; height: 1px; background: var(--border); margin: 3em 0; }
  .article img { display: none; /* hide broken /mnt/data refs etc.; remove this rule to show images */ }

  /* ====== CODE ====== */
  .article pre {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin: 1em 0 1.5em;
    overflow-x: auto;
    position: relative;
    font-size: 13px;
    line-height: 1.55;
    box-shadow: var(--shadow);
  }
  .article pre code {
    font-family: var(--fontMono);
    background: transparent !important;
    padding: 0 !important;
    color: var(--text);
  }
  .article :not(pre) > code {
    font-family: var(--fontMono);
    font-size: .88em;
    background: var(--bg-elev-2);
    border: 1px solid var(--border-soft);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--bg-elev-2);
    color: var(--text-soft);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--fontMono);
    padding: 3px 8px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s, color .15s, background .15s;
  }
  .article pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); }

  .code-lang {
    position: absolute;
    top: 8px; left: 14px;
    font-size: 10px;
    font-family: var(--fontMono);
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: .1em;
    text-transform: uppercase;
    pointer-events: none;
  }
  .article pre.has-lang { padding-top: 30px; }

  /* ====== TABLES ====== */
  .article table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0 1.5em;
    font-size: 14px;
    background: var(--bg-elev);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .article th {
    text-align: left;
    background: var(--bg-elev-2);
    color: var(--text);
    font-weight: 600;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .article td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft);
    color: var(--text-soft);
    vertical-align: top;
  }
  .article tr:last-child td { border-bottom: none; }
  .article tr:hover td { background: var(--bg-elev-2); }

  /* ====== BLOCKQUOTE ====== */
  .article blockquote {
    border-left: 3px solid var(--accent);
    margin: 1em 0;
    padding: 8px 16px;
    background: var(--accent-glow);
    color: var(--text-soft);
    border-radius: 0 var(--radius) var(--radius) 0;
  }

  /* ====== MERMAID ====== */
  .mermaid-container {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin: 1.5em 0;
    text-align: center;
    overflow-x: auto;
    box-shadow: var(--shadow);
  }
  .mermaid-container svg { max-width: 100%; height: auto; }

  /* ====== BANNER ====== */
  .doc-banner {
    background: linear-gradient(135deg, var(--bg-elev) 0%, var(--bg-elev-2) 100%);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin: 0 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    font-size: 13px;
  }
  .doc-banner .item .label {
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .doc-banner .item .value { color: var(--text); font-weight: 500; }

  /* ====== PROGRESS ====== */
  .reading-progress {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    width: 0%;
    z-index: 99;
    transition: width .1s;
  }

  /* ====== FOOTER ====== */
  .footer {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border-soft);
  }

  /* ====== LOADER ====== */
  .loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    z-index: 200;
    transition: opacity .3s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  .loader .label { color: var(--text-soft); font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ====== ZOOMABLE FIGURES ====== */
  .mermaid-container, .article img:not(.no-zoom) {
    cursor: zoom-in;
  }
  .figure-zoom-modal {
    position: fixed;
    inset: 0;
    background: rgba(8, 12, 18, .92);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  [data-theme="light"] .figure-zoom-modal { background: rgba(20, 30, 50, .85); }
  .figure-zoom-modal.open { display: flex; }
  .figure-zoom-stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
  }
  .figure-zoom-stage.dragging { cursor: grabbing; }
  .figure-zoom-content {
    transform-origin: 50% 50%;
    transition: transform .08s ease-out;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
  }
  .figure-zoom-content svg,
  .figure-zoom-content img {
    max-width: 92vw;
    max-height: 88vh;
    width: auto;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,.5));
  }
  .figure-zoom-toolbar {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    z-index: 1001;
  }
  .figure-zoom-toolbar button {
    background: var(--bg-elev);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    font-family: var(--fontMono);
    font-size: 13px;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
    min-width: 36px;
  }
  .figure-zoom-toolbar button:hover {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }
  .figure-zoom-hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-soft);
    font-size: 12px;
    font-family: var(--fontMono);
    background: var(--bg-elev);
    border: 1px solid var(--border-soft);
    border-radius: 99px;
    padding: 6px 14px;
    pointer-events: none;
    opacity: .85;
    z-index: 1001;
  }
  .figure-zoom-scale-badge {
    position: fixed;
    top: 16px;
    left: 16px;
    color: var(--accent);
    font-size: 12px;
    font-family: var(--fontMono);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    pointer-events: none;
    z-index: 1001;
  }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); transition: transform .2s; }
    .sidebar.open { transform: translateX(0); }
    .layout { grid-template-columns: 1fr; }
    .content { padding: 24px; grid-column: 1; }
    .topbar { padding: 0 12px; gap: 12px; }
    .topbar .meta { display: none; }
    .topbar .search-wrap { width: auto; flex: 1; max-width: 100%; }
    .menu-btn { display: inline-flex !important; }
  }
  .menu-btn { display: none; }
</style>
</head>

# Taskforce Feature Spec — Index

**Generated:** 2026-05-16 (Phase A1 of spec-check rollout)
**Total features:** 27 subsystems + 3 presentation-layer = 30 specs (agent packages explicitly excluded — see below)

Each row links to its dedicated spec file under `docs/spec/<feature>.md`. Files marked as `_TODO_` haven't been written yet — Phase A3 (3 pilots) and Phase A4 (bulk).

## Status legend
- **shipped** — production-ready, in default profile or as documented opt-in
- **partial** — code exists but coverage/docs/tests incomplete
- **wip** — in active development (last commit < 2 weeks)
- **legacy** — older feature, may be slated for replacement
- **deprecated** — explicitly retired
- **enterprise** — only available with `taskforce-enterprise` plugin installed

---

## Core Framework

| # | Feature | Status | Spec | Description |
|---|---------|--------|------|-------------|
| 01 | ReAct Loop & Planning Strategies | shipped | [react-loop.md](#react-loop-planning-strategies) | Main agent execution engine + 4 strategies (native_react, plan_and_execute, plan_and_react, spar) |
| 02 | Context Manager | shipped | [context-manager.md](#context-manager) | Single source of truth for LLM context (messages + tools), token budgeting, role-aware compression |
| 03 | Tool System | shipped | [tools.md](#tool-system-registry-resolution-approval-mcp-parallel-exec-result-store) | Native tools (~25), registry, MCP integration, approval gating, parallel execution, result store |
| 04 | Sub-Agent Orchestration | shipped | [sub-agents.md](#sub-agent-orchestration) | call_agent, call_agents_parallel, sub-agent context snapshots, ADR-015 |
| 05 | Skills System | shipped | [skills.md](#skills-system-modular-agent-capabilities) | Context/prompt/agent skill types, activation, slash-command resolution, bundled skills |
| 06 | Plugin System | shipped | [plugins.md](#plugin-system-entry-point-discovery-of-tools-cli-apps-and-configs) | Entry-point-based discovery (taskforce.tools, .cli_apps, .config_dirs), bundled plugins, ADR-026 |
| 07 | Profile System | shipped | [profiles.md](#profile-system-agent-configuration-visibility) | YAML profile loading, `.agent.md` format, deployment manifest, profile auto-discovery |

## LLM & Routing

| # | Feature | Status | Spec | Description |
|---|---------|--------|------|-------------|
| 08 | LiteLLM Service | shipped | [llm-service.md](#litellm-service) | Multi-provider (OpenAI, Anthropic, Azure, Google, Ollama) via LiteLLM, retry, streaming |
| 09 | LLM Router | shipped | [llm-router.md](#llm-router-dynamic-per-call-model-selection) | Dynamic per-call model selection via phase hints (planning/reasoning/acting/summarizing), ADR-012 |

# ReAct Loop & Planning Strategies

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **ADR:** `ADR-012` · **Owner:** `rudi77`
The engine that drives every agent execution. An agent reasons step by step
(Thought → Action → Observation), calls tools, and either answers, asks the
user, or hits a step or error limit. Profile authors choose one of four
built-in strategies (`native_react`, `plan_and_execute`, `plan_and_react`,
`spar`) and tune step limits via the profile YAML. Both blocking and
streaming execution interfaces are first-class — the streaming API is the
source of truth, and the blocking one collects from it.

## Capabilities (what the operator/profile-author can do)

- choose one of four built-in planning strategies for an agent via `agent.planning_strategy` in profile YAML
- bound total work via `agent.max_steps`
- tune per-strategy parameters (`max_step_iterations`, `max_plan_steps`, `reflect_every_step`, ...) via `agent.planning_strategy_params`
- consume execution as a stream of typed events (for UI, SSE, logging) or as a single `ExecutionResult` (for batch)
- pause execution mid-mission by emitting an `ask_user` event and resume once the answer arrives
- interrupt a running execution cooperatively from outside (web Stop button, CLI Ctrl-C, programmatic `agent.request_interrupt()`)
- distinguish terminal outcomes via `ExecutionStatus`: `completed`, `failed`, `paused`, `pending`

## Invariants (what must always be true)

- Every execution emits events in this lifecycle order: `STARTED` first, exactly one terminal event from `{FINAL_ANSWER, ASK_USER, INTERRUPTED, ERROR}`, followed by `COMPLETE`. Intermediate events (`STEP_START`, `LLM_TOKEN`, `TOOL_CALL`, `TOOL_RESULT`, `PLAN_UPDATED`, `TOKEN_USAGE`) appear between `STARTED` and the terminal event.
- A `COMPLETE` event is always the last event in the stream, regardless of success or failure.
- The loop terminates as soon as `step >= agent.max_steps`, even if the agent has not produced a final answer; the terminal event in that case is `ERROR` with a `max_steps_reached` kind, never an empty completion.
- An `ASK_USER` event pauses the execution; the loop does not advance until the answer is supplied (status becomes `paused`, not `failed`).
- An `INTERRUPTED` event is emitted on cooperative cancellation; the resulting `ExecutionResult.status` is `paused`, not `failed`, so the conversation can be resumed.
- `LLM_STREAM_RESTART` signals to consumers that all tokens received since the previous restart marker (or `STARTED`) must be discarded — they belong to a failed attempt being retried (e.g. after a content-filter block).
- Tool errors are converted to structured payloads (`{success: false, error, error_type}`), never raw exceptions reaching the LLM.
- Both `Agent.execute()` (blocking) and `Agent.execute_stream()` (streaming) must produce equivalent results for the same input — blocking is implemented by collecting from streaming, so a divergence is a bug.
- Every concrete `PlanningStrategy` implements both `execute()` and `execute_stream()` — the protocol does not allow either to be optional.
- The `native_react` strategy is the framework default when no `planning_strategy` is set.
- `TOKEN_USAGE` events are emitted at least once per execution, with the final cumulative count appearing before `COMPLETE`.

## Configuration surface (the profile keys operators rely on)

- `agent.planning_strategy: <name>` where `<name>` ∈ `{native_react, plan_and_execute, plan_and_react, spar}` (default: `native_react`)
- `agent.planning_strategy_params: dict` with strategy-specific keys:
  - `max_step_iterations: int` (default 4) — per-step LLM retry budget within `plan_and_execute` / `spar`
  - `max_plan_steps: int` (default 12) — cap on TodoList plan length
  - `reflect_every_step: bool` (default false, SPAR-only) — run reflect phase after each act
  - `generate_plan_first: bool` (default false, native_react-only) — emit an upfront plan before looping
- `agent.max_steps: int` — hard ceiling on iterations across all strategies

## Event stream contract (what callers of the streaming API must handle)

Events that any caller (UI, SSE consumer, CLI) must handle as part of the public contract:

- `STARTED` — execution began (always first)
- `STEP_START` — a new reasoning step begins (paired with one ore more LLM_TOKEN / TOOL_CALL / TOOL_RESULT events)
- `LLM_TOKEN` — token from the streaming LLM response (consumers may render or buffer)
- `LLM_STREAM_RESTART` — discard partial tokens since the last restart marker
- `TOOL_CALL` — the LLM decided to call a tool
- `TOOL_RESULT` — the tool returned (may be structured success or error payload)
- `PLAN_UPDATED` — plan steps were added or marked done
- `ASK_USER` — execution paused for user input (terminal until resumed)
- `FINAL_ANSWER` — agent produced the answer
- `INTERRUPTED` — execution paused by cooperative cancel
- `ERROR` — execution failed terminally (carries `error`, `error_kind`)
- `TOKEN_USAGE` — current cumulative token counts (emitted ≥ once)
- `COMPLETE` — always last; carries final `ExecutionStatus`

## Extension points

- `PlanningStrategy` protocol — implement `execute()` + `execute_stream()` and the strategy can be plugged into the agent. Custom strategies are wired via `planning_strategy_factory` in `taskforce.application` — see Known gaps below for the public-registry limitation.

## Tests (must exist and pass)

- spec("react-loop.event_order_started_to_complete")
- spec("react-loop.terminal_event_precedes_complete")
- spec("react-loop.max_steps_terminates_with_error_kind")
- spec("react-loop.ask_user_pauses_execution_with_paused_status")
- spec("react-loop.interrupted_returns_paused_not_failed")
- spec("react-loop.tool_error_returns_structured_payload")
- spec("react-loop.llm_stream_restart_emitted_on_content_filter")
- spec("react-loop.native_react_is_default_strategy")
- spec("react-loop.spar_reflect_phase_runs_when_enabled")
- spec("react-loop.plan_and_execute_steps_sequentially")
- spec("react-loop.streaming_and_blocking_yield_equivalent_results")
- spec("react-loop.token_usage_emitted_before_complete")

## Known gaps

- **`max_steps` semantics undocumented in profile reference.** Today it is unclear whether `max_steps=10` means "10 LLM calls" or "10 successful steps"; the inc/dec rules differ across strategies and across happy-path vs error-path. Tracked in #346.
- **No public registry for custom planning strategies.** Adding a strategy requires editing `planning_strategy_factory` in `application/`, which means it is not actually extensible from a plugin — only from a fork. The `PlanningStrategy` protocol is public but the wiring is closed.
- **`_stream_final_response` in `llm_interactions.py` swallows fatal errors with bare `except`** and retries on the next model hint, burning expensive reasoning tokens for auth/quota errors that will never succeed. Tracked in #326.
- **Tool errors lose `error_kind` between executor and agent dict.** The result dict the LLM sees is `{success: false, error}` only; the typed `error_kind` (transient/permanent) is logged but stripped. Tracked in #334.
- **Cooperative interrupt callback failures are caught as bare `Exception` and only logged as warning** — a broken sub-agent interrupt callback may silently fail to propagate, leaving sub-agents running while the parent thinks it cancelled. Tracked in #335.
- **No `@pytest.mark.spec` markers exist yet** — the Tests section above asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.
- **`generate_plan_first` and `plan_and_react` overlap semantically.** `plan_and_react` is documented as "alias for NativeReAct with plan", but is exposed as a separate strategy name. Either consolidate or document the difference.

# Context Manager

> **Status:** `shipped` · **Since:** `2026-04-13` · **Last verified:** `2026-05-16` · **ADR:** `ADR-025` · **Owner:** `rudi77`
The single source of truth for everything the agent sends to the LLM in one
turn — the system prompt, the running message log, and the OpenAI-format tool
definitions. The ReAct loop drives, the ContextManager owns the bytes that
actually go on the wire. Before every model call it rebuilds the system prompt,
runs role-aware compression if the token budget is hot, and applies an
emergency preflight truncation so a single oversized turn cannot poison the
next request. It also exposes a structured snapshot for `/context` and `/tree`
inspection, and accepts post-execution snapshots from sub-agents so the parent
agent can show what its children worked on.

## Capabilities (what the operator/profile-author can do)

- bound the agent's input window with `agent.max_input_tokens` and start
  compressing early with `agent.compression_trigger` (or the legacy
  `agent.summary_threshold` message count)
- cap individual oversized messages with `agent.tool_message_max_chars` and
  `agent.assistant_message_max_chars` to keep one bad tool result from
  dominating the budget
- inspect what the next LLM call will contain via the `/context` and `/tree`
  CLI commands (system prompt, every message, memory, skills, tools, sub-agent
  snapshots)
- resume a paused execution (`ask_user` answer arrived, conversation
  reactivated) by restoring the full message list verbatim
- let a sub-agent register its final context snapshot on the parent before it
  shuts down, so `/tree --sub-agents` shows what each child actually saw

## Invariants (what must always be true)

- The system prompt is always `messages[0]`; rebuilding the prompt mid-turn
  overwrites that slot in-place rather than appending a duplicate system turn.
- Compression and preflight mutate the existing message list in place — every
  external reference (the ReAct loop's local handle, the agent's
  `state["messages"]`) sees the same updated content after the call returns.
- A `role="tool"` message that survives compression always has a matching
  preceding `role="assistant"` message containing a `tool_calls` entry with
  the same `tool_call_id`; orphan tool messages are dropped before the next
  LLM request.
- Trimming the history to the last N messages never splits a tool-call pair:
  if the kept window starts inside a tool reply, the window is widened backward
  to include the assistant message that issued the call.
- Compression is triggered by either signal first: estimated tokens above
  `compression_trigger`, or message count above `summary_threshold`. Below
  both, the message list is returned unchanged (cheap no-op).
- Compression has a guaranteed terminal fallback: if the LLM summary call
  fails, the prompt is itself over budget, or any exception escapes, the
  deterministic fallback runs — keep the system prompt plus the last 10
  messages plus a one-line "[N earlier messages compressed]" marker.
- The preflight check runs *after* compression and only acts when the prompt
  is still over `max_input_tokens`; the in-budget path is a single token
  estimate and a return.
- `restore()` adopts the supplied message list as-is; if `messages[0]` is a
  system turn, its content becomes the new "last system prompt" returned by
  the `system_prompt` accessor.
- Sub-agent snapshots are scoped to one execution turn: `initialize()` clears
  the list, and at most `MAX_SUB_AGENT_SNAPSHOTS` (10) entries are kept per
  turn — additional registrations are dropped with a debug log.
- `prepare_for_llm()` called before `initialize()`/`restore()` is a logged
  warning and a no-op — it never raises and never silently mutates an empty
  context into a malformed prompt.
- The snapshot returned by `snapshot()` is a frozen dataclass tree: callers
  may read it freely, but mutating it does not affect the live context.

## Configuration surface (the profile keys operators rely on)

- `agent.max_input_tokens: int` (default `100000`) — hard ceiling on estimated
  input tokens for one LLM call
- `agent.compression_trigger: int` (default `40000`) — token threshold above
  which compression runs before the next LLM call
- `agent.summary_threshold: int` (default `20`) — message-count threshold for
  the same compression decision (whichever trigger fires first wins)
- `agent.tool_message_max_chars: int` (default `1500`) — per-message hard cap
  for `role="tool"` content; set to `0` to disable
- `agent.assistant_message_max_chars: int` (default `4000`) — per-message hard
  cap for `role="assistant"` content; set to `0` to disable
- `context_management.{max_input_tokens,compression_trigger,summary_threshold}`
  — same three keys at the profile root, read by `factory.py` and forwarded to
  the agent constructor

## Extension points

- `TokenEstimatorProtocol` — operators can plug a different token counter
  (e.g. tiktoken-based) into `TokenBudgeter` for more accurate budgeting.
  Default is `HeuristicTokenEstimator` (chars/4).
- `ContextManagerProtocol` — the public protocol in
  `core.interfaces.context_manager` is the seam other components (the ReAct
  loop, orchestration tools, CLI inspection commands) depend on; an
  alternative implementation can be wired in instead of the default
  `ContextManager` so long as it preserves the invariants above.

## Tests (must exist and pass)

- spec("context-manager.system_prompt_always_at_index_zero")
- spec("context-manager.compression_mutates_in_place")
- spec("context-manager.orphan_tool_messages_dropped")
- spec("context-manager.tool_call_pairs_preserved_on_trim")
- spec("context-manager.deterministic_fallback_runs_when_llm_summary_fails")
- spec("context-manager.preflight_truncates_when_over_max_input_tokens")
- spec("context-manager.restore_recovers_full_message_list")
- spec("context-manager.sub_agent_snapshots_cleared_on_initialize")
- spec("context-manager.sub_agent_snapshots_capped_at_ten")
- spec("context-manager.prepare_for_llm_before_init_is_noop_warning")
- spec("context-manager.role_caps_truncate_with_marker")
- spec("context-manager.snapshot_is_frozen_tree")

## Known gaps

- **Messages list is mutated without a lock.** The `_messages` list is exposed
  directly via the `messages` property and mutated from `initialize`,
  `restore`, `append_message`, and `compress`. Parallel sub-agent callbacks
  triggering `append_message()` concurrently can corrupt ordering and produce
  `tool_call_id` mismatches against the next LLM request. Tracked in #306.
- **Heuristic token estimator silently misjudges non-OpenAI providers.** The
  default `HeuristicTokenEstimator` (and the optional tiktoken estimator's
  `cl100k_base` fallback) drifts 10–40% on Claude/Gemini/Ollama, which can
  push compression too early or let the prompt overflow `max_input_tokens`
  without warning. Tracked in #323.
- **Content-filter recovery in `LiteLLMService` does not re-run orphan-tool
  sanitization on the streaming path.** Stripping `role="tool"` messages
  during `tool_results_only` recovery can leave assistant messages whose
  `tool_calls` no longer have replies, which the next provider request
  rejects. The ContextManager's normal flow is sanitized, but the recovery
  path is not. Tracked in #325.
- **`max_steps` and compression count do not share semantics.** The agent's
  step counter increments differently across happy/error paths in the ReAct
  loop, so "messages added per step" cannot be relied on to predict when
  compression will fire. Tracked in #346.
- **No `@pytest.mark.spec` markers exist yet.** Spec-check will flag every
  marker above as "asserted but missing test" on first run.

# Tool System — Registry, Resolution, Approval, MCP, Parallel Exec, Result Store

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
The agent's capability surface. A single registry maps short tool names
(e.g. `python`, `file_read`, `web_search`) to implementations that all
satisfy the same `ToolProtocol`. Tools come from three sources — the
hardcoded framework baseline, the `taskforce.tools` entry-point group
that plugins use to ship their own tools, and MCP servers discovered at
agent build time. The same contract covers parameter validation, approval
gating, parallel execution, and large-result offloading to a per-session
result store so the agent's message log stays small.

## Capabilities (what the user can do)

- list all registered tools and their schemas through the CLI or REST without instantiating tools that need runtime dependencies
- include any registered tool in a profile by short name (`tools: [python, file_read, ...]`)
- contribute new tools from an installed plugin package via the `taskforce.tools` entry-point group, overriding built-ins of the same name
- attach MCP servers (stdio or SSE) to an agent and have their tools surface alongside native ones
- be asked for approval before any tool flagged `requires_approval = true` runs, with a per-tool human-readable preview
- bypass approval for a curated list of tools at the profile level (`agent.approval_bypass_tools`) or tenant-wide via the settings store
- bypass approval automatically for trusted trigger origins per tool (`tool_auto_approve_for_origins`, e.g. `scheduled_workflow` for `send_notification`)
- run independent tool calls from one LLM turn in parallel up to `agent.max_parallel_tools` (default 4), subject to per-tool opt-in
- have large tool results stored out-of-band and replaced in the message log with a short handle reference, then fetched on demand via `fetch_result`
- clean up all stored tool results for a session in one call

## Invariants (what must always be true)

- A tool's short name resolves to at most one implementation per process. Entry-point contributions override built-ins of the same name; no two equally-named tools coexist.
- A tool returning from `execute()` always returns a dict containing `success: bool`; unexpected exceptions inside `BaseTool` subclasses are converted to a standardised error payload, never propagated to the agent.
- A tool whose `requires_approval` is true never runs in parallel with other tools in the same turn; it is forced onto the serial path.
- Parallel dispatch only happens for tools that explicitly set `supports_parallelism = true` AND have `requires_approval = false`. All other tools run serially.
- The number of concurrently-executing tool calls in one turn never exceeds `agent.max_parallel_tools`.
- Listing the tool catalog (CLI / REST) never requires constructing a tool that needs runtime dependencies (LLM service, sub-agent spawner, etc.); class-level metadata is read for `BaseTool` subclasses.
- An MCP server that fails to connect at agent build time does not abort agent creation. The agent continues without that server's tools and the failure is logged.
- An MCP tool result that is not a dict is converted into a standardised error payload — the agent never sees raw non-dict output from an MCP server.
- A tool result exceeding the active threshold (per-tool override > profile `agent.tool_result_store_threshold` > framework default) is written to the result store and only a short handle reference enters the message history.
- Tool result handles are immutable: a handle returned from `put()` refers to a single result file written once and is never rewritten by another call.
- `cleanup_session(session_id)` removes every result whose handle metadata records that `session_id`, and nothing else.
- Parameter validation rejects calls missing a `required` parameter or whose value violates the declared JSON-Schema `type` or `enum`, before the tool body runs.

## Configuration surface (the profile keys / env vars operators rely on)

- `tools: [<short_name>, ...]` — explicit allowlist for an agent. Names not in the resolved registry are dropped with a warning.
- `mcp_servers: [...]` — list of MCP server configs (`type: stdio|sse`, `command`/`args`/`env` or `url`). Per-agent.
- `agent.max_parallel_tools: <int>` (default 4) — semaphore size for parallel tool execution within a single turn.
- `agent.tool_result_store_threshold: <int>` — character threshold above which tool results are written to the store. Overrides the framework default for this agent.
- `agent.approval_bypass_tools: [<short_name>, ...]` — per-profile list of tool short names that skip the approval gate.
- Per-tool class attribute `tool_result_store_threshold: int | None` — overrides the profile default for one tool (e.g. `web_search` ships with `800`, `web_fetch` with `1500`).
- Per-tool class attribute `tool_auto_approve_for_origins: frozenset[str]` — trigger origins (e.g. `"scheduled_workflow"`) that bypass approval for that tool.

## API surface (the contract clients depend on)

- GET /api/v1/tools → 200 with `{tools: [...]}` — the deterministic native tool catalog (no MCP discovery on this endpoint).

## Extension points

- `taskforce.tools` entry-point group — installed packages register tools by short name. Resolution order: entry-point contributions override the built-in baseline on name collision.
- `register_tool(name, tool_type, module, params=...)` / `unregister_tool(name)` in `taskforce.infrastructure.tools.registry` — runtime-only contributions, primarily for tests. Raises on built-in name collision.
- `BaseTool` in `taskforce.infrastructure.tools.base_tool` — convenience class. New tools subclass it and override class-level `tool_name`, `tool_description`, `tool_parameters_schema`, and the async `_execute()` method.
- `ToolProtocol` in `taskforce.core.interfaces.tools` — structural contract. Any class with the right shape works; subclassing is not required.
- `set_approval_bypass_override` in `taskforce.application.infrastructure_overrides` — tenant-wide approval bypass list resolved per request (used by `taskforce-enterprise`).

## Tests (must exist and pass)

- spec("tools.entry_point_tool_overrides_builtin")

- spec("tools.mcp_connection_failure_is_non_fatal")

## Known gaps

- **Python tool sandbox escape**: `PythonTool` exposes `__import__` (and `open`) as builtins in its execution namespace, so any prompt-injection payload can load `os` / `subprocess` and break out of the medium-risk approval framing. Tracked in #276.
- **Shell tool dangerous-command blocklist is bypassable** with whitespace, quoting, command substitution, or `eval`. The `_DANGEROUS_PATTERNS` substring check is by design incomplete. Tracked in #277.
- **Shell/PowerShell tools mask underlying errors as empty strings** when `str(exc)` is empty (e.g. `NotImplementedError` from `asyncio.create_subprocess_exec` on Windows SelectorEventLoop). The agent sees `"powershell failed: "` and retries blindly. Tracked in #274.
- **BrowserTool can deadlock on nested calls**: the dedicated Playwright worker loop is reached via `asyncio.run_coroutine_threadsafe` + `wrap_future`. A nested chain (python tool → browser tool → tool bridge → main loop) creates a circular wait. Tracked in #308.
- **Tool result store has no TTL or LRU eviction**: every put writes a JSON file under `<store_dir>/results/`; long-running daemons grow the directory unboundedly. Tracked in #305.
- **Tool result store UUID generation runs outside the per-handle lock** (`uuid4()` is called before `_get_lock`). Statistically harmless today, but the ID/exists-check/write sequence should be atomic. Tracked in #316.
- **MCP tool-schema validation errors are silently suppressed** at debug-log level. A broken MCP server returns garbage that the LLM treats as a valid result; downstream errors are hard to root-cause. Tracked in #339.
- **`accounting_validate` and `accounting_audit` are registered in the built-in baseline but no implementation modules exist** — the accountant sub-agent profile that references them will crash on first tool resolve. Tracked in #321.
- **`SendNotificationTool` approval preview includes recipient IDs verbatim** (Telegram user-id, e-mail). These leak into approval audit logs. Tracked in #296.

# Sub-Agent Orchestration

> **Status:** `shipped` · **Since:** `2026-03-09` · **Last verified:** `2026-05-16` · **ADR:** `ADR-015` · **Owner:** `rudi77`
Any agent can delegate a mission to a specialist sub-agent through a tool
call. Sub-agents run in isolated sessions (own state, own message history,
own toolset) and return a single result payload to the parent. Three tools
expose the pattern: `call_agent` (pick a specialist at call time), a
named `SubAgentTool` (specialist fixed at config time, mission only), and
`call_agents_parallel` (batch-dispatch N missions concurrently). Parent
captures each sub-agent's final context snapshot so `/tree --sub-agents`
can inspect what the child saw.

## Capabilities (what the agent/profile-author can do)

- delegate a single mission to a specialist sub-agent via the `call_agent` tool, optionally choosing the specialist per call
- pre-bind a specialist to a named tool so the agent only supplies a mission (`type: sub_agent` in profile YAML)
- dispatch many independent missions concurrently with `call_agents_parallel`, optionally targeting a different specialist per mission
- override the sub-agent's planning strategy per call (`native_react`, `plan_and_execute`, `plan_and_react`, `spar`)
- opt a sub-agent tool out of the approval prompt with `auto_approve: true`, enabling LLM-driven parallel dispatch through the standard tool-call gate
- inspect what each sub-agent saw after completion via `/tree --sub-agents` — the parent's `ContextManager` carries the snapshot
- forward a parent's cooperative interrupt to every running sub-agent so the whole tree pauses together

## Invariants (what must always be true)

- Every sub-agent runs under a session ID derived from its parent: `<parent_session>--sub_<label>_<suffix>`. Parent and sibling sub-agents never share session state.
- A failing sub-agent never crashes the parent; the failure surfaces as a result payload with `success=false` and an `error_kind` field (e.g. `content_filter`, `spawn_failed`, `non_retryable`).
- Partial failures in `call_agents_parallel` do not cancel sibling sub-agents — every mission's result is collected, success counts are reported per batch.
- Sub-agent concurrency is bounded: `call_agents_parallel` enforces its own per-call `max_concurrency` (default 3); LLM-driven parallel calls are bounded by `agent.max_parallel_tools` (default 4).
- A parent interrupt is forwarded to every running sub-agent registered under that parent's session, including children spawned after the interrupt flag is set.
- Sub-agent resources (MCP connections, file handles) are released before the spawner returns — the agent's `close()` runs in the spawner's `finally` block whether the run succeeded, failed, or raised.
- A reused deterministic sub-agent session never replays a previous `ask_user` pause as the answer to the new mission — stale pause state is cleared before execution starts.
- A sub-agent's full context snapshot is captured before `agent.close()` runs, so the snapshot reflects what the child actually saw (not an empty post-close view).
- When a sub-agent succeeds, the result payload's `error` and `error_kind` are both `null`, even if a transient error occurred mid-run and was recovered.
- Specialist lookup never silently falls back to the parent profile when the requested specialist is unknown — the spawner raises with the searched paths instead of looping.
- A sub-agent tool with `auto_approve: false` (default) requires user approval before each spawn; the sub-agent still enforces its own tool-level approval gates regardless of the parent's setting.

## Configuration surface (the profile keys operators rely on)

- `tools: - type: sub_agent` — instantiate a `SubAgentTool`. Required: `name`. Optional: `specialist` (default = `name`), `profile` (default `dev`), `work_dir`, `max_steps`, `planning_strategy`, `auto_approve` (default `false`), `summarize_results` (default `true`), `summary_max_length` (default 2000), `description`, `tool_overrides`.
- `tools: - type: parallel_agent` — instantiate a `ParallelAgentTool`. Optional: `profile` (default `dev`), `work_dir`, `max_steps`, `default_max_concurrency` (default 3).
- `agent.max_parallel_tools: int` (default 4) — upper bound on concurrent tool calls overall; gates LLM-driven parallel `call_agent` invocations.
- Specialist lookup search order, in this order, first hit wins:
  1. `<config_dir>/custom/<specialist>.yaml`
  2. `<config_dir>/custom/<specialist>/<specialist>.yaml`
  3. `<config_dir>/<specialist>.yaml` or `<config_dir>/<specialist>.agent.md`
  4. `agents/<pkg>/configs/<specialist>.{yaml,agent.md}` and `agents/<pkg>/configs/custom/<specialist>.yaml`
  5. `<plugin>/configs/agents/<specialist>.yaml`

## Tool result contract (what the parent agent sees)

Both `call_agent` and `call_agents_parallel` (per-result) return the same
shape, which the parent consumes as a tool-result message:

- `success: bool` — true iff sub-agent reached `completed` or `paused`
- `result: str` — sub-agent's final message (truncated per `summary_max_length` for `sub_agent`; persisted to disk and replaced with a file pointer above 3000 chars for `call_agents_parallel`)
- `session_id: str` — the hierarchical sub-session ID
- `status: str` — terminal `ExecutionStatus` (`completed`, `failed`, `paused`)
- `error: str | null` — non-null only when `success=false`; carries the underlying error message (preferring the structured ERROR event over `final_message`)
- `error_kind: str | null` — non-null only when `success=false`; structured failure category propagated from the LLM stream (e.g. `content_filter`)

`call_agents_parallel` additionally returns a batch envelope: `{success, total, succeeded, failed, results: [...]}`. `success` at the batch level is true iff every sub-result succeeded.

## Extension points

- `SubAgentSpawnerProtocol` in `taskforce.core.interfaces.sub_agents` — replace the spawner to change how sub-agent processes are created (e.g. remote workers, sandboxed runners). Wired via the orchestration tool constructors.
- `taskforce.application.infrastructure_overrides.set_sub_agent_result_dir_override` — let an enterprise overlay route oversized `call_agents_parallel` results to a per-(tenant, user) directory. Resolved at write-time, not at tool construction, so a process-wide tool instance can still be tenant-scoped.

## Tests (must exist and pass)

- spec("sub-agents.session_id_is_hierarchical")
- spec("sub-agents.sub_agent_failure_does_not_crash_parent")
- spec("sub-agents.parallel_partial_failure_keeps_siblings_running")
- spec("sub-agents.parallel_respects_max_concurrency")
- spec("sub-agents.parent_interrupt_propagates_to_children")
- spec("sub-agents.late_child_spawn_after_interrupt_is_signalled")
- spec("sub-agents.context_snapshot_captured_before_close")
- spec("sub-agents.stale_ask_user_state_cleared_on_reuse")
- spec("sub-agents.unknown_specialist_raises_not_falls_back_to_parent")
- spec("sub-agents.success_result_clears_error_and_error_kind")
- spec("sub-agents.auto_approve_disables_parent_approval_only")
- spec("sub-agents.oversized_parallel_result_persisted_with_pointer")

## Known gaps

- **`SubAgentSpawner` memory leak path on spawn exceptions.** `_register_child` is called inside the try-block, so a failure in `_create_agent` is harmless today — but registration and deregistration are not paired as a context manager, so a future refactor that registers earlier would leak `_ACTIVE_CHILDREN` entries and leave the parent permanently flagged as interrupted. Tracked in #328.
- **Interrupt-callback failures are silently swallowed.** `LeanAgent` wraps interrupt callbacks in bare `except Exception` and logs only a warning (no traceback); a broken sub-agent interrupt callback (`TypeError`, `AttributeError`) can leave children running while the parent thinks the cancel went through. Tracked in #335.
- **No timeout for sub-agent execution.** A runaway sub-agent only stops at `max_steps` or via a cooperative interrupt; there is no wall-clock deadline.
- **Parallel sub-agents share the filesystem.** Two workers writing to the same path will collide. The planner is responsible for assigning non-overlapping files; the framework does not arbitrate.
- **No `@pytest.mark.spec` markers exist yet** — the Tests section above asserts the target, not current state. Spec-check will flag every marker as "asserted but missing test" on first run.

# Skills System — Modular Agent Capabilities

> **Status:** `shipped` · **Since:** `2026-01-24` · **Last verified:** `2026-05-16` · **ADR:** `ADR-011` · **Owner:** `rudi77`
Skills are file-based capability bundles (`SKILL.md` + optional resource files)
that extend what an agent can do without writing Python. Each skill declares
one of three execution types — **context** (instructions injected into the
system prompt), **prompt** (one-shot template with `$ARGUMENTS`), or **agent**
(temporary profile override). Skills are discovered from user, project, plugin
and bundled directories, identified by kebab-case names that may use `:` as a
hierarchical separator, and invoked from chat via `/name [args]`, from the CLI
via `taskforce run skill`, or from inside an agent via the `activate_skill`
tool.

## Capabilities (what the user can do)

- drop a `SKILL.md` into `.taskforce/skills/<name>/` or `~/.taskforce/skills/<name>/` and have the next chat session pick it up without restart
- list every discovered skill, grouped by type, via `/skills` in chat or `taskforce skills list`
- filter the CLI listing by type (`taskforce skills list --type context|prompt|agent`)
- invoke a PROMPT skill from chat by typing `/name some arguments` — the body's `$ARGUMENTS` is substituted and sent as the user mission
- invoke an AGENT skill from chat by typing `/name args` — the agent reconfigures itself (profile / tools / mcp_servers / specialist) for that turn
- activate a CONTEXT skill from chat by typing `/name` — its instructions are appended to the system prompt for the rest of the session
- run any skill non-interactively via `taskforce run skill <name> [args...]`
- let the agent itself activate a CONTEXT skill mid-execution via the `activate_skill` tool
- give a skill an alternate slash trigger via `slash-name:` so `/review` can resolve to a longer canonical name
- group skills hierarchically using `:` (e.g. `agents:reviewer` is invoked as `/agents:reviewer`)
- bundle resource files alongside `SKILL.md` (scripts, templates, references) and read them at runtime via the skill's source directory
- restrict a skill to a subset of tools via the `allowed-tools` frontmatter (a space-delimited allowlist)
- preview a skill (frontmatter + body) from the REST API for UI rendering

## Invariants (what must always be true)

- A skill's `name` must be valid kebab-case (optionally with `:` hierarchy), max 64 characters, lowercase only. Invalid names fail to load.
- The last `:`-separated segment of a skill's `name` must equal its containing directory name. Mismatched skills fail to load and are logged as parse errors.
- `description` is required and non-empty (max 1024 chars); missing description fails parsing.
- Only PROMPT and AGENT skills appear in `list_slash_command_skills` — CONTEXT skills are listed but not "directly invokable" in the same sense (typing `/name` activates them rather than running them).
- `effective_slash_name` is `slash-name` if set, otherwise `name`. Slash-name lookup is case-insensitive.
- Skill loading is progressive: metadata (frontmatter only) at discovery time, full instructions + workflow + resources on first `get_skill`. Resource lists are cached per skill instance.
- A skill load failure (bad YAML, validation error, missing fields) never crashes discovery — the affected skill is skipped and logged; the rest stay available.
- `activate_skill` from the agent auto-refreshes the registry once if the requested skill is not found, so a skill created mid-session via `file_write` becomes usable on the next call.
- The chat `/skills` listing and `/name` resolution see the same registry as the REST `/api/v1/skills` endpoints — both go through the singleton `SkillService`.
- Directory edits (new files, modified `*.md` mtimes, additions via `register_skill_dir`) are picked up automatically on the next REST list/get call without an explicit refresh — but only inside directories the registry already knows about.

## API surface (the contract clients depend on)

- GET  /api/v1/skills → 200 with `{skills: [...]}` sorted alphabetically by name
- GET  /api/v1/skills/{name} → 200 with frontmatter fields plus the SKILL.md body
- GET  /api/v1/skills/{name} → 404 if no skill with that canonical name is discovered

Write endpoints (POST/PUT/DELETE) are intentionally not in the framework spec — they live in the enterprise plugin where they carry audit + permission semantics (see ADR-022 §6).

## Configuration surface (the profile keys / env vars operators rely on)

Skill discovery is location-driven rather than profile-driven. The framework searches, in priority order:

- plugin-specific `skills/` directory (when the agent is loaded from a plugin manifest)
- `<project_root>/.taskforce/skills/` and `<project_root>/.claude/skills/` (when the conversation is scoped to a CoWork project)
- `.taskforce/skills/` in the current working directory (legacy fallback, only when no project scope)
- `~/.taskforce/skills/` (per-user, applied across all projects)
- additional directories registered via `taskforce.application.skill_service.register_skill_dir(path)`
- bundled framework skills under `src/taskforce/skills/` (added by the CLI when run from a checkout)

Frontmatter keys consumed by the parser:

- `name:` (required) — canonical skill name; must match directory name (last `:`-segment)
- `description:` (required) — shown in `/skills`, the system prompt, and the UI catalog
- `type:` (default `context`) — one of `context`, `prompt`, `agent`
- `slash-name:` / `slash_name:` — optional alias for `/name` invocation
- `allowed-tools:` / `allowed_tools:` — space-delimited tool allowlist enforced by the active skill
- `license:`, `compatibility:`, `metadata:` — informational
- `profile:`, `tools:`, `mcp_servers:`, `specialist:` — AGENT-type config override (collected into `agent_config`)
- `workflow:` — optional deterministic step sequence or `engine` + `callable_path` for external workflow runners

## Extension points

- `taskforce.application.skill_service.register_skill_dir(path)` — host applications and plugins register additional skill directories at startup. If a singleton `SkillService` already exists, the directory is registered live and a refresh is triggered.
- `taskforce.application.skill_service.set_skill_dir_provider(provider)` — dynamic per-request skill directories (e.g. tenant-scoped enterprise plugin). Resolved on every `refresh_dynamic_skill_dirs()` call.
- `taskforce.application.skill_service.set_writable_skill_root_provider(provider)` — overrides the root under which API-created skills are stored.
- `SkillRegistryProtocol` in `core/interfaces/skills.py` — replaceable skill discovery backend (default `FileSkillRegistry`).
- `SkillProtocol` / `SkillContextProtocol` — alternate skill object / context implementations.

## Tests (must exist and pass)

- spec("skills.invalid_name_rejected")
- spec("skills.directory_name_mismatch_rejected")
- spec("skills.missing_description_rejected")
- spec("skills.context_skill_activated_via_slash")
- spec("skills.prompt_skill_substitutes_arguments")
- spec("skills.agent_skill_overrides_profile")
- spec("skills.slash_name_override_resolves")
- spec("skills.hierarchical_colon_name_resolves")
- spec("skills.discovery_skips_broken_skill")
- spec("skills.activate_skill_auto_refreshes_registry")
- spec("skills.rest_list_returns_sorted")
- spec("skills.rest_get_unknown_returns_404")
- spec("skills.cli_list_filters_by_type")
- spec("skills.mtime_change_triggers_reload_on_next_list")

## Known gaps

- **Skill loader has no schema validation** beyond a handful of frontmatter type checks. Unknown frontmatter keys are silently dropped; malformed `workflow.steps` entries fail at execution time rather than load time. Tracked in #294.
- **Chat slash commands are not sanitised** — `/name args` arguments are substituted into the prompt body verbatim, so a malicious skill author could craft `$ARGUMENTS` placement that lets a user prompt-inject the system prompt. Tracked in #297.
- **`taskforce run skill` does not enforce the skill's `allowed-tools` allowlist** at the CLI level — only the SkillManager-driven path respects it. A skill that should be restricted to `file_read` is run with the profile's full tool set when invoked from the CLI. Tracked in #300.
- **`SkillManager` duplicates state that `core/domain/skill.py::SkillContext` already models** (active skill, switch history). The two paths can diverge — agent-internal activation via `SkillManager` and SkillService-level activation are not transactionally consistent. Tracked in #367.
- **No backend `@pytest.mark.spec` markers exist yet** — Tests section above asserts the target, not current state. Spec-check will flag each marker as "asserted but missing test".
- **Workflow checkpoint/resume** referenced in `activate_skill_tool` was moved to agent packages — the framework stub raises `NotImplementedError`. Skills with `waiting_for_input` workflows fail at runtime in the framework-only install.

# Plugin System — Entry-point Discovery of Tools, CLI Apps, and Configs

> **Status:** `shipped` · **Since:** `2026-01-06` · **Last verified:** `2026-05-16` · **ADR:** `ADR-026` · **Owner:** `rudi77`
Taskforce discovers extensions from any installed Python package via three
`importlib.metadata` entry-point groups. Once a package is `pip install`'d,
its tools appear in the framework registry, its Typer apps mount as
`taskforce <name>` subcommands, and its YAML config directories become
resolvable via `--profile`. The same mechanism backs both first-party agent
packages (`taskforce-butler`, `taskforce-coding-agent`, `taskforce-rag-agent`,
`taskforce-google-workspace`) and third-party plugins. A second, REST-facing
plugin protocol (`taskforce.plugins`) lets larger packages contribute
FastAPI middleware, routers, and UI manifests at server startup — that is how
`taskforce-enterprise` overlays multi-tenant auth, admin routes, and the
admin UI.

## Capabilities (what the user can do)

- install an agent package and have its tools appear in `taskforce tools list` without any framework code change
- install an agent package and have its `taskforce <name>` subcommand appear in `taskforce --help`
- install an agent package and resolve its profiles transparently via `--profile <name>`
- ship a third-party plugin that contributes FastAPI middleware + routers via a `taskforce.plugins` entry-point, mounted under `/api/v1`
- ship a third-party plugin that contributes a UI manifest, surfaced at `GET /api/v1/ui/manifest` so the SPA mounts the matching feature module
- disable all entry-point plugin discovery for a process with `TASKFORCE_DISABLE_PLUGINS=1` (used by tests that need a plugin-free runtime)
- load a directory-style plugin ad-hoc via the legacy `PluginLoader.discover_plugin(path)` path (used by `--plugin` and by API auto-discovery of `examples/`)
- override a built-in tool short name by shipping the same name in a `taskforce.tools` entry-point — entry-point wins on collision

## Invariants (what must always be true)

- A malformed entry-point value, a missing target module, or an exception during `ep.load()` is logged as a structlog warning and skipped — one broken plugin never breaks discovery for any other.
- Reading entry-points never imports the contributing package until the entry is actually used (config-dir resolution and tool-descriptor registration import the module; `load_cli_apps` calls `ep.load()` eagerly).
- A tool short name contributed via `taskforce.tools` overrides the framework's built-in registry entry of the same name. No two implementations of one short name coexist in a process.
- Setting `TASKFORCE_DISABLE_PLUGINS` to `1`, `true`, `yes`, or `on` (case-insensitive) makes `discover_plugins()` return an empty list before any plugin code is loaded.
- A `taskforce.plugins` plugin whose `initialize()` raises is recorded with `error` set on its `PluginInfo`, is never added to `get_loaded_plugins()`, and does not contribute middleware or routers.
- `shutdown_plugins()` calls each loaded plugin's `shutdown()` once; exceptions in one plugin's shutdown do not prevent the rest from being shut down.
- A UI manifest getter that raises is logged with traceback and skipped — `GET /api/v1/ui/manifest` still returns the manifests from every well-behaved plugin.
- Config-directory resolution probes `package_dir/relpath`, `package_dir.parent/relpath`, and `package_dir.parent.parent/relpath` in that order, so editable installs (`agents/<name>/src/<pkg>/configs`) and wheel installs both resolve.

## Configuration surface (the profile keys / env vars operators rely on)

Entry-point groups (declared in a contributing package's `pyproject.toml`):

- `[project.entry-points."taskforce.tools"]` — `name = "module.path:ClassName"`. Registered as a tool descriptor with short name `name`, merged on top of the framework's built-in tool registry.
- `[project.entry-points."taskforce.cli_apps"]` — `name = "module.path:typer_app"`. Loaded eagerly and added to the unified CLI as the `taskforce <name>` subcommand.
- `[project.entry-points."taskforce.config_dirs"]` — `name = "package_module:relpath"`. Resolved to a filesystem directory and registered with `ProfileLoader` so `--profile <agent>` resolves YAML inside that directory and its `custom/` and `roles/` subdirectories.
- `[project.entry-points."taskforce.plugins"]` — `name = "module.path:PluginClass"`. Class must satisfy `PluginProtocol` (sync `initialize`, `get_middleware`, `get_routers`, `extend_factory`, `shutdown`; optional `get_ui_manifest`). Loaded at FastAPI app construction time.

Env vars:

# Profile System — Agent Configuration & Visibility

> **Status:** `shipped` · **Since:** `2026-01-02` · **Last verified:** `2026-05-16` · **Owner:** `rudi77`
A *profile* is a named bundle of agent configuration (system prompt, tools,
MCP servers, planning strategy, persistence, LLM model aliases, ...) that
the user selects at startup with `--profile <name>` or `TASKFORCE_PROFILE=<name>`.
Profiles live as either flat YAML (`<name>.yaml`) or markdown with YAML
frontmatter (`<name>.agent.md`). The framework ships a small set; installed
agent packages contribute their own via entry-points, and a deployment
manifest decides which of the resulting agents surface in the catalog the
UI shows the user.

## Capabilities (what the user can do)

- author a profile as flat YAML (`<name>.yaml`) or as markdown with frontmatter (`<name>.agent.md`) where the markdown body becomes the system prompt
- inherit common settings via `extends: [<preset>, ...]` resolved against `configs/presets/`
- override individual settings on top of the framework `defaults.yaml` baseline
- select a profile per invocation via `taskforce ... --profile <name>` or persistently via `TASKFORCE_PROFILE=<name>`
- drop project-local profiles under `<repo>/agents/<pkg>/configs/` (when developing) or have them auto-discovered from an installed agent package
- let installed agent packages contribute their `configs/` directory through the `taskforce.config_dirs` entry-point group, so `--profile butler` resolves once `taskforce-butler` is installed
- list every discovered profile from the framework + installed packages via `taskforce config profiles`
- restrict which agents the UI Agents page / `GET /api/v1/agents` shows via `src/taskforce/configs/deployment.yaml`
- override that manifest at runtime via `TASKFORCE_DEPLOYMENT_MANIFEST=/path/to/your.yaml`
- override the manifest per tenant from a plugin via `set_deployment_manifest_override(...)`
- override the manifest from the UI via the `visible_agents` section of the settings store, which beats the YAML default
- bypass the manifest filter as a power user via `GET /api/v1/agents?include_hidden=true`

## Invariants (what must always be true)

- The unified CLI's default profile is `butler` when `taskforce_butler` is importable, otherwise `dev`; the framework-only fallback CLI always defaults to `dev`.
- A profile lookup probes, in order: `<dir>/<name>.agent.md`, `<dir>/<name>.yaml`, `<dir>/custom/<name>.agent.md`, `<dir>/custom/<name>.yaml`. The first hit wins. The same sequence runs in the framework dir first, then in every registered extra dir, in registration order.
- For `.agent.md` files the resolved config is built by: framework `defaults.yaml` → each `extends:` preset in left-to-right order → frontmatter → `technical:` block flattened onto the top level → markdown body assigned to `system_prompt` (unless frontmatter explicitly set one).
- An unknown profile raises `FileNotFoundError` with the list of directories that were searched, so misconfiguration is loud, not silent.
- Profile validation failures against the Pydantic schema log a warning but do NOT reject the profile — the framework continues with the unvalidated dict.
- An agent NOT on the deployment manifest stays fully loadable by id (sub-agent extension via `get_agent(...)` is unaffected); it just doesn't appear in user-facing listings.
- When the settings store carries a non-empty `visible_agents.agents` list, it beats the shipped `deployment.yaml`. When neither source supplies a manifest, the registry falls back to its legacy unfiltered behaviour.
- The same profile name appearing in multiple search directories resolves to the first hit; subsequent definitions are shadowed (matching the load-order semantics used by listings).
- The `persistence.type` value during plugin-config merging always comes from the base profile — plugins cannot swap storage backends behind the user's back.
- Reserved basenames `defaults`, `llm_config`, `pricing` are excluded from profile discovery even when files with those names exist in a searched directory.

## API surface (the contract clients depend on)

- GET  /api/v1/agents → 200 with the visible-agents set per active deployment manifest
- GET  /api/v1/agents accepts `include_hidden=true` to bypass the manifest filter
- GET  /api/v1/agents/{agent_id} → 200 for any loadable agent (manifest does not gate by-id lookup)
- GET  /api/v1/agents/{agent_id} → 404 when no profile/custom/plugin agent matches

## Configuration surface (the profile keys / env vars operators rely on)

Profile selection:

- `TASKFORCE_PROFILE=<name>` — override the default profile
- `--profile <name>` — per-invocation override on every CLI subcommand
- `TASKFORCE_DEPLOYMENT_MANIFEST=/path/to/your.yaml` — point at an alternate manifest

Top-level profile keys consumed by the loader and downstream factory:

- `profile: <name>` — informational id (matches filename for discoverability)
- `extends: <preset> | [<preset>, ...]` — preset references resolved under `configs/presets/`
- `technical: {...}` — block that gets flattened onto the top level after merging
- `agent.planning_strategy`, `agent.planning_strategy_params`, `agent.max_steps` — see react-loop spec
- `persistence.type` (`file` | `postgres`), `persistence.work_dir`
- `llm.config_path`, `llm.default_model`
- `logging.level`, `logging.format`
- `context_policy.{max_items,max_chars_per_item,max_total_chars}`
- `tools: [<short_name>, ...]` — resolved against the tool registry
- `mcp_servers: [...]`, `acp: {server, peers, message_bus}`
- `runtime: <name>` (default `taskforce`) — runtime adapter selector
- `system_prompt: <str>` — explicit override; if absent and the file is `.agent.md`, the body becomes the system prompt

Deployment manifest schema (`src/taskforce/configs/deployment.yaml`):

- `version: 1`
- `visible_agents: [<agent_id>, ...]` — allowlist surfaced in catalog listings

Settings-store section (`VISIBLE_AGENTS`):

- `{agents: [<agent_id>, ...]}` — UI-managed override that wins over `deployment.yaml`

## Extension points

- `taskforce.config_dirs` entry-point group — installed agent packages declare `name = "module:relpath"` to add their `configs/` directory to the profile loader's search path (ADR-026).
- `taskforce.application.profile_loader.register_config_dir(path)` — host applications register additional profile directories at startup; called by `taskforce_cli.agent_discovery.register_agent_config_dirs()` for each discovered package.
- `taskforce.application.infrastructure_overrides.set_deployment_manifest_override(provider)` — plugin code (e.g. `taskforce-enterprise`) supplies a per-tenant manifest that beats both the settings store and the YAML default.
- `taskforce.application.infrastructure_overrides.set_agent_registry_override(provider)` — replace the entire agent-registry implementation (used by the enterprise overlay for tenant-scoped Postgres-backed registries).
- `configs/presets/<name>.yaml` — shared snippets referenced via `extends:`; resolved against the same dir-set the loader uses for profiles.

## Known gaps

- **No public registry for runtime/planning-strategy plugins**: profiles can declare `runtime:` or `agent.planning_strategy:` but only values wired into the factory resolve — plugins cannot add new ones without forking. See react-loop spec Known gaps.
- **Profile-schema validation is advisory only**: a typo'd top-level key is logged at WARNING and silently kept, so `pythons` instead of `python` in the default profile passes validation and fails only at tool-build time. Tracked indirectly via the wider Pydantic-strict initiative; `src/taskforce/configs/default.yaml` currently contains exactly this typo.
