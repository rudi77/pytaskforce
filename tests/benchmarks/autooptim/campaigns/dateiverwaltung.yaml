# AutoOptim Campaign: Dateiverwaltung (Document Management)
#
# Focuses on efficient batch document processing: reading, categorizing,
# and organizing files with minimal tool calls and tokens.
#
# Usage:
#   autooptim run --config tests/benchmarks/autooptim/campaigns/dateiverwaltung.yaml

name: butler-dateiverwaltung
description: >
  Optimize Butler for document management workflows: batch reading,
  categorization, and file organization with minimal tool calls.

project_root: "C:/Users/rudi/source/pytaskforce"

categories:
  prompt:
    weight: 0.60
    mutator:
      type: text
      allowed_paths:
        - "src/taskforce/configs/custom/"
      blocked_paths:
        - "src/taskforce/core/prompts/autonomous_prompts.py"
    context_files:
      - "src/taskforce/configs/custom/pc-agent.yaml"
      - "src/taskforce/core/prompts/autonomous_prompts.py"
      - ".autooptim/last_eval_trace.md"
      - ".autooptim/experiments_history.md"

  config:
    weight: 0.40
    mutator:
      type: yaml
      allowed_paths:
        - "src/taskforce/configs/butler.yaml"
        - "src/taskforce/configs/custom/pc-agent.yaml"
        safe_keys:
        agent:
          - planning_strategy
          - max_steps
          - planning_strategy_params
          - max_parallel_tools
        context_policy:
          - max_items
          - max_chars_per_item
          - max_total_chars
      validation_rules:
        agent.max_steps:
          type: int
          min: 1
          max: 50
        agent.planning_strategy:
          type: str
          choices: [native_react, plan_and_execute, plan_and_react, spar]
        context_policy.max_items:
          type: positive_int
        context_policy.max_chars_per_item:
          type: positive_int
        context_policy.max_total_chars:
          type: positive_int
    context_files:
      - "src/taskforce/configs/butler.yaml"
      - "src/taskforce/configs/custom/pc-agent.yaml"
      - ".autooptim/last_eval_trace.md"
      - ".autooptim/experiments_history.md"

evaluator:
  type: command
  command: "C:/Users/rudi/source/pytaskforce/.venv/Scripts/python.exe tests/benchmarks/autooptim/eval_butler.py {task_name}"
  quick_task: "daily"
  full_task: "daily"
  timeout: 1200

metric:
  scores:
    - name: task_completion
      range: [0.0, 1.0]
    - name: answer_quality
      range: [0.0, 1.0]
    - name: avg_steps
      type: lower_is_better
    - name: avg_input_tokens
      type: lower_is_better
    - name: avg_wall_seconds
      type: lower_is_better
    - name: total_tool_calls
      type: lower_is_better
    - name: notification_spam
      type: lower_is_better
    - name: datei_steps
      type: lower_is_better
    - name: datei_tokens
      type: lower_is_better
    - name: datei_wall
      type: lower_is_better
    - name: datei_tools
      type: lower_is_better
    - name: datei_completed
      range: [0.0, 1.0]
    - name: datei_quality
      range: [0.0, 1.0]
    - name: datei_files_sorted
      range: [0.0, 15.0]
    - name: datei_categories
      range: [0.0, 10.0]
  composite:
    quality:
      weight: 0.50
      components:
        task_completion: 0.3
        answer_quality: 0.3
        datei_completed: 0.2
        datei_quality: 0.2
    efficiency:
      weight: 0.50
      type: ratio_to_baseline
      components:
        - datei_steps
        - datei_tokens
        - datei_wall
        - datei_tools
        - avg_steps
        - avg_input_tokens

proposer:
  model: "azure/gpt-5.4"
  temperature: 1
  max_tokens: 6000
  system_prompt_file: "../proposer_system.md"
  user_template_file: "../proposer_user.md"

runner:
  max_iterations: 10
  max_cost_usd: 25.0
  eval_runs: 1
  tolerance: 0.01
  full_eval_every_n: 5
  large_improvement_threshold: 0.05
  eval_mode: daily
