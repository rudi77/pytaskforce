# AutoOptim config: Butler Agent Efficiency Optimization
#
# Optimizes the Butler multi-agent system for fewer steps, fewer tokens,
# and faster execution while maintaining task completion quality.
#
# Usage:
#   cd C:\Users\rudi\source\pytaskforce
#   autooptim run --config tests/benchmarks/autooptim/config.yaml

name: butler-efficiency-optimization
description: >
  Optimize the Butler coordinator agent and its sub-agents for execution
  efficiency: fewer LLM round-trips, fewer tokens, less wall-clock time,
  while maintaining correct task completion.

project_root: "C:/Users/rudi/source/pytaskforce"

categories:
  # --- Category 1: YAML config parameters (low risk) ---
  config:
    weight: 0.40
    mutator:
      type: yaml
      allowed_paths:
        - "src/taskforce/configs/butler.yaml"
        - "src/taskforce/configs/custom/pc-agent.yaml"
        - "src/taskforce/configs/custom/research_agent.yaml"
        - "src/taskforce/configs/custom/doc-agent.yaml"
      safe_keys:
        agent:
          - planning_strategy
          - max_steps
          - planning_strategy_params
          - max_parallel_tools
        context_policy:
          - max_items
          - max_chars_per_item
          - max_total_chars
        context_management:
          - summary_threshold
          - compression_trigger
        logging:
          - level
        # NOTE: 'tools' is deliberately ABSENT — tool lists must not change
      validation_rules:
        agent.max_steps:
          type: int
          min: 1
          max: 50
        agent.planning_strategy:
          type: str
          choices: [native_react, plan_and_execute, plan_and_react, spar]
        agent.planning_strategy_params.reflect_every_step:
          type: bool
        agent.planning_strategy_params.max_step_iterations:
          type: int
          min: 1
          max: 10
        context_policy.max_items:
          type: positive_int
        context_policy.max_chars_per_item:
          type: positive_int
        context_policy.max_total_chars:
          type: positive_int
        context_management.summary_threshold:
          type: positive_int
        context_management.compression_trigger:
          type: positive_int
    context_files:
      - "src/taskforce/configs/butler.yaml"
      - "src/taskforce/configs/custom/pc-agent.yaml"
      - ".autooptim/last_eval_trace.md"

  # --- Category 2: System prompts (medium risk) ---
  prompt:
    weight: 0.40
    mutator:
      type: text
      allowed_paths:
        - "src/taskforce/core/prompts/"
        - "src/taskforce/configs/custom/"
    context_files:
      - "src/taskforce/core/prompts/autonomous_prompts.py"
      - "src/taskforce/configs/custom/pc-agent.yaml"
      - "src/taskforce/configs/custom/research_agent.yaml"
      - "src/taskforce/configs/custom/doc-agent.yaml"
      - ".autooptim/last_eval_trace.md"

  # --- Category 3: Core agent logic (higher risk) ---
  code:
    weight: 0.20
    mutator:
      type: code
      allowed_paths:
        - "src/taskforce/core/domain/planning_strategy.py"
        - "src/taskforce/core/domain/lean_agent_components/"
        - "src/taskforce/core/domain/context_builder.py"
        - "src/taskforce/core/domain/context_policy.py"
        - "src/taskforce/core/domain/token_budgeter.py"
      blocked_paths:
        - "src/taskforce/application/factory.py"
        - "src/taskforce/application/executor.py"
        - "src/taskforce/api/"
        - "src/taskforce/core/interfaces/"
        - "src/taskforce/infrastructure/tools/"
        - "tests/"
      preflight:
        - "C:/Users/rudi/source/pytaskforce/.venv/Scripts/python.exe -c \"import taskforce; from taskforce.core.domain.planning_strategy import NativeReActStrategy; print('OK')\""
    context_files:
      - "src/taskforce/core/domain/planning_strategy.py"
      - "src/taskforce/core/domain/context_policy.py"
      - "src/taskforce/core/domain/lean_agent_components/message_history_manager.py"
      - ".autooptim/last_eval_trace.md"

# --- Evaluator ---
evaluator:
  type: command
  command: "C:/Users/rudi/source/pytaskforce/.venv/Scripts/python.exe tests/benchmarks/autooptim/eval_butler.py {task_name}"
  quick_task: "quick"
  full_task: "full"
  # Additional task names (documentation only — AutoOptim uses quick_task/full_task):
  # daily_task: "daily"
  # memory_task: "memory"
  # future_task: "future"
  timeout: 600

# --- Metrics ---
metric:
  scores:
    # ---------------------------------------------------------------
    # Aggregate scores
    # ---------------------------------------------------------------
    - name: task_completion
      range: [0.0, 1.0]
    - name: avg_steps
      type: lower_is_better
    - name: avg_input_tokens
      type: lower_is_better
    - name: avg_ratio
      type: lower_is_better
    - name: avg_wall_seconds
      type: lower_is_better
    - name: total_tool_calls
      type: lower_is_better
    - name: notification_spam
      type: lower_is_better
    - name: delegation_efficiency
      type: lower_is_better
    - name: answer_quality
      range: [0.0, 1.0]
    - name: memory_recall
      range: [0.0, 1.0]
    - name: self_improvement_score
      range: [0.0, 1.0]

    # ---------------------------------------------------------------
    # Per-mission: baseline (zero-tool question)
    # ---------------------------------------------------------------
    - name: baseline_steps
      type: lower_is_better
    - name: baseline_tokens
      type: lower_is_better
    - name: baseline_wall
      type: lower_is_better
    - name: baseline_tools
      type: lower_is_better
    - name: baseline_completed
      range: [0.0, 1.0]

    # ---------------------------------------------------------------
    # Per-mission: singletool (file read via delegation)
    # ---------------------------------------------------------------
    - name: singletool_steps
      type: lower_is_better
    - name: singletool_tokens
      type: lower_is_better
    - name: singletool_wall
      type: lower_is_better
    - name: singletool_tools
      type: lower_is_better
    - name: singletool_completed
      range: [0.0, 1.0]

    # ---------------------------------------------------------------
    # Per-mission: docreport (multi-agent delegation + synthesis)
    # ---------------------------------------------------------------
    - name: docreport_steps
      type: lower_is_better
    - name: docreport_tokens
      type: lower_is_better
    - name: docreport_wall
      type: lower_is_better
    - name: docreport_tools
      type: lower_is_better
    - name: docreport_completed
      range: [0.0, 1.0]

    # ---------------------------------------------------------------
    # Per-mission: multistep (multi-step tool chain, full mode only)
    # ---------------------------------------------------------------
    - name: multistep_steps
      type: lower_is_better
    - name: multistep_tokens
      type: lower_is_better
    - name: multistep_wall
      type: lower_is_better
    - name: multistep_tools
      type: lower_is_better
    - name: multistep_completed
      range: [0.0, 1.0]

    # ---------------------------------------------------------------
    # Per-mission: Daily Assistant (tagesplan, datei, recherche, reminder, praeferenz)
    # ---------------------------------------------------------------
    - name: tagesplan_steps
      type: lower_is_better
    - name: tagesplan_tokens
      type: lower_is_better
    - name: tagesplan_wall
      type: lower_is_better
    - name: tagesplan_tools
      type: lower_is_better
    - name: tagesplan_completed
      range: [0.0, 1.0]
    - name: tagesplan_quality
      range: [0.0, 1.0]

    - name: datei_steps
      type: lower_is_better
    - name: datei_tokens
      type: lower_is_better
    - name: datei_wall
      type: lower_is_better
    - name: datei_tools
      type: lower_is_better
    - name: datei_completed
      range: [0.0, 1.0]
    - name: datei_quality
      range: [0.0, 1.0]

    - name: recherche_steps
      type: lower_is_better
    - name: recherche_tokens
      type: lower_is_better
    - name: recherche_wall
      type: lower_is_better
    - name: recherche_tools
      type: lower_is_better
    - name: recherche_completed
      range: [0.0, 1.0]
    - name: recherche_quality
      range: [0.0, 1.0]

    - name: reminder_steps
      type: lower_is_better
    - name: reminder_tokens
      type: lower_is_better
    - name: reminder_wall
      type: lower_is_better
    - name: reminder_tools
      type: lower_is_better
    - name: reminder_completed
      range: [0.0, 1.0]
    - name: reminder_quality
      range: [0.0, 1.0]

    - name: praeferenz_steps
      type: lower_is_better
    - name: praeferenz_tokens
      type: lower_is_better
    - name: praeferenz_wall
      type: lower_is_better
    - name: praeferenz_tools
      type: lower_is_better
    - name: praeferenz_completed
      range: [0.0, 1.0]
    - name: praeferenz_quality
      range: [0.0, 1.0]

    # ---------------------------------------------------------------
    # Per-mission: Memory & Learning (multi-turn sequences)
    # ---------------------------------------------------------------
    - name: mem_pref_completed
      range: [0.0, 1.0]
    - name: mem_pref_recall
      range: [0.0, 1.0]
    - name: mem_pref_steps
      type: lower_is_better
    - name: mem_pref_tokens
      type: lower_is_better
    - name: mem_pref_wall
      type: lower_is_better

    - name: mem_fact_completed
      range: [0.0, 1.0]
    - name: mem_fact_recall
      range: [0.0, 1.0]
    - name: mem_fact_steps
      type: lower_is_better
    - name: mem_fact_tokens
      type: lower_is_better
    - name: mem_fact_wall
      type: lower_is_better

    - name: mem_contra_completed
      range: [0.0, 1.0]
    - name: mem_contra_recall
      range: [0.0, 1.0]
    - name: mem_contra_steps
      type: lower_is_better
    - name: mem_contra_tokens
      type: lower_is_better
    - name: mem_contra_wall
      type: lower_is_better

    - name: mem_search_completed
      range: [0.0, 1.0]
    - name: mem_search_recall
      range: [0.0, 1.0]
    - name: mem_search_steps
      type: lower_is_better
    - name: mem_search_tokens
      type: lower_is_better
    - name: mem_search_wall
      type: lower_is_better

    - name: mem_proactive_completed
      range: [0.0, 1.0]
    - name: mem_proactive_recall
      range: [0.0, 1.0]
    - name: mem_proactive_steps
      type: lower_is_better
    - name: mem_proactive_tokens
      type: lower_is_better
    - name: mem_proactive_wall
      type: lower_is_better

    # ---------------------------------------------------------------
    # Per-mission: Future / Aspirational (expected to score 0 today)
    # ---------------------------------------------------------------
    - name: fut_agent_completed
      range: [0.0, 1.0]
    - name: fut_agent_steps
      type: lower_is_better
    - name: fut_agent_tokens
      type: lower_is_better
    - name: fut_agent_wall
      type: lower_is_better
    - name: fut_agent_tools
      type: lower_is_better

    - name: fut_tool_completed
      range: [0.0, 1.0]
    - name: fut_tool_steps
      type: lower_is_better
    - name: fut_tool_tokens
      type: lower_is_better
    - name: fut_tool_wall
      type: lower_is_better
    - name: fut_tool_tools
      type: lower_is_better

    - name: fut_meta_completed
      range: [0.0, 1.0]
    - name: fut_meta_steps
      type: lower_is_better
    - name: fut_meta_tokens
      type: lower_is_better
    - name: fut_meta_wall
      type: lower_is_better
    - name: fut_meta_tools
      type: lower_is_better

    - name: fut_learn_completed
      range: [0.0, 1.0]
    - name: fut_learn_steps
      type: lower_is_better
    - name: fut_learn_tokens
      type: lower_is_better
    - name: fut_learn_wall
      type: lower_is_better
    - name: fut_learn_tools
      type: lower_is_better

    - name: fut_workflow_completed
      range: [0.0, 1.0]
    - name: fut_workflow_steps
      type: lower_is_better
    - name: fut_workflow_tokens
      type: lower_is_better
    - name: fut_workflow_wall
      type: lower_is_better
    - name: fut_workflow_tools
      type: lower_is_better

  composite:
    quality:
      weight: 0.35
      components:
        task_completion: 0.5
        answer_quality: 0.3
        memory_recall: 0.2
    efficiency:
      weight: 0.60
      type: ratio_to_baseline
      components:
        - avg_steps
        - avg_input_tokens
        - avg_wall_seconds
        - total_tool_calls
        - notification_spam
        - delegation_efficiency
    future_readiness:
      weight: 0.05  # Low weight until future features are implemented
      components:
        self_improvement_score: 1.0

# --- Proposer ---
proposer:
  model: "azure/gpt-5.4"
  temperature: 0.7
  max_tokens: 6000
  system_prompt_file: "proposer_system.md"
  user_template_file: "proposer_user.md"

# --- Runner settings ---
runner:
  max_iterations: 20
  max_cost_usd: 30.0
  eval_runs: 2
  tolerance: 0.01
  full_eval_every_n: 5
  large_improvement_threshold: 0.05
  eval_mode: quick
