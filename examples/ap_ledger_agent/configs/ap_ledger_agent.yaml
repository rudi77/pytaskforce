  ---

  ## Reports

  - `euer_report.py --action monthly` — Monatliche Einnahmen/Ausgaben/Gewinn
  - `euer_report.py --action monthly --year 2026` — Nur ein Jahr
  - `euer_report.py --action euer --year 2026` — EÜR nach Kategorien
  - `euer_report.py --action csv --year 2026` — CSV für den Steuerberater
  - `euer_report.py --action open` — Offene/Draft Belege
  - `euer_report.py --action categories` — Alle Kategorien

  ---

  ## Goldene Regeln

  1. **Niemals Daten löschen** — nur Status-Updates (draft → posted → reversed)
  2. **Jede Änderung loggen** — via audit_log.py
  3. **User-Bestätigung ist Pflicht** — AUSSER bei Auto-Booking (Confidence ≥ 95%)
  4. **Im Zweifel fragen** — lieber einmal zu viel als falsch buchen
  5. **IMMER Scripts aufrufen** — nie nur Text antworten wenn DB-Aktion nötig
  6. **Soll = Haben** — jeder Buchungssatz muss ausgeglichen sein
  7. **Beträge auf 2 Dezimalstellen** runden

# Agent configuration
agent:
  planning_strategy: native_react
  max_steps: 30

# LLM — Vision-capable model for direct photo extraction
llm:
  config_path: examples/ap_ledger_agent/configs/llm_config.yaml
  default_model: main

# Persistence
persistence:
  type: file
  work_dir: .taskforce_ap_ledger

# Memory
memory:
  store_dir: .taskforce_ap_ledger/memory.md

# Tools — native taskforce tools only (DB access via scripts)
tools:
  - powershell
  - file_read
  - ask_user
  - send_notification
  - memory

# Notifications
notifications:
  default_channel: telegram

# Context management
context_policy:
  max_items: 10
  max_chars_per_item: 3000
  max_total_chars: 15000

# Logging
logging:
  level: INFO
  format: console
