# =============================================================================
# LLM Configuration for AP Ledger Agent
# =============================================================================
# Uses LiteLLM model string prefixes — provider-agnostic.
#
# IMPORTANT: The framework's llm_config_loader expects model aliases to be
# **strings**, not dicts. Per-model parameters go into `model_params` below.
# Do NOT use the `main: {model: ..., temperature: ...}` form — that is
# returned raw to LiteLLM which then fails with
#   "unhashable type: 'dict'"
# when the value is used as a cache key.

default_model: main

# Model aliases (short name → LiteLLM model string)
# Must match deployments available in AZURE_API_BASE / AZURE_API_VERSION.
models:
  main: "azure/gpt-5.4-mini"       # Vision-capable — used for receipt photos
  fast: "azure/gpt-5.4-nano"        # Fast model for simple summaries
  powerful: "azure/gpt-5.4-mini"    # Complex reasoning (planning, validation)

  # ── Alternative providers (swap `main` as needed) ──────────────────
  # main: "gpt-4o"                         # OpenAI direct (vision)
  # main: "anthropic/claude-sonnet-4-6"    # Anthropic Claude (vision)
  # main: "gemini/gemini-2.5-pro"          # Google Gemini (vision)
  # main: "ollama/llava:13b"               # Local Ollama (vision)

# Per-model default parameters (applied via LiteLLM)
# NOTE: gpt-5.x reasoning models ignore `temperature` — leave it unset.
# `drop_params: true` lets LiteLLM silently strip any unsupported param.
model_params: {}

# Dynamic routing rules
# Phase hints emitted by planning strategies auto-route to different models.
# Disabled by default — all calls go to `default_model`.
routing:
  enabled: false
  default_model: main
  rules:
    - condition: "hint:planning"
      model: powerful
    - condition: "hint:summarizing"
      model: fast
    - condition: has_tools
      model: main
