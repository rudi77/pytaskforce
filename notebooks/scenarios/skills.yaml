# =============================================================================
# CAPABILITY BOUNDARY
# =============================================================================
- id: skills-no-unrelated-activation
  category: context
  difficulty: medium
  mission: "Was ist 2 plus 2?"
  expected:
    skills:
      must_not_activate: ["pdf-processing", "code-review", "data-analysis"]
    must_not_call_tools: [activate_skill]
  hidden_intent: "Simple math - keine Skill-Aktivierung nötig."
  requires: [activate_skill]
