# Standing Goals test scenarios (issue #389)
# -------------------------------------------
# Tests the proactive layer (ADR-024): heartbeat ticks, cron pre-filter
# (saves LLM calls), evaluator decisions, and goal mutation persistence.
#
# This notebook is structurally different from the mission-driven Tier-1
# notebooks - the standing-goals service runs without a mission. The
# notebook must inject a fake clock + count ticks + count LLM calls
# itself, then stash those numbers into `rec.extra` so the
# `standing_goals` evaluator can score them.
#
# Required `rec.extra` keys (populated by the notebook):
#   heartbeat_ticks         - total number of heartbeat invocations
#   standing_goals_decisions - LLM evaluator decisions (== LLM calls)
#
# Evaluator keys: min_ticks, max_ticks, max_llm_calls_per_tick,
# min_decisions.

# =============================================================================
# CRON PRE-FILTER (saves LLM calls)
# =============================================================================
- id: sg-cron-prefilter-saves-llm
  category: efficiency
  difficulty: medium
  mission: "(notebook-driven: 60 heartbeat ticks, 2 goals, fires 4-5x)"
  expected:
    standing_goals:
      min_ticks: 60
      max_ticks: 60
      # Realistic upper bound: 0.10 (=6/60). With 15-min cron + never-
      # due weekly cron the typical run produces ~5/60 = 0.083 (4 cron
      # fires + 1 first-evaluation-after-create). Tightening below
      # 0.10 fails on the first-tick double-evaluation.
      max_llm_calls_per_tick: 0.10
      min_decisions: 1
  hidden_intent: "Cron pre-filter prevents per-tick LLM calls (ADR-024)."
  requires: []

