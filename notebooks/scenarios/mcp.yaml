# MCP test scenarios (issue #384)
# --------------------------------
# Drives the agent against one or more MCP servers and verifies it
# actually uses them. The `mcp` evaluator scores against `expected.mcp:`
# keys: must_use_tools (by tool name, not server name —
# MCPToolWrapper does not tag events with source today),
# min_mcp_calls, max_mcp_calls, must_use_native_only.
#
# **IMPORTANT** — the notebook MUST populate
# `rec.extra['mcp_tool_names']` with the set of tool names exposed by
# MCPToolWrapper instances after building the agent. Without that hint
# the evaluator cannot distinguish MCP from native tools.

# =============================================================================
# NATIVE-ONLY (no MCP server configured)
# =============================================================================
- id: mcp-native-only-simple
  category: native
  difficulty: easy
  mission: "Wie spät ist es?"
  expected:
    mcp:
      must_use_native_only: true
  hidden_intent: "Ohne MCP-Server konfiguriert darf keine MCP-Tool gerufen werden."
  requires: []

- id: mcp-native-only-search
  category: native
  difficulty: easy
  mission: "Suche im Web nach Wetter in Berlin."
  expected:
    mcp:
      must_use_native_only: true
  hidden_intent: "Native web_search reicht — keine MCP-Delegation."
  requires: [web_search]

# =============================================================================
# WITH MCP SERVER (only run when an MCP server is wired into the notebook)
# =============================================================================
- id: mcp-document-extract
  category: exec
  difficulty: medium
  mission: "Extrahiere den Text aus einem PDF mit der document-extraction-mcp Toolchain."
  expected:
    mcp:
      min_mcp_calls: 1
      # must_use_tools: ["ocr_extract"]   # uncomment when MCP server is wired
  requires: []
  notes: "Requires document-extraction-mcp server actually running (heavy deps)."

